<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ระบบเข้า-ออกงาน | รักษ์ยาเบบี้ช็อป</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #2b82c9; 
            background: linear-gradient(180deg, #1e73be 0%, #4299e1 50%, #63b3ed 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            min-height: 100vh;
            overscroll-behavior-y: contain; 
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        /* --- วิวต้นไม้ด้านหลัง --- */
        .trees-bg {
            position: absolute;
            bottom: 30vh; 
            left: 0;
            width: 100%;
            height: 50vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .tree-main {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-60%);
            width: 320px;
            height: 300px;
            background-color: #2a5c36; 
            border-radius: 50%;
            box-shadow: -40px -40px 0 20px #326e40, 40px -50px 0 10px #1f4528, 80px 20px 0 30px #2a5c36, -80px 10px 0 10px #1f4528, 0 -80px 0 -10px #326e40;
        }
        .palm-leaves {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 150px;
            z-index: 1;
        }
        .palm-leaf {
            position: absolute;
            bottom: 0; left: 50%; width: 20px; height: 120px;
            background-color: #5b8c42; border-radius: 50% 50% 0 0;
            transform-origin: bottom center; box-shadow: inset -5px 0 0 rgba(0,0,0,0.15);
        }
        .palm-leaf:nth-child(1) { transform: translateX(-50%) rotate(-60deg); }
        .palm-leaf:nth-child(2) { transform: translateX(-50%) rotate(-40deg); }
        .palm-leaf:nth-child(3) { transform: translateX(-50%) rotate(-15deg); height: 140px; }
        .palm-leaf:nth-child(4) { transform: translateX(-50%) rotate(15deg); height: 130px; }
        .palm-leaf:nth-child(5) { transform: translateX(-50%) rotate(45deg); }
        .palm-leaf:nth-child(6) { transform: translateX(-50%) rotate(65deg); height: 100px; }

        .neighbor-roof {
            position: absolute; bottom: -20px; right: -20px;
            width: 150px; height: 150px; background-color: #4a3c31; 
            transform: rotate(-30deg) skewX(20deg); transform-origin: bottom right;
            box-shadow: inset 10px 0 0 rgba(0,0,0,0.2); z-index: 1;
        }

        /* --- โครงสร้างร้าน --- */
        .shop-building {
            position: relative;
            width: 95%; max-width: 500px;
            height: 55vh; max-height: 500px;
            display: flex; flex-direction: column;
            box-shadow: 0 -15px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 0; z-index: 10;
        }

        /* --- ป้ายชื่อร้าน --- */
        .signage-container {
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            z-index: 50; display: flex; flex-direction: column; align-items: center; width: 110%; 
        }
        .steel-frame {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            width: 340px; height: 75px; 
            border: 3px solid #1e293b; border-bottom: 4px solid #1e293b; z-index: 1;
            background-image: 
                linear-gradient(90deg, transparent 48%, #1e293b 48%, #1e293b 52%, transparent 52%),
                linear-gradient(0deg, transparent 48%, #1e293b 48%, #1e293b 52%, transparent 52%);
            background-size: 85px 75px;
        }
        .shop-name-text {
            font-family: 'Kanit', sans-serif; font-weight: 900; font-size: 3rem; line-height: 1; white-space: nowrap;
            text-shadow: -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 3px 3px 0 #fff, -2px 0 0 #fff, 2px 0 0 #fff, 0 -2px 0 #fff, 0 2px 0 #fff, -4px 0 0 #fff, 4px 0 0 #fff, 0 -4px 0 #fff, 0 4px 0 #fff, 0 10px 15px rgba(0,0,0,0.25);
            letter-spacing: 0px; margin-bottom: 4px; z-index: 3; position: relative;
        }
        .sub-sign {
            background-color: #00aeea; color: #ffffff; font-weight: 700; font-size: 1.15rem;
            padding: 4px 28px; border-radius: 9999px; border: 4px solid #ffffff; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.2); z-index: 4; letter-spacing: 0.5px; position: relative;
        }

        /* --- หลังคาและเสา --- */
        .shop-roof {
            position: relative; height: 55px; background: #3d2b2c; 
            border-radius: 10px 10px 0 0; z-index: 40; box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        .shop-roof::after {
            content: ''; position: absolute; bottom: -10px; left: 0; right: 0; height: 20px;
            background: radial-gradient(circle at 50% 0%, #3d2b2c 10px, transparent 11px);
            background-size: 30px 20px; background-repeat: repeat-x;
        }
        .shop-roof::before {
            content: ''; position: absolute; top: 15px; left: 0; right: 0; height: 3px; background-color: rgba(255,255,255,0.15);
        }
        .white-trim {
            width: 100%; height: 16px; background-color: #f8fafc; position: relative; z-index: 35; box-shadow: 0 4px 6px -2px rgba(0,0,0,0.2);
        }
        .shop-body {
            display: flex; flex: 1; position: relative; background-color: #1e293b; z-index: 30;
        }
        .pillar {
            width: 35px; background-color: #6a876b; 
            border-left: 2px solid #557056; border-right: 2px solid #4a634b;
            position: relative; z-index: 20; box-shadow: inset 0 10px 20px rgba(0,0,0,0.15);
        }
        .motor-panel {
            position: absolute; top: 30px; right: 0; width: 100%; height: 45px;
            background-color: #475569; border-top: 2px solid #64748b; border-bottom: 3px solid #334155;
            display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .motor-light {
            width: 12px; height: 12px; border-radius: 50%; background-color: #ef4444; box-shadow: 0 0 10px #ef4444; transition: all 0.3s ease;
        }
        .motor-light.active { background-color: #3b82f6; box-shadow: 0 0 15px #3b82f6; animation: pulse-light 0.4s infinite alternate; }
        .motor-light.open { background-color: #10b981; box-shadow: 0 0 10px #10b981; }
        @keyframes pulse-light { from { opacity: 0.5; } to { opacity: 1; } }

        /* --- กรอบหน้าต่าง --- */
        .shop-window {
            flex: 1; position: relative; overflow: hidden; background-color: #0f172a;
            box-shadow: inset 0 15px 15px -10px rgba(0,0,0,0.8); 
        }

        /* --- ภายในร้าน (3D Perspective Room) --- */
        .shop-interior {
            position: absolute; inset: 0;
            /* ตั้งค่า Perspective ให้ลึกสมจริง */
            perspective: 500px;
            perspective-origin: 50% 45%; 
            background-color: #0f172a; 
            opacity: 0; transition: opacity 1s ease 0.5s; 
            z-index: 0;
            overflow: hidden;
        }
        .shop-window.is-open .shop-interior { opacity: 1; }

        .scene-3d {
            position: absolute; inset: 0;
            transform-style: preserve-3d;
        }

        /* กำแพงด้านหลังสุด */
        .back-wall {
            position: absolute; inset: 0;
            transform: translateZ(-600px); /* ดันถอยหลังไป 600px */
            background-color: #f1f5f9;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.03) 40px, rgba(0,0,0,0.03) 80px);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            border-left: 2px solid #cbd5e1; border-right: 2px solid #cbd5e1;
        }

        /* กำแพงซ้าย (พับลึกเข้าไป) */
        .left-wall {
            position: absolute; left: 0; top: 0;
            width: 600px; /* ความลึกเท่ากับระยะ translateZ */
            height: 100%;
            transform-origin: left;
            transform: rotateY(90deg); /* หักศอก 90 องศา */
            background-color: #e2e8f0;
            border-bottom: 5px solid #cbd5e1;
        }

        /* กำแพงขวา (พับลึกเข้าไป) */
        .right-wall {
            position: absolute; right: 0; top: 0;
            width: 600px; height: 100%;
            transform-origin: right;
            transform: rotateY(-90deg);
            background-color: #e2e8f0;
            border-bottom: 5px solid #cbd5e1;
        }

        /* พื้น (ลายกระเบื้องหมากรุก) */
        .floor-3d {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 600px;
            transform-origin: bottom;
            transform: rotateX(90deg); /* พับลงเป็นพื้น */
            background-color: #cbd5e1;
            background-image: 
                linear-gradient(45deg, #94a3b8 25%, transparent 25%, transparent 75%, #94a3b8 75%, #94a3b8),
                linear-gradient(45deg, #94a3b8 25%, transparent 25%, transparent 75%, #94a3b8 75%, #94a3b8);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
        }

        /* ฝ้าเพดาน (หลอดไฟ) */
        .ceiling-3d {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 600px;
            transform-origin: top;
            transform: rotateX(-90deg); /* พับขึ้นเป็นเพดาน */
            background-color: #ffffff;
            background-image: linear-gradient(90deg, transparent 40%, #fef08a 40%, #fef08a 60%, transparent 60%);
            background-size: 200px 100%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }

        /* --- เฟอร์นิเจอร์หลังร้าน (Cashier & Monitor) --- */
        .cashier-counter {
            width: 100%; height: 80px;
            background: linear-gradient(to bottom, #d4a373, #bc6c25); /* สีไม้ */
            position: relative;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.1);
            border-top: 8px solid #faedcd;
        }
        
        .digital-monitor {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background-color: #0f172a; color: #38bdf8;
            padding: 10px 25px; border-radius: 8px; border: 4px solid #334155;
            text-align: center; box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }
        .monitor-title { font-size: 1rem; font-weight: 700; letter-spacing: 2px; color: #94a3b8; }
        .monitor-time { font-size: 3rem; font-weight: 900; line-height: 1; text-shadow: 0 0 10px rgba(56, 189, 248, 0.8); }

        .door-back {
            position: absolute; bottom: 80px; left: 30px;
            width: 80px; height: 160px; background-color: #94a3b8;
            border: 4px solid #64748b; border-radius: 4px 4px 0 0;
        }

        /* --- ชั้นวางสินค้า 3D Perspective --- */
        .shelf-board {
            position: absolute; left: 0; width: 100%; height: 12px;
            background-color: #cbd5e1; border-top: 2px solid #f1f5f9; border-bottom: 3px solid #94a3b8;
        }
        .sb-1 { top: 30%; }
        .sb-2 { top: 60%; }
        .sb-3 { top: 90%; }

        /* กราฟิกกล่องสินค้า (Flat items on shelf) */
        .prod-box {
            position: absolute; bottom: 12px; /* วางบนชั้นพอดี */
            width: 35px; height: 50px; border-radius: 3px;
            border: 2px solid rgba(0,0,0,0.1);
            box-shadow: 5px 0 5px rgba(0,0,0,0.1);
        }
        .prod-box::after { /* ฉลากสีขาว */
            content: ''; position: absolute; top: 8px; left: 4px; right: 4px; height: 18px;
            background: rgba(255,255,255,0.85); border-radius: 2px;
        }
        .prod-wide {
            position: absolute; bottom: 12px;
            width: 60px; height: 40px; border-radius: 6px; border: 2px solid rgba(0,0,0,0.1);
        }
        .prod-wide::after {
            content: ''; position: absolute; top: 6px; left: 6px; right: 6px; height: 12px;
            background: rgba(255,255,255,0.85); border-radius: 3px;
        }
        
        /* สีของสินค้าแบบในร้านเบบี้ช็อป */
        .c-orange { background-color: #ff6a00; }
        .c-blue { background-color: #1c75bc; }
        .c-green { background-color: #00a651; }
        .c-pink { background-color: #ec008c; }
        .c-purple { background-color: #8b5cf6; }

        /* --- Swipe Hint Overlays (อยู่เหนือ 3D) --- */
        .swipe-hint-ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255,255,255,0.9); padding: 8px 16px; border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 20;
            color: #475569; animation: float-inline 2s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes float-inline { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, 8px); } }

        /* --- ประตูเหล็กม้วน --- */
        #shutter-door {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; z-index: 10; touch-action: none;
            transform: translateY(0%); transition: transform 2s linear; box-shadow: 0 15px 25px rgba(0,0,0,0.7);
        }
        .shutter-curtain {
            flex: 1; width: 100%;
            background: repeating-linear-gradient(to bottom, #94a3b8, #94a3b8 12px, #64748b 12px, #64748b 14px);
            display: flex; align-items: center; justify-content: center;
        }
        .shutter-bottom-bar {
            height: 45px; width: 100%; background: #475569;
            border-top: 2px solid #cbd5e1; border-bottom: 6px solid #1e293b;
        }
        .shutter-logo {
            background: rgba(255, 255, 255, 0.95); padding: 1.2rem 2rem; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25); border: 2px solid #cbd5e1; text-align: center; transition: opacity 0.5s ease;
        }
        
        .swipe-hint {
            position: absolute; bottom: -65px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; opacity: 0.6;
            animation: float-up 2s infinite ease-in-out; pointer-events: none; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        @keyframes float-up { 0% { transform: translate(-50%, 0); opacity: 0; } 30% { opacity: 0.9; } 100% { transform: translate(-50%, -25px); opacity: 0; } }

        .floor-ground {
            width: 100%; height: 25px; background-color: #64748b; box-shadow: inset 0 5px 15px rgba(0,0,0,0.4);
        }

    </style>
</head>
<body>

    <!-- นาฬิกาหลัก (ลอยอยู่บนฟ้า) -->
    <div class="absolute top-6 text-center w-full z-20">
        <h1 class="text-6xl font-bold text-white drop-shadow-md tracking-wider" id="global-time">00:00</h1>
    </div>

    <!-- วิวต้นไม้ด้านหลัง -->
    <div class="trees-bg">
        <div class="tree-main"></div>
        <div class="palm-leaves">
            <div class="palm-leaf"></div>
            <div class="palm-leaf"></div>
            <div class="palm-leaf"></div>
            <div class="palm-leaf"></div>
            <div class="palm-leaf"></div>
            <div class="palm-leaf"></div>
        </div>
        <div class="neighbor-roof"></div>
    </div>

    <!-- โครงสร้างร้าน -->
    <div class="shop-building" id="shop-area">
        
        <!-- ป้ายร้าน (Signage) -->
        <div class="signage-container">
            <div class="steel-frame"></div>
            <h1 class="shop-name-text">
                <span style="color: #ff6a00">รั</span><span style="color: #1c75bc">ก</span><span style="color: #00a651">ษ์</span><span style="color: #ec008c">ย</span><span style="color: #ff6a00">า</span><span style="color: #1c75bc">เ</span><span style="color: #00a651">บ</span><span style="color: #ec008c">บี้</span><span style="color: #6b21a8">ช็</span><span style="color: #1c75bc">อ</span><span style="color: #8b5cf6">ป</span>
            </h1>
            <div class="sub-sign">นมผง ของใช้เด็ก ปลีก-ส่ง</div>
        </div>

        <!-- หลังคา -->
        <div class="shop-roof"></div>
        <div class="white-trim"></div>

        <!-- ตัวร้าน -->
        <div class="shop-body">
            
            <div class="pillar"></div>

            <!-- หน้าต่างร้าน -->
            <div class="shop-window" id="shop-window">
                
                <!-- ภายในร้าน 3D Perspective -->
                <div class="shop-interior">
                    
                    <div class="scene-3d">
                        <!-- เพดานและพื้น -->
                        <div class="ceiling-3d"></div>
                        <div class="floor-3d"></div>

                        <!-- กำแพงด้านหลัง (จอเวลา + แคชเชียร์) -->
                        <div class="back-wall">
                            <div class="door-back"></div>
                            
                            <div class="digital-monitor">
                                <div class="monitor-title">เวลาเข้างาน</div>
                                <div class="monitor-time" id="in-time-log">--:--</div>
                            </div>

                            <div class="cashier-counter"></div>
                        </div>

                        <!-- กำแพงซ้าย (ชั้นวางนม) -->
                        <div class="left-wall">
                            <!-- ชั้น 1 (บนสุด) -->
                            <div class="shelf-board sb-1">
                                <div class="prod-box c-pink" style="left: 100px;"></div>
                                <div class="prod-box c-pink" style="left: 140px;"></div>
                                <div class="prod-wide c-blue" style="left: 280px;"></div>
                                <div class="prod-box c-green" style="left: 450px;"></div>
                            </div>
                            <!-- ชั้น 2 -->
                            <div class="shelf-board sb-2">
                                <div class="prod-wide c-orange" style="left: 80px;"></div>
                                <div class="prod-box c-purple" style="left: 220px;"></div>
                                <div class="prod-box c-purple" style="left: 260px;"></div>
                                <div class="prod-wide c-green" style="left: 400px;"></div>
                            </div>
                            <!-- ชั้น 3 -->
                            <div class="shelf-board sb-3">
                                <div class="prod-box c-blue" style="left: 120px;"></div>
                                <div class="prod-wide c-pink" style="left: 300px;"></div>
                                <div class="prod-box c-orange" style="left: 480px;"></div>
                            </div>
                        </div>

                        <!-- กำแพงขวา (ชั้นวางของ) -->
                        <div class="right-wall">
                            <!-- ชั้น 1 -->
                            <div class="shelf-board sb-1">
                                <div class="prod-box c-orange" style="right: 150px;"></div>
                                <div class="prod-wide c-purple" style="right: 250px;"></div>
                                <div class="prod-box c-blue" style="right: 420px;"></div>
                            </div>
                            <!-- ชั้น 2 -->
                            <div class="shelf-board sb-2">
                                <div class="prod-wide c-pink" style="right: 120px;"></div>
                                <div class="prod-box c-green" style="right: 300px;"></div>
                                <div class="prod-wide c-orange" style="right: 450px;"></div>
                            </div>
                            <!-- ชั้น 3 -->
                            <div class="shelf-board sb-3">
                                <div class="prod-box c-purple" style="right: 180px;"></div>
                                <div class="prod-box c-blue" style="right: 220px;"></div>
                                <div class="prod-wide c-green" style="right: 380px;"></div>
                            </div>
                        </div>

                    </div>

                    <!-- Swipe Hint Overlay ตอนร้านเปิด -->
                    <div class="swipe-hint-ui" id="hint-close" style="display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <polyline points="19 12 12 19 5 12"></polyline>
                        </svg>
                        <span class="text-[12px] font-bold tracking-wide mt-1">ปัดลงเพื่อปิดร้าน</span>
                    </div>

                </div>

                <!-- ประตูเหล็กม้วนไฟฟ้า -->
                <div id="shutter-door">
                    <div class="shutter-curtain">
                        
                        <div class="shutter-logo" id="shutter-logo">
                            <h2 class="text-xl font-bold text-slate-700 mb-1">ระบบลงเวลาพนักงาน</h2>
                            <p class="text-rose-500 font-bold text-lg uppercase tracking-widest border-b-2 border-slate-100 pb-2 mb-2">ร้านปิดบริการ</p>
                            <p class="text-xs text-slate-500">เวลาออกงานล่าสุด:</p>
                            <p id="out-time-log" class="font-bold text-slate-800 text-2xl">--:--</p>
                        </div>

                        <!-- Swipe Hint (ปัดขึ้น) -->
                        <div class="swipe-hint" id="hint-open">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="mb-1">
                                <line x1="12" y1="19" x2="12" y2="5"></line>
                                <polyline points="5 12 12 5 19 12"></polyline>
                            </svg>
                            <span class="text-sm font-bold tracking-wide">ปัดขึ้นเพื่อเปิดร้าน</span>
                        </div>

                    </div>
                    <div class="shutter-bottom-bar" id="bottom-bar"></div>
                </div>

            </div>

            <div class="pillar">
                <div class="motor-panel">
                    <div class="motor-light" id="motor-light"></div>
                </div>
            </div>

        </div>
    </div>
    
    <div class="floor-ground"></div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('global-time').textContent = timeStr;
            return timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const shopArea = document.getElementById('shop-area'); 
        const shutter = document.getElementById('shutter-door');
        const shopWindow = document.getElementById('shop-window');
        const bottomBar = document.getElementById('bottom-bar');
        
        const motorLight = document.getElementById('motor-light');
        const inTimeLog = document.getElementById('in-time-log');
        const outTimeLog = document.getElementById('out-time-log');
        const shutterLogo = document.getElementById('shutter-logo');
        const hintOpen = document.getElementById('hint-open');
        const hintClose = document.getElementById('hint-close');

        let isOpen = false;
        let isMoving = false; 
        
        let touchStartY = 0;
        let touchEndY = 0;
        const SWIPE_THRESHOLD = 40;

        function handleSwipeStart(e) {
            if (isMoving) return; 
            touchStartY = e.changedTouches ? e.changedTouches[0].screenY : e.screenY;
        }

        function handleSwipeEnd(e) {
            if (isMoving) return;
            touchEndY = e.changedTouches ? e.changedTouches[0].screenY : e.screenY;
            handleSwipeDirection();
        }

        function handleSwipeDirection() {
            const swipeDistance = touchStartY - touchEndY; 
            
            if (Math.abs(swipeDistance) > SWIPE_THRESHOLD) {
                if (swipeDistance > 0 && !isOpen) {
                    operateMotor('open'); 
                } else if (swipeDistance < 0 && isOpen) {
                    operateMotor('close'); 
                }
            }
        }

        function operateMotor(action) {
            isMoving = true;
            motorLight.className = 'motor-light active';
            
            shutterLogo.style.opacity = '0';
            hintOpen.style.display = 'none';
            hintClose.style.display = 'none';

            if (navigator.vibrate) navigator.vibrate(100); 

            const maxTravel = shutter.offsetHeight - bottomBar.offsetHeight;

            if (action === 'open') {
                shutter.style.transform = `translateY(-${maxTravel}px)`;
                
                setTimeout(() => {
                    isOpen = true;
                    isMoving = false;
                    
                    shopWindow.classList.add('is-open');
                    const time = updateClock();
                    inTimeLog.textContent = time; // อัปเดตเวลาบนจอดิจิทัลหลังร้าน
                    
                    motorLight.className = 'motor-light open';
                    hintClose.style.display = 'flex'; 
                    
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]); 
                }, 2000); 

            } else {
                shopWindow.classList.remove('is-open'); 
                shutter.style.transform = `translateY(0px)`; 
                
                setTimeout(() => {
                    isOpen = false;
                    isMoving = false;
                    
                    shutterLogo.style.opacity = '1';
                    const time = updateClock();
                    outTimeLog.textContent = time;
                    
                    motorLight.className = 'motor-light';
                    hintOpen.style.display = 'flex'; 
                    
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                }, 2000);
            }
        }

        shopArea.addEventListener('touchstart', handleSwipeStart, { passive: true });
        shopArea.addEventListener('touchend', handleSwipeEnd, { passive: true });

        shopArea.addEventListener('mousedown', (e) => {
            handleSwipeStart(e);
            shopArea.style.cursor = 'grabbing';
        });
        
        shopArea.addEventListener('mouseup', (e) => {
            handleSwipeEnd(e);
            shopArea.style.cursor = 'default';
        });
        
        shopArea.addEventListener('dragstart', (e) => e.preventDefault());

        window.addEventListener('resize', () => {
            if (isOpen && !isMoving) {
                shutter.style.transition = 'none'; 
                const maxTravel = shutter.offsetHeight - bottomBar.offsetHeight;
                shutter.style.transform = `translateY(-${maxTravel}px)`;
                setTimeout(() => { shutter.style.transition = 'transform 2s linear'; }, 50);
            }
        });
    </script>
</body>
</html>
