<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบลงเวลาเข้า-ออกงาน (Enterprise)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 h-screen flex flex-col items-center p-4 font-sans transition-colors duration-300">

    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-6 mt-2 text-center transition-colors duration-300">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">ระบบลงเวลาทำงาน</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1" id="currentDate">กำลังโหลดวันที่...</p>
        <div class="text-5xl font-mono font-bold text-blue-600 dark:text-blue-400 mt-4" id="currentTime">00:00:00</div>
    </div>

    <div class="w-full max-w-md mt-6 flex flex-col items-center relative">
        <input type="file" id="cameraInput" accept="image/*" capture="user" class="hidden" onchange="processCheckIn(event)">
        
        <button id="actionBtn" onclick="initiateAction()" 
            class="w-48 h-48 rounded-full text-white text-3xl font-bold shadow-lg transition-transform transform active:scale-95 flex flex-col items-center justify-center bg-gray-400 cursor-not-allowed">
            <span id="btnText">รอพิกัด</span>
            <span id="btnSubText" class="text-sm font-normal mt-2 opacity-80">...</span>
        </button>
        
        <div class="w-full mt-6 px-4">
            <input type="text" id="noteInput" placeholder="เพิ่มหมายเหตุ (ถ้ามี)..." 
                class="w-full p-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <p id="locationStatus" class="mt-4 text-xs text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 px-3 py-1 rounded-full shadow-sm text-center">
            📍 กำลังคำนวณระยะทางจากออฟฟิศ...
        </p>
    </div>

    <div class="w-full max-w-md mt-6 bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-6 flex-grow mb-4 overflow-hidden flex flex-col transition-colors duration-300">
        <div class="flex justify-between items-center mb-4 border-b dark:border-gray-700 pb-2">
            <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100">ประวัติการลงเวลา</h2>
            <button onclick="exportCSV()" class="text-xs bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 px-3 py-1 rounded-full font-bold">
                📥 โหลดไฟล์
            </button>
        </div>
        <div id="logHistory" class="overflow-y-auto flex-grow space-y-3 pr-2"></div>
    </div>

    <script>
        let isCheckedIn = false;
        let isLocationValid = false;
        let logs = JSON.parse(localStorage.getItem('timeLogs')) || [];

        // 📍 ตั้งค่าพิกัดออฟฟิศของคุณตรงนี้ (ตอนนี้ตั้งเป็นอนุสาวรีย์ชัยฯ ไว้เป็นตัวอย่าง)
        const OFFICE_LAT = 13.7649; 
        const OFFICE_LNG = 100.5383;
        const ALLOWED_RADIUS_METERS = 100; // อนุญาตให้กดได้ในรัศมี 100 เมตร

        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('th-TH', { hour12: false });
            document.getElementById('currentDate').innerText = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function initApp() {
            if (logs.length > 0 && logs[0].type === 'เข้างาน') {
                isCheckedIn = true;
            }
            trackLocation();
            renderLogs();
        }

        // สูตรคำนวณระยะทาง GPS (Haversine Formula)
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            var R = 6371; // รัศมีโลก
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function trackLocation() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        const distanceKm = getDistanceFromLatLonInKm(OFFICE_LAT, OFFICE_LNG, position.coords.latitude, position.coords.longitude);
                        const distanceMeters = Math.floor(distanceKm * 1000);
                        const statusText = document.getElementById('locationStatus');

                        if (distanceMeters <= ALLOWED_RADIUS_METERS) {
                            isLocationValid = true;
                            statusText.innerHTML = `📍 อยู่ในพื้นที่ออฟฟิศ (ห่าง ${distanceMeters} ม.)`;
                            statusText.classList.replace('text-red-500', 'text-green-600');
                        } else {
                            isLocationValid = false;
                            statusText.innerHTML = `🚫 อยู่นอกพื้นที่ (ห่าง ${distanceMeters} ม. จากออฟฟิศ)`;
                            statusText.classList.add('text-red-500');
                        }
                        updateButtonUI();
                    },
                    (error) => {
                        document.getElementById('locationStatus').innerHTML = "⚠️ กรุณาเปิด GPS เพื่อลงเวลา";
                    },
                    { enableHighAccuracy: true } // บังคับให้ GPS แม่นยำที่สุด
                );
            }
        }

        function initiateAction() {
            if (!isLocationValid) {
                alert("คุณยังไม่ได้อยู่ในระยะที่กำหนด (100 เมตรจากออฟฟิศ)");
                return;
            }
            if (isCheckedIn) {
                const confirmOut = confirm("คุณต้องการ 'ลงเวลาออกงาน' ใช่หรือไม่?");
                if (!confirmOut) return;
            }
            // เรียกเปิดกล้อง
            document.getElementById('cameraInput').click();
        }

        // เมื่อถ่ายรูปเสร็จ ให้แปลงรูปและบันทึกข้อมูล
        function processCheckIn(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const photoBase64 = e.target.result;
                saveLog(photoBase64);
            };
            reader.readAsDataURL(file);
        }

        function saveLog(photoBase64) {
            const noteInput = document.getElementById('noteInput');
            const now = new Date();
            const newLog = {
                id: now.getTime(),
                date: now.toLocaleDateString('th-TH'),
                time: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                type: isCheckedIn ? 'ออกงาน' : 'เข้างาน',
                note: noteInput.value.trim() || "-",
                photo: photoBase64 // เซฟรูป
            };

            logs.unshift(newLog);
            localStorage.setItem('timeLogs', JSON.stringify(logs));

            isCheckedIn = !isCheckedIn;
            noteInput.value = ''; 
            document.getElementById('cameraInput').value = ''; // ล้างค่ากล้อง
            updateButtonUI();
            renderLogs();
        }

        function updateButtonUI() {
            const btn = document.getElementById('actionBtn');
            const btnText = document.getElementById('btnText');
            
            // ล้างคลาสสีเดิม
            btn.classList.remove('bg-gray-400', 'bg-green-500', 'bg-red-500', 'hover:bg-green-600', 'hover:bg-red-600', 'cursor-not-allowed');

            if (!isLocationValid) {
                btn.classList.add('bg-gray-400', 'cursor-not-allowed');
                btnText.innerText = 'ล็อก';
            } else if (isCheckedIn) {
                btn.classList.add('bg-red-500', 'hover:bg-red-600');
                btnText.innerText = 'ออกงาน';
            } else {
                btn.classList.add('bg-green-500', 'hover:bg-green-600');
                btnText.innerText = 'เข้างาน';
            }
        }

        function renderLogs() {
            const logContainer = document.getElementById('logHistory');
            logContainer.innerHTML = '';
            logs.slice(0, 10).forEach(log => {
                const colorClass = log.type === 'เข้างาน' 
                    ? 'text-green-600 bg-green-50 border-green-100' 
                    : 'text-red-600 bg-red-50 border-red-100';
                
                logContainer.innerHTML += `
                    <div class="flex items-center p-3 rounded-lg border ${colorClass}">
                        <img src="${log.photo}" class="w-12 h-12 rounded-full object-cover mr-4 shadow-sm border border-gray-200" alt="Selfie">
                        <div class="flex flex-col flex-grow">
                            <div class="flex justify-between w-full">
                                <span class="font-bold">${log.type}</span>
                                <span class="font-mono font-bold">${log.time}</span>
                            </div>
                            <span class="text-xs opacity-70">${log.date} ${log.note !== "-" ? `| 📝 ${log.note}` : ''}</span>
                        </div>
                    </div>
                `;
            });
        }

        function exportCSV() {
            // โค้ด Export เดิมละไว้เพื่อให้โฟกัสที่ระบบใหม่
            alert("เนื่องจากมีรูปภาพเข้ามาเกี่ยวข้อง การ Export ข้อมูลควรทำผ่าน Database กลางครับ");
        }

        initApp();
    </script>
</body>
</html>
