<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeTracker Mobile</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Hide scrollbar for a cleaner mobile app look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* View Management Classes */
        .view-hidden { display: none !important; }
        .view-active { display: flex !important; }
        .tab-hidden { display: none !important; }
        .tab-active { display: block !important; }

        /* Smooth Transitions */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-200 h-screen w-screen flex items-center justify-center font-sans text-slate-900 overflow-hidden selection:bg-indigo-100">

    <!-- Mobile App Wrapper -->
    <div id="app-wrapper" class="w-full h-full sm:h-[90vh] sm:max-h-[850px] sm:max-w-[400px] bg-slate-50 sm:rounded-[2.5rem] sm:shadow-2xl overflow-hidden relative flex flex-col sm:border-[8px] border-slate-300">
        
        <!-- 1. LOADING VIEW -->
        <div id="view-loading" class="view-active flex-col items-center justify-center h-full gap-4 text-slate-500 bg-slate-50 z-50 absolute inset-0">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl text-indigo-500"></i>
            <p class="font-medium animate-pulse text-sm">Connecting to cloud...</p>
        </div>

        <!-- 2. PIN PAD VIEW (Default Entry) -->
        <div id="view-pin" class="view-hidden flex-col h-full bg-slate-50 absolute inset-0 z-40">
            <!-- Informational Top Half -->
            <div class="flex-1 flex flex-col items-center justify-center p-6 mt-8">
                <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-200">
                    <i class="fa-solid fa-clock text-4xl text-white"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-900 mb-2">TimeTracker</h2>
                <span class="font-medium text-sm text-slate-500 px-4 py-2 rounded-full bg-slate-200">Enter your 4-digit PIN</span>

                <!-- PIN Indicator Dots -->
                <div id="pin-dots" class="flex gap-5 mt-10">
                    <div class="w-5 h-5 rounded-full bg-slate-300 transition-all duration-200"></div>
                    <div class="w-5 h-5 rounded-full bg-slate-300 transition-all duration-200"></div>
                    <div class="w-5 h-5 rounded-full bg-slate-300 transition-all duration-200"></div>
                    <div class="w-5 h-5 rounded-full bg-slate-300 transition-all duration-200"></div>
                </div>
                <p id="pin-error" class="text-rose-500 text-sm font-bold mt-6 opacity-0 transition-opacity bg-rose-100 px-4 py-1.5 rounded-full">Incorrect PIN</p>
            </div>

            <!-- Bottom-Anchored Numpad (Thumb Zone) -->
            <div class="bg-white p-6 grid grid-cols-3 gap-y-4 gap-x-6 pb-12 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] border-t border-slate-100">
                <!-- Numpad buttons generated in JS -->
            </div>
        </div>

        <!-- 3. MAIN APP VIEW (Container for Employee/Owner) -->
        <div id="view-main" class="view-hidden flex-col h-full absolute inset-0 z-30 bg-slate-50 overflow-hidden">
            
            <!-- A. EMPLOYEE INTERFACE -->
            <div id="interface-employee" class="tab-hidden flex-col h-full fade-in relative">
                
                <!-- Scrollable Content Area -->
                <div class="flex-1 overflow-y-auto pb-48">
                    <!-- Minimal Profile Header -->
                    <div class="px-6 py-6 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-indigo-100 rounded-full flex items-center justify-center overflow-hidden border-2 border-white shadow-sm">
                                <span id="emp-avatar-initial" class="text-2xl font-bold text-indigo-600">?</span>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-0.5" id="emp-current-date">--</p>
                                <h2 class="font-bold text-slate-900 text-xl leading-tight" id="emp-profile-name">Loading...</h2>
                            </div>
                        </div>
                        <div id="emp-status-badge" class="px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider bg-slate-200 text-slate-600 shadow-inner">OUT</div>
                    </div>

                    <!-- Main Clock & Stats Area -->
                    <div class="flex flex-col items-center justify-center py-4 px-4">
                        <div class="w-56 h-56 rounded-full bg-white shadow-[0_10px_40px_rgba(0,0,0,0.05)] border-[8px] border-slate-50 flex flex-col items-center justify-center relative mb-8">
                            <div id="emp-clock-ring" class="absolute inset-0 rounded-full border-[6px] border-green-500 opacity-20 animate-ping hidden" style="animation-duration: 3s;"></div>
                            <div id="emp-clock-time" class="text-5xl font-bold text-slate-800 tracking-tighter font-mono">00:00:00</div>
                            <div id="emp-clock-ampm" class="text-base font-bold text-slate-400 mt-1 uppercase">AM</div>
                        </div>
                        
                        <div class="flex items-center gap-2 text-indigo-700 bg-indigo-100 px-5 py-2.5 rounded-full">
                            <i class="fa-solid fa-chart-line"></i>
                            <span class="font-bold text-sm" id="emp-worked-hours">0h 0m Active</span>
                        </div>
                    </div>

                    <!-- Recent Activity Mini List -->
                    <div class="px-6 mt-4">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Today's Punches</p>
                        <div id="emp-logs-container" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden divide-y divide-slate-50 mb-6">
                            <!-- Logs injected here -->
                        </div>
                    </div>
                </div>

                <!-- BOTTOM FIXED DOCK (Thumb Zone) -->
                <div class="absolute bottom-0 w-full bg-white border-t border-slate-100 p-6 pb-8 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] rounded-t-[2.5rem] z-20">
                    <div id="emp-action-buttons" class="space-y-3 mb-3">
                        <!-- Dynamic Punch Buttons -->
                    </div>
                    <button onclick="logout()" class="w-full h-14 bg-slate-100 text-slate-600 rounded-2xl font-bold text-base flex items-center justify-center gap-2 active:bg-slate-200 transition-colors">
                        <i class="fa-solid fa-right-from-bracket"></i> Exit to Kiosk
                    </button>
                </div>
            </div>

            <!-- B. OWNER INTERFACE -->
            <div id="interface-owner" class="tab-hidden flex-col h-full fade-in relative bg-slate-50">
                
                <!-- Informational Top Header -->
                <div class="px-6 py-5 bg-white shadow-sm z-10 flex items-center justify-between">
                    <div>
                        <h1 class="text-xl font-bold text-slate-900">Owner Dashboard</h1>
                        <p class="text-xs text-slate-500 font-medium flex items-center gap-1 mt-0.5"><i class="fa-solid fa-cloud text-indigo-400"></i> Synced securely</p>
                    </div>
                    <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500">
                        <i class="fa-solid fa-briefcase"></i>
                    </div>
                </div>

                <!-- Scrollable Area -->
                <div class="flex-1 overflow-y-auto pb-32">
                    <!-- LIVE TAB CONTENT -->
                    <div id="owner-tab-live" class="tab-active space-y-4 p-4 fade-in">
                        <div class="bg-slate-900 rounded-3xl p-6 text-white flex justify-between items-center shadow-lg">
                            <div>
                                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Working Now</p>
                                <div class="text-4xl font-bold flex items-baseline gap-2">
                                    <span id="own-active-count">0</span> <span class="text-xl text-slate-500 font-medium" id="own-total-count">/ 0</span>
                                </div>
                            </div>
                            <div class="w-14 h-14 rounded-full bg-green-500/20 flex items-center justify-center">
                                <div class="w-5 h-5 rounded-full bg-green-500 animate-pulse"></div>
                            </div>
                        </div>

                        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider px-2 mt-6">Current Status</h3>
                        <div id="own-live-list" class="space-y-3">
                            <!-- Live items injected here -->
                        </div>
                    </div>

                    <!-- DIRECTORY TAB CONTENT -->
                    <div id="owner-tab-team" class="tab-hidden space-y-3 p-4 fade-in">
                        <div id="own-team-list" class="space-y-3 pb-6">
                            <!-- Team items injected here -->
                        </div>
                    </div>
                </div>

                <!-- Floating Add Button (Slightly higher to clear bottom nav) -->
                <button onclick="openModal()" id="own-fab-add" class="hidden absolute bottom-32 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-[0_10px_25px_rgba(79,70,229,0.4)] active:scale-95 transition-transform z-20">
                    <i class="fa-solid fa-user-plus text-2xl"></i>
                </button>

                <!-- BOTTOM NAVIGATION BAR (Thumb Zone) -->
                <div class="absolute bottom-0 w-full bg-white border-t border-slate-100 px-6 py-4 pb-8 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] rounded-t-[2.5rem] flex justify-between items-center z-20">
                    <button onclick="switchOwnerTab('LIVE')" id="nav-btn-live" class="flex-1 flex flex-col items-center gap-1.5 text-indigo-600 transition-colors">
                        <i class="fa-solid fa-tower-broadcast text-xl"></i>
                        <span class="text-xs font-bold">Live</span>
                    </button>
                    
                    <button onclick="switchOwnerTab('TEAM')" id="nav-btn-team" class="flex-1 flex flex-col items-center gap-1.5 text-slate-400 hover:text-slate-600 transition-colors">
                        <i class="fa-solid fa-address-book text-xl"></i>
                        <span class="text-xs font-bold">Directory</span>
                    </button>
                    
                    <button onclick="logout()" class="flex-1 flex flex-col items-center gap-1.5 text-slate-400 hover:text-rose-500 transition-colors">
                        <i class="fa-solid fa-right-from-bracket text-xl"></i>
                        <span class="text-xs font-bold">Exit</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 4. ADD/EDIT EMPLOYEE BOTTOM SHEET MODAL -->
        <div id="modal-employee" class="view-hidden absolute inset-0 z-50 flex-col justify-end bg-slate-900/60 backdrop-blur-sm fade-in">
            <div class="bg-white w-full rounded-t-[2.5rem] pt-8 pb-10 px-6 shadow-2xl transition-transform transform translate-y-0">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="modal-title" class="text-2xl font-bold text-slate-900">New Member</h3>
                </div>
                
                <form id="employee-form" class="space-y-5">
                    <input type="hidden" id="form-emp-id">
                    
                    <div class="space-y-4">
                        <input type="text" id="form-emp-name" required placeholder="Full Name" class="w-full bg-slate-50 px-5 py-4 rounded-2xl border border-slate-200 outline-none focus:border-indigo-500 focus:bg-indigo-50/30 transition-colors text-slate-900 font-medium text-lg">
                        <input type="text" id="form-emp-role" required placeholder="Role (e.g. Designer)" class="w-full bg-slate-50 px-5 py-4 rounded-2xl border border-slate-200 outline-none focus:border-indigo-500 focus:bg-indigo-50/30 transition-colors text-slate-900 font-medium text-lg">
                        
                        <div class="pt-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Kiosk Login PIN</label>
                            <input type="text" id="form-emp-pin" required maxlength="4" pattern="\d{4}" placeholder="4-Digit Code" class="w-full bg-slate-50 px-5 py-4 rounded-2xl border border-slate-200 outline-none focus:border-indigo-500 focus:bg-indigo-50/30 transition-colors text-indigo-700 font-mono tracking-[0.5em] text-xl font-bold text-center">
                        </div>
                    </div>

                    <!-- Bottom Modal Actions -->
                    <div class="pt-4 flex flex-col gap-3">
                        <button type="submit" id="form-btn-submit" class="w-full h-16 bg-indigo-600 text-white font-bold text-lg rounded-2xl active:bg-indigo-700 transition-colors shadow-md">
                            Save Employee
                        </button>
                        <div class="flex gap-3">
                            <button type="button" id="form-btn-delete" onclick="deleteCurrentEmployee()" class="hidden flex-1 h-14 bg-rose-50 text-rose-600 font-bold rounded-2xl active:bg-rose-100 flex items-center justify-center gap-2">
                                <i class="fa-solid fa-trash"></i> Delete
                            </button>
                            <button type="button" onclick="closeModal()" class="flex-1 h-14 bg-slate-100 text-slate-600 font-bold rounded-2xl active:bg-slate-200">
                                Cancel
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <!-- FIREBASE & APP LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- App State ---
        const state = {
            user: null,
            selectedRole: null, // 'EMPLOYEE' | 'OWNER'
            isUnlocked: false,
            pinBuffer: '',
            
            // Public Team Directory
            teamEmployees: [],
            
            // Logged in Employee Session state
            currentEmployee: null,
            currentEmployeeLogs: [],
            
            // Owner UI State
            ownerActiveTab: 'LIVE',
            editingEmployeeId: null
        };

        // --- Setup Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyBHuZGyY1F3v4rCrhrpt9YB90C0Ahh-stE",
            authDomain: "my-company-time-tracking.firebaseapp.com",
            projectId: "my-company-time-tracking",
            storageBucket: "my-company-time-tracking.firebasestorage.app",
            messagingSenderId: "758524847747",
            appId: "1:758524847747:web:2e5a49e4064334f1265db6",
            measurementId: "G-50SYJKTRT1"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- View Management ---
        const views = {
            loading: document.getElementById('view-loading'),
            pin: document.getElementById('view-pin'),
            main: document.getElementById('view-main'),
            modal: document.getElementById('modal-employee')
        };

        function showView(viewName) {
            Object.values(views).forEach(v => {
                v.classList.remove('view-active');
                v.classList.add('view-hidden');
            });
            if(views[viewName]) {
                views[viewName].classList.remove('view-hidden');
                views[viewName].classList.add('view-active');
            }
        }

        // --- Authentication ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenError) {
                        console.warn("Custom token mismatch. Falling back to anonymous sign-in.");
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error('Auth Error:', error);
                alert("Authentication failed. Check console.");
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                state.user = user;
                setupFirestoreListeners();
                renderNumpad();
                updatePinDots();
                showView('pin');
                startGlobalTimer();
            }
        });

        // --- Firestore Listeners ---
        function setupFirestoreListeners() {
            if (!state.user) return;
            
            // Master listener for public team directory
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'employees'), (snapshot) => {
                state.teamEmployees = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                // Keep logged-in profile synced
                if (state.currentEmployee) {
                    const latestProfile = state.teamEmployees.find(e => e.id === state.currentEmployee.id);
                    if (latestProfile) {
                        state.currentEmployee = latestProfile;
                    } else {
                        // Profile deleted by owner
                        logout();
                        return;
                    }
                }
                updateUI();
            }, (error) => console.error("Error fetching team", error));
        }

        let unsubEmployeeLogs = null;
        function setupEmployeeLogsListener(empId) {
            if (unsubEmployeeLogs) unsubEmployeeLogs();
            unsubEmployeeLogs = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'employees', empId, 'logs'), (snapshot) => {
                state.currentEmployeeLogs = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                updateUI();
            }, (error) => console.error("Error fetching logs", error));
        }

        // --- Logic & Global Timer ---
        let globalTimer;
        function startGlobalTimer() {
            if (globalTimer) clearInterval(globalTimer);
            globalTimer = setInterval(() => {
                const now = Date.now();
                
                // Refresh Top Clocks
                const clockTime = document.getElementById('emp-clock-time');
                const clockAmPm = document.getElementById('emp-clock-ampm');
                const clockDate = document.getElementById('emp-current-date');
                
                const dateObj = new Date();
                if (clockTime && clockAmPm) {
                    const timeString = dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
                    const parts = timeString.split(' ');
                    clockTime.innerText = parts[0];
                    clockAmPm.innerText = parts[1];
                }
                if (clockDate) {
                    clockDate.innerText = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                }

                // Tick Active Hours (Employee)
                if (state.selectedRole === 'EMPLOYEE' && state.currentEmployee) {
                    let displaySeconds = state.currentEmployee.secondsWorked || 0;
                    if (state.currentEmployee.status === 'IN' && state.currentEmployee.lastActionTimestamp) {
                        displaySeconds += Math.floor((now - state.currentEmployee.lastActionTimestamp) / 1000);
                    }
                    const empHoursEl = document.getElementById('emp-worked-hours');
                    if (empHoursEl) empHoursEl.innerText = formatDuration(displaySeconds) + ' Active';
                }

                // Tick Active Hours (Owner)
                if (state.selectedRole === 'OWNER' && state.ownerActiveTab === 'LIVE') {
                    state.teamEmployees.forEach(emp => {
                        const timeEl = document.getElementById(`own-time-${emp.id}`);
                        if (timeEl) {
                            let displaySeconds = emp.secondsWorked || 0;
                            if (emp.status === 'IN' && emp.lastActionTimestamp) {
                                displaySeconds += Math.floor((now - emp.lastActionTimestamp) / 1000);
                            }
                            timeEl.innerText = formatDuration(displaySeconds);
                        }
                    });
                }
            }, 1000);
        }

        function formatDuration(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            return `${h}h ${m}m`;
        }
        function formatTimeShort(timestamp) {
            return new Date(timestamp).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        }
        function friendlyActionName(type) {
            if(!type) return 'No activity';
            const map = {
                'CLOCK_IN': 'Clocked In', 'CLOCK_OUT': 'Clocked Out',
                'BREAK_START': 'Started Break', 'BREAK_END': 'Ended Break'
            };
            return map[type] || type.replace('_', ' ');
        }

        // --- Numpad & Navigation Handlers ---
        window.handleNumClick = function(num) {
            if (state.pinBuffer.length < 4) {
                state.pinBuffer += num;
                document.getElementById('pin-error').style.opacity = '0';
                updatePinDots();
                if (state.pinBuffer.length === 4) verifyPin();
            }
        };

        window.handlePinDelete = function() {
            state.pinBuffer = state.pinBuffer.slice(0, -1);
            document.getElementById('pin-error').style.opacity = '0';
            updatePinDots();
        };

        function updatePinDots() {
            const dots = document.getElementById('pin-dots').children;
            for (let i = 0; i < 4; i++) {
                dots[i].className = `w-5 h-5 rounded-full transition-all duration-200 ${state.pinBuffer.length > i ? 'bg-indigo-600 scale-110' : 'bg-slate-200'}`;
            }
        }

        function pinError() {
            const dots = document.getElementById('pin-dots').children;
            for (let i = 0; i < 4; i++) { dots[i].classList.replace('bg-indigo-600', 'bg-rose-500'); }
            document.getElementById('pin-error').style.opacity = '1';
            setTimeout(() => {
                state.pinBuffer = '';
                updatePinDots();
            }, 500);
        }

        function verifyPin() {
            if (state.pinBuffer === '8888') {
                state.selectedRole = 'OWNER';
                state.isUnlocked = true;
                setTimeout(() => { initMainView(); showView('main'); }, 150);
            } else {
                // Check against Employee directory
                const emp = state.teamEmployees.find(e => e.pin === state.pinBuffer);
                if (emp) {
                    state.selectedRole = 'EMPLOYEE';
                    state.currentEmployee = emp;
                    state.isUnlocked = true;
                    setupEmployeeLogsListener(emp.id);
                    setTimeout(() => { initMainView(); showView('main'); }, 150);
                } else {
                    pinError();
                }
            }
        }

        window.logout = function() {
            state.selectedRole = null;
            state.isUnlocked = false;
            state.currentEmployee = null;
            state.currentEmployeeLogs = [];
            state.pinBuffer = '';
            if (unsubEmployeeLogs) { unsubEmployeeLogs(); unsubEmployeeLogs = null; }
            updatePinDots();
            showView('pin');
        };

        // --- Employee Action Engine ---
        window.handleAction = async function(actionType) {
            if (!state.user || !state.currentEmployee) return;
            const now = Date.now();
            const emp = state.currentEmployee;

            let newStatus = emp.status;
            let newSecondsWorked = emp.secondsWorked || 0;
            
            // Calculate time added during this 'IN' session
            if (emp.status === 'IN' && emp.lastActionTimestamp) {
                newSecondsWorked += Math.floor((now - emp.lastActionTimestamp) / 1000);
            }

            if (actionType === 'CLOCK_IN' || actionType === 'BREAK_END') newStatus = 'IN';
            if (actionType === 'CLOCK_OUT') newStatus = 'OUT';
            if (actionType === 'BREAK_START') newStatus = 'BREAK';

            // Optimistic UI Update
            state.currentEmployee.status = newStatus;
            updateUI(); 

            try {
                // 1. Add individual timestamp log
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'employees', emp.id, 'logs'), { 
                    type: actionType, 
                    timestamp: now 
                });
                
                // 2. Update parent employee doc
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', emp.id), { 
                    status: newStatus, 
                    lastAction: friendlyActionName(actionType),
                    lastActionTimestamp: now,
                    secondsWorked: newSecondsWorked
                });
            } catch (err) {
                console.error("Action error", err);
            }
        };

        // --- Owner UI Navigation ---
        window.switchOwnerTab = function(tab) {
            state.ownerActiveTab = tab;
            
            const btnLive = document.getElementById('nav-btn-live');
            const btnTeam = document.getElementById('nav-btn-team');
            const tabLive = document.getElementById('owner-tab-live');
            const tabTeam = document.getElementById('owner-tab-team');
            const fab = document.getElementById('own-fab-add');

            if (tab === 'LIVE') {
                btnLive.className = "flex-1 flex flex-col items-center gap-1.5 text-indigo-600 transition-colors scale-105";
                btnTeam.className = "flex-1 flex flex-col items-center gap-1.5 text-slate-400 hover:text-slate-600 transition-colors";
                tabLive.classList.replace('tab-hidden', 'tab-active');
                tabTeam.classList.replace('tab-active', 'tab-hidden');
                if (fab) fab.classList.add('hidden');
            } else {
                btnTeam.className = "flex-1 flex flex-col items-center gap-1.5 text-indigo-600 transition-colors scale-105";
                btnLive.className = "flex-1 flex flex-col items-center gap-1.5 text-slate-400 hover:text-slate-600 transition-colors";
                tabTeam.classList.replace('tab-hidden', 'tab-active');
                tabLive.classList.replace('tab-active', 'tab-hidden');
                if (fab) fab.classList.remove('hidden');
            }
            updateUI();
        };

        // --- Owner Modal Engine ---
        window.openModal = function(empStr = null) {
            const emp = empStr ? JSON.parse(decodeURIComponent(empStr)) : null;
            state.editingEmployeeId = emp ? emp.id : null;
            
            document.getElementById('modal-title').innerText = emp ? 'Edit Employee' : 'New Employee';
            document.getElementById('form-emp-id').value = emp ? emp.id : '';
            document.getElementById('form-emp-name').value = emp ? emp.name : '';
            document.getElementById('form-emp-role').value = emp ? emp.role : '';
            document.getElementById('form-emp-pin').value = emp ? (emp.pin || '') : '';
            
            document.getElementById('form-btn-submit').innerText = emp ? 'Save Changes' : 'Add Employee';
            
            const delBtn = document.getElementById('form-btn-delete');
            if (emp) {
                delBtn.classList.remove('hidden');
                delBtn.classList.add('flex');
            } else {
                delBtn.classList.remove('flex');
                delBtn.classList.add('hidden');
            }

            showView('modal');
        };

        window.closeModal = function() {
            showView('main');
        };

        document.getElementById('employee-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!state.user) return;
            
            const id = document.getElementById('form-emp-id').value;
            const data = {
                name: document.getElementById('form-emp-name').value,
                role: document.getElementById('form-emp-role').value,
                pin: document.getElementById('form-emp-pin').value
            };

            if(data.pin.length !== 4) {
                alert("PIN must be exactly 4 digits.");
                return;
            }

            closeModal();

            try {
                if (id) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', id), data);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'employees'), {
                        ...data, status: 'OUT', secondsWorked: 0, lastAction: 'Account Created', createdAt: Date.now()
                    });
                }
            } catch (err) { console.error("Error saving employee", err); }
        });

        window.deleteCurrentEmployee = async function() {
            if (!state.editingEmployeeId || !state.user) return;
            // Native confirm is still safest to prevent accidental deletion
            if (confirm("Permanently delete this employee?")) {
                const id = state.editingEmployeeId;
                closeModal();
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', id));
                } catch (err) { console.error("Error deleting", err); }
            }
        };

        // --- Core UI Renderers ---
        function renderNumpad() {
            const pad = document.querySelector('#view-pin .bg-white.grid');
            let html = '';
            for(let i=1; i<=9; i++) {
                html += `<button onclick="handleNumClick('${i}')" class="h-20 w-20 rounded-full mx-auto flex items-center justify-center text-4xl font-medium text-slate-800 bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 active:scale-95 transition-all">${i}</button>`;
            }
            html += `<div></div>`;
            html += `<button onclick="handleNumClick('0')" class="h-20 w-20 rounded-full mx-auto flex items-center justify-center text-4xl font-medium text-slate-800 bg-slate-50 hover:bg-indigo-50 active:bg-indigo-100 active:scale-95 transition-all">0</button>`;
            html += `<button onclick="handlePinDelete()" class="h-20 w-20 rounded-full mx-auto flex items-center justify-center text-slate-500 bg-slate-50 hover:bg-rose-50 active:bg-rose-100 active:scale-95 transition-all"><i class="fa-solid fa-delete-left text-2xl"></i></button>`;
            pad.innerHTML = html;
        }

        function initMainView() {
            if (state.selectedRole === 'OWNER') {
                document.getElementById('interface-employee').classList.replace('tab-active', 'tab-hidden');
                document.getElementById('interface-owner').classList.replace('tab-hidden', 'tab-active');
            } else {
                document.getElementById('interface-owner').classList.replace('tab-active', 'tab-hidden');
                document.getElementById('interface-employee').classList.replace('tab-hidden', 'tab-active');
            }
            updateUI();
        }

        function updateUI() {
            if (!state.isUnlocked) return;
            if (state.selectedRole === 'EMPLOYEE') renderEmployeeUI();
            if (state.selectedRole === 'OWNER') renderOwnerUI();
        }

        function renderEmployeeUI() {
            if (!state.currentEmployee) return;
            const emp = state.currentEmployee;

            const statusBadge = document.getElementById('emp-status-badge');
            const clockRing = document.getElementById('emp-clock-ring');
            const actionBtns = document.getElementById('emp-action-buttons');
            const logsContainer = document.getElementById('emp-logs-container');

            document.getElementById('emp-profile-name').innerText = emp.name;
            document.getElementById('emp-avatar-initial').innerText = emp.name.charAt(0).toUpperCase();

            const isOut = emp.status === 'OUT';
            const isIn = emp.status === 'IN';
            const isBreak = emp.status === 'BREAK';

            statusBadge.innerText = emp.status;
            if (isIn) {
                statusBadge.className = "px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider bg-green-100 text-green-700 shadow-inner";
                clockRing.classList.remove('hidden');
            } else if (isBreak) {
                statusBadge.className = "px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider bg-amber-100 text-amber-700 shadow-inner";
                clockRing.classList.add('hidden');
            } else {
                statusBadge.className = "px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider bg-slate-200 text-slate-600 shadow-inner";
                clockRing.classList.add('hidden');
            }

            // Massive Thumb-Friendly Punch Buttons
            let btnsHtml = '';
            if (isOut) {
                btnsHtml = `<button onclick="handleAction('CLOCK_IN')" class="w-full h-16 bg-indigo-600 active:bg-indigo-700 text-white rounded-[1rem] font-bold text-xl flex items-center justify-center gap-3 shadow-[0_8px_20px_rgba(79,70,229,0.3)] transition-transform active:scale-[0.98]"><i class="fa-solid fa-play"></i> Clock In</button>`;
            } else if (isIn) {
                btnsHtml = `
                    <div class="flex gap-3">
                        <button onclick="handleAction('CLOCK_OUT')" class="flex-1 h-16 bg-rose-500 active:bg-rose-600 text-white rounded-[1rem] font-bold text-lg flex items-center justify-center gap-2 shadow-[0_8px_20px_rgba(244,63,94,0.3)] transition-transform active:scale-[0.98]"><i class="fa-solid fa-square"></i> Clock Out</button>
                        <button onclick="handleAction('BREAK_START')" class="flex-1 h-16 bg-white border-2 border-slate-200 active:bg-slate-50 text-slate-700 rounded-[1rem] font-bold text-lg flex items-center justify-center gap-2 transition-transform active:scale-[0.98]"><i class="fa-solid fa-mug-hot text-amber-600"></i> Break</button>
                    </div>
                `;
            } else if (isBreak) {
                btnsHtml = `<button onclick="handleAction('BREAK_END')" class="w-full h-16 bg-amber-500 active:bg-amber-600 text-white rounded-[1rem] font-bold text-xl flex items-center justify-center gap-3 shadow-[0_8px_20px_rgba(245,158,11,0.3)] transition-transform active:scale-[0.98]"><i class="fa-solid fa-play"></i> Resume Work</button>`;
            }
            actionBtns.innerHTML = btnsHtml;

            const sorted = [...(state.currentEmployeeLogs || [])].sort((a, b) => b.timestamp - a.timestamp);
            
            if (sorted.length === 0) {
                logsContainer.innerHTML = `<div class="p-6 text-center text-sm text-slate-400 font-medium">No activity recorded today.</div>`;
            } else {
                let logsHtml = '';
                sorted.slice(0, 5).forEach(log => {
                    let icon = 'fa-clock text-slate-400';
                    if (log.type === 'CLOCK_IN' || log.type === 'BREAK_END') icon = 'fa-play text-green-500';
                    if (log.type === 'CLOCK_OUT') icon = 'fa-square text-rose-500';
                    if (log.type === 'BREAK_START') icon = 'fa-mug-hot text-amber-500';

                    logsHtml += `
                        <div class="p-4 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center"><i class="fa-solid ${icon}"></i></div>
                                <span class="text-sm font-bold text-slate-700">${friendlyActionName(log.type)}</span>
                            </div>
                            <span class="text-xs font-mono font-medium bg-slate-100 px-2 py-1 rounded text-slate-500">${formatTimeShort(log.timestamp)}</span>
                        </div>
                    `;
                });
                logsContainer.innerHTML = logsHtml;
            }
        }

        function renderOwnerUI() {
            const allStaff = state.teamEmployees;

            if (state.ownerActiveTab === 'LIVE') {
                const activeCount = allStaff.filter(e => e.status === 'IN').length;
                document.getElementById('own-active-count').innerText = activeCount;
                document.getElementById('own-total-count').innerText = `/ ${allStaff.length}`;

                let html = '';
                allStaff.forEach(emp => {
                    let borderClass = 'border-slate-100 text-slate-400 bg-white';
                    let statusColor = 'text-slate-400';
                    if(emp.status === 'IN') { borderClass = 'border-green-500 text-green-700 bg-green-50'; statusColor = 'text-green-600'; }
                    if(emp.status === 'BREAK') { borderClass = 'border-amber-400 text-amber-700 bg-amber-50'; statusColor = 'text-amber-500'; }

                    let displaySeconds = emp.secondsWorked || 0;
                    if (emp.status === 'IN' && emp.lastActionTimestamp) {
                        displaySeconds += Math.floor((Date.now() - emp.lastActionTimestamp) / 1000);
                    }

                    html += `
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full flex flex-col items-center justify-center shrink-0 border-[3px] ${borderClass}">
                            <span class="font-bold text-xl leading-none">${emp.name.charAt(0).toUpperCase()}</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-lg text-slate-900 truncate leading-tight">${emp.name}</p>
                            <p class="text-xs text-slate-500 truncate mt-0.5">${emp.lastAction || 'Account Created'}</p>
                        </div>
                        <div class="text-right shrink-0">
                            <p class="text-xs font-bold uppercase tracking-wider ${statusColor} mb-1">${emp.status}</p>
                            <p id="own-time-${emp.id}" class="text-base font-mono font-bold text-slate-700 bg-slate-50 px-2 py-0.5 rounded-md">${formatDuration(displaySeconds)}</p>
                        </div>
                    </div>`;
                });

                if (allStaff.length === 0) {
                    html = `<div class="p-8 text-center text-slate-500 flex flex-col items-center mt-10"><div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4"><i class="fa-solid fa-users-slash text-3xl text-slate-300"></i></div> <p class="font-medium">No team members.</p><p class="text-sm mt-1">Go to Directory to add staff.</p></div>`;
                }

                document.getElementById('own-live-list').innerHTML = html;
            } else {
                let html = '';
                allStaff.forEach(emp => {
                    const empJson = encodeURIComponent(JSON.stringify(emp));
                    html += `
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between gap-4">
                        <div class="flex items-center gap-4 flex-1 min-w-0">
                            <div class="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center font-bold text-lg text-indigo-600 shrink-0">
                                ${emp.name.charAt(0).toUpperCase()}
                            </div>
                            <div class="min-w-0">
                                <p class="font-bold text-slate-900 text-lg leading-tight truncate">${emp.name}</p>
                                <p class="text-xs font-medium text-slate-500 truncate mt-0.5">${emp.role}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 shrink-0">
                            <div class="flex flex-col items-end">
                                <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">PIN</span>
                                <span class="font-mono text-sm font-bold text-slate-700">${emp.pin}</span>
                            </div>
                            <button onclick="openModal('${empJson}')" class="w-12 h-12 rounded-2xl flex items-center justify-center text-indigo-500 bg-indigo-50 active:bg-indigo-100 transition-colors">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                        </div>
                    </div>`;
                });

                if (allStaff.length === 0) {
                    html = `<div class="p-8 text-center text-slate-500 flex flex-col items-center mt-10"><div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4"><i class="fa-solid fa-users text-3xl text-slate-300"></i></div> <p class="font-medium">Directory is empty.</p><p class="text-sm mt-1">Tap the plus button below to add staff.</p></div>`;
                }

                document.getElementById('own-team-list').innerHTML = html;
            }
        }

        initAuth();

    </script>
</body>
</html>
