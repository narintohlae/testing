<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงเวลาเข้างาน (Firebase)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; background-color: #f8f9fa; } </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-sm-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">🕒 บันทึกเวลาเข้า-ออกงาน</h4>
                    </div>
                    <div class="card-body p-4 text-center">
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold">กรอกชื่อพนักงาน:</label>
                            <input type="text" id="empName" class="form-control form-control-lg" placeholder="เช่น สมชาย ใจดี">
                        </div>
                        
                        <div class="d-grid gap-3">
                            <button onclick="recordTime('เข้างาน')" class="btn btn-success btn-lg">🟢 เข้างาน</button>
                            <button onclick="recordTime('ออกงาน')" class="btn btn-danger btn-lg">🔴 ออกงาน</button>
                        </div>
                        
                        <div id="statusMessage" class="mt-4 fw-bold text-primary"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. นำเข้าเครื่องมือจาก Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ---------------------------------------------------------
        // 🚨 สำคัญมาก: ลบข้อมูลข้างล่างนี้ แล้วเอา firebaseConfig ของคุณมาวางทับ!
        // ---------------------------------------------------------
        const firebaseConfig = {
  apiKey: "AIzaSyAgTWrI1G1t3GYVz4-SPM7btrsixSe0el8",
  authDomain: "time-tracker-46283.firebaseapp.com",
  projectId: "time-tracker-46283",
  storageBucket: "time-tracker-46283.firebasestorage.app",
  messagingSenderId: "882533547295",
  appId: "1:882533547295:web:4b78bfc84322c58a50042a",
  measurementId: "G-5DPBNCSWFW"
};

        // 2. ปลุกประตูลับเชื่อมต่อ Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 3. ฟังก์ชันบันทึกข้อมูล
        window.recordTime = async function(actionType) {
            const nameInput = document.getElementById('empName').value;
            const messageBox = document.getElementById('statusMessage');
            
            if(nameInput === "") {
                alert("กรุณากรอกชื่อก่อนกดปุ่มครับ!");
                return;
            }

            // เปลี่ยนข้อความเป็นกำลังโหลด
            messageBox.innerHTML = "กำลังบันทึกข้อมูล... ⏳";
            messageBox.className = "mt-4 fw-bold text-warning";

            try {
                // คำสั่งส่งข้อมูลไปเก็บในคอลเลกชัน (ตาราง) ที่ชื่อว่า 'attendance_records'
                await addDoc(collection(db, "attendance_records"), {
                    emp_name: nameInput,
                    action: actionType,
                    record_time: new Date().toLocaleString('th-TH'), // เวลาแบบตัวหนังสือ
                    timestamp: serverTimestamp() // เวลาเป๊ะๆ ของเซิร์ฟเวอร์ Google
                });

                // แจ้งเตือนเมื่อสำเร็จ
                messageBox.innerHTML = `✅ บันทึกเวลา ${actionType} สำเร็จ!<br>พนักงาน: ${nameInput}`;
                messageBox.className = "mt-4 fw-bold text-success";
                document.getElementById('empName').value = ""; // ล้างช่องกรอกชื่อ

            } catch (error) {
                // แจ้งเตือนถ้ามี Error
                console.error("Error adding document: ", error);
                messageBox.innerHTML = "❌ เกิดข้อผิดพลาด ไม่สามารถบันทึกได้";
                messageBox.className = "mt-4 fw-bold text-danger";
            }
        }
    </script>
</body>
</html>
