<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เช็คราคาสินค้า</title>
    <!-- โหลด Tailwind CSS เพื่อจัดรูปแบบหน้าเว็บให้รองรับมือถือ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลดไลบรารี HTML5 QR Code สำหรับใช้งานกล้องมือถือสแกนบาร์โค้ด -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* สไตล์เพิ่มเติมสำหรับแอปบนมือถือ */
        body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .barcode-font { font-family: 'Courier New', Courier, monospace; letter-spacing: 1px; }
        #reader { width: 100%; border-radius: 0.5rem; overflow: hidden; }
        #reader video { object-fit: cover; }
    </style>
</head>
<body class="text-gray-800">

    <!-- แถบด้านบน (Header) & ช่องค้นหา -->
    <div class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold text-center mb-4">🛒 เช็คราคาสินค้า</h1>
        
        <div class="relative flex items-center">
            <!-- ช่องค้นหา/รับค่าจากเครื่องสแกน -->
            <input type="text" id="searchInput" 
                class="w-full p-3 pl-4 pr-12 rounded-lg text-gray-900 border-2 border-transparent focus:outline-none focus:border-blue-300 shadow-sm text-lg" 
                placeholder="พิมพ์ชื่อสินค้า หรือ สแกนบาร์โค้ด..." 
                autocomplete="off">
            
            <!-- ปุ่มเปิดกล้องสแกน -->
            <button id="cameraBtn" class="absolute right-2 p-2 bg-gray-100 text-blue-600 rounded-md hover:bg-gray-200 active:bg-gray-300 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>
        <div id="statusText" class="text-xs text-blue-200 mt-2 text-center">กำลังโหลดข้อมูลสินค้า...</div>
    </div>

    <!-- ส่วนแสดงผลการค้นหา -->
    <div id="results" class="p-4 space-y-3 pb-20">
        <!-- สถานะเริ่มต้นว่างๆ จะถูกแสดงที่นี่ -->
    </div>

    <!-- หน้าต่าง Modal สำหรับเปิดกล้องสแกนบาร์โค้ด -->
    <div id="scannerModal" class="fixed inset-0 bg-black bg-opacity-80 z-[60] hidden flex-col items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-xl overflow-hidden shadow-2xl flex flex-col">
            <div class="p-4 bg-gray-100 flex justify-between items-center border-b">
                <h2 class="font-bold text-gray-800">📷 สแกนบาร์โค้ด</h2>
                <button id="closeScannerBtn" class="text-red-500 font-bold p-2">ปิด ✕</button>
            </div>
            <!-- พื้นที่แสดงกล้อง -->
            <div id="reader" class="bg-black w-full min-h-[300px]"></div>
            <div class="p-4 text-center text-sm text-gray-500">
                หันกล้องไปที่บาร์โค้ดสินค้า ระบบจะสแกนอัตโนมัติ
            </div>
        </div>
    </div>

    <script>
        // ตัวแปรเก็บข้อมูลสินค้าทั้งหมด
        let productData = [];
        let html5QrcodeScanner = null;

        // ID ของ Google Sheet
        const sheetId = '1N2Yja6aMNWN-ZPid8nWq-sV3XgB0exmoHue3hdeUrFk';
        // ใช้ Google Visualization API ดึงข้อมูลเป็น JSON
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=0`;

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('results');
        const statusText = document.getElementById('statusText');
        
        // Element สำหรับกล้อง
        const cameraBtn = document.getElementById('cameraBtn');
        const scannerModal = document.getElementById('scannerModal');
        const closeScannerBtn = document.getElementById('closeScannerBtn');

        // ฟังก์ชันดึงข้อมูลจาก Google Sheet
        async function fetchSheetData() {
            try {
                const response = await fetch(sheetUrl);
                const text = await response.text();
                // ตัด text ส่วนเกินออกให้เหลือแต่ JSON string
                const jsonString = text.substring(47, text.length - 2);
                const json = JSON.parse(jsonString);

                // หา index ของคอลัมน์ที่เราต้องการ
                const cols = json.table.cols.map(c => c ? c.label.trim() : '');
                const indices = {
                    'บาร์โค้ด': cols.indexOf('บาร์โค้ด'),
                    'สินค้า': cols.indexOf('สินค้า'),
                    'รวม': cols.indexOf('รวม'),
                    'หน่วย': cols.indexOf('หน่วย')
                };

                // ฟังก์ชันช่วยดึงค่าจากเซลล์
                const getCellValue = (row, index) => {
                    if (index === -1 || !row.c[index]) return '';
                    // ใช้ .f (formatted value) ก่อน ถ้าไม่มีใช้ .v (value)
                    return (row.c[index].f !== undefined && row.c[index].f !== null) ? row.c[index].f : row.c[index].v;
                };

                // แปลงข้อมูลและเก็บลง Array
                productData = json.table.rows.map(row => {
                    // --- แก้ไขปัญหาคอมม่า (,) ---
                    // ดึงค่าบาร์โค้ดมา แล้วใช้ .replace(/,/g, '') เพื่อลบลูกน้ำออกทั้งหมด
                    let rawBarcode = getCellValue(row, indices['บาร์โค้ด']).toString();
                    let cleanBarcode = rawBarcode.replace(/,/g, '').trim();

                    return {
                        barcode: cleanBarcode,
                        name: getCellValue(row, indices['สินค้า']).toString().trim(),
                        price: getCellValue(row, indices['รวม']).toString().trim(),
                        unit: getCellValue(row, indices['หน่วย']).toString().trim()
                    };
                }).filter(item => item.name !== ''); // กรองเอาเฉพาะแถวที่มีชื่อสินค้า

                statusText.innerText = `พร้อมใช้งาน (ข้อมูล ${productData.length} รายการ)`;
                showEmptyState();
                
                // ให้เคอร์เซอร์ไปกระพริบรอที่ช่องค้นหาอัตโนมัติ
                searchInput.focus();

            } catch (error) {
                console.error("Error fetching data:", error);
                statusText.innerText = "❌ เกิดข้อผิดพลาดในการโหลดข้อมูล (ตรวจสอบสิทธิ์การแชร์ลิงก์)";
                statusText.classList.add('text-red-300');
            }
        }

        // แสดงหน้าจอว่างๆ พร้อมไอคอนคำแนะนำ
        function showEmptyState() {
            resultsContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center text-gray-400 mt-16 text-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                    </svg>
                    <p class="text-lg font-medium text-gray-500">พร้อมค้นหา / สแกนสินค้า</p>
                    <p class="text-sm mt-1">ใช้เครื่องสแกน, เปิดกล้อง, หรือพิมพ์ชื่อสินค้า</p>
                </div>
            `;
        }

        // ค้นหาสินค้า
        function handleSearch() {
            let query = searchInput.value.trim().toLowerCase();

            // ถ้าช่องค้นหาว่างเปล่า ให้แสดงหน้าจอว่างๆ
            if (query === '') {
                showEmptyState();
                return;
            }

            // ลบลูกน้ำออกจากสิ่งที่ผู้ใช้พิมพ์มาด้วย (กันเหนียว)
            let queryCleanForBarcode = query.replace(/,/g, '');

            const results = productData.filter(item => {
                // ค้นหาจากบาร์โค้ด (ที่ถูกคลีนลูกน้ำออกแล้ว) หรือ ค้นหาจากชื่อสินค้า
                return item.barcode.toLowerCase().includes(queryCleanForBarcode) || 
                       item.name.toLowerCase().includes(query);
            });

            renderResults(results);
        }

        // แสดงผลลัพธ์เป็นกล่องการ์ด
        function renderResults(results) {
            resultsContainer.innerHTML = ''; // เคลียร์ของเก่า

            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="bg-white rounded-xl shadow p-6 text-center border border-gray-100">
                        <span class="text-4xl block mb-2">🤔</span>
                        <p class="text-gray-600 font-medium">ไม่พบสินค้าที่คุณค้นหา</p>
                    </div>`;
                return;
            }

            // สร้างกล่องสินค้าแต่ละชิ้น
            results.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl shadow-md p-4 border border-gray-100 flex flex-col hover:shadow-lg transition-shadow';

                // โครงสร้างภายในกล่อง (เน้นราคาให้เด่นที่สุด)
                card.innerHTML += `
                    <div class="flex flex-col gap-3 w-full">
                        <!-- ส่วนชื่อสินค้าและบาร์โค้ด -->
                        <div class="pl-3 border-l-4 border-blue-500">
                            <h3 class="text-xl font-bold text-gray-800 leading-tight mb-1">${item.name || 'ไม่มีชื่อสินค้า'}</h3>
                            <p class="text-sm text-gray-500 barcode-font flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>
                                ${item.barcode || '-'}
                            </p>
                        </div>
                        
                        <!-- ส่วนราคา (ขนาดใหญ่พิเศษ) -->
                        <div class="bg-yellow-50 border-2 border-yellow-400 rounded-xl p-4 mt-2 flex justify-between items-center shadow-sm">
                            <span class="text-yellow-700 font-bold text-lg">ราคา</span>
                            <div class="text-right">
                                <span class="text-6xl font-black text-red-600 tracking-tighter drop-shadow-sm leading-none">${item.price || '0'}</span>
                                <span class="text-xl font-bold text-gray-600 ml-1">/ ${item.unit || 'ชิ้น'}</span>
                            </div>
                        </div>
                    </div>
                `;
                resultsContainer.appendChild(card);
            });
        }

        // ==========================================
        // ส่วนควบคุมกล้องสแกนบาร์โค้ด
        // ==========================================
        
        function startScanner() {
            scannerModal.classList.remove('hidden');
            scannerModal.classList.add('flex');
            
            // ตั้งค่า Html5Qrcode
            const html5QrCode = new Html5Qrcode("reader");
            html5QrcodeScanner = html5QrCode;

            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 150 },
                aspectRatio: 1.0,
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.UPC_E
                ]
            };

            // เปิดกล้องหลัง
            html5QrCode.start({ facingMode: "environment" }, config, 
                // เมื่อสแกนสำเร็จ
                (decodedText, decodedResult) => {
                    stopScanner(); // ปิดกล้อง
                    
                    // เอาค่าที่สแกนได้ไปใส่ในช่องค้นหา
                    searchInput.value = decodedText;
                    
                    // สั่งค้นหาทันที
                    handleSearch();
                    
                    // (อุปกรณ์เสริม) ส่งเสียงปี๊บเมื่อสแกนติด
                    // navigator.vibrate([100]); // สั่น
                },
                // กรณีสแกนยังไม่เจอ (ข้ามไป ไม่ต้องทำอะไร)
                (errorMessage) => { }
            ).catch(err => {
                alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตให้เว็บไซต์เข้าถึงกล้องของคุณ");
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner.clear();
                    html5QrcodeScanner = null;
                }).catch(err => console.log("Error stopping scanner", err));
            }
            scannerModal.classList.add('hidden');
            scannerModal.classList.remove('flex');
        }

        // จับเหตุการณ์ Event ต่างๆ
        searchInput.addEventListener('input', handleSearch); // ค้นหาทันทีที่พิมพ์/ยิงบาร์โค้ด
        
        cameraBtn.addEventListener('click', startScanner);
        closeScannerBtn.addEventListener('click', stopScanner);

        // เริ่มโหลดข้อมูลเมื่อเปิดเว็บ
        fetchSheetData();

    </script>
</body>
</html>
