        #app-container { max-width: 430px; margin: 0 auto; height: 100vh; height: 100dvh; background-color: #ffffff; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 3D UI */
        .btn-3d { border: 3px solid #1f2937; border-radius: 16px; box-shadow: 4px 6px 0px #1f2937; transition: all 0.1s ease; position: relative; font-weight: 700; cursor: pointer; }
        .btn-3d:active { box-shadow: 0px 0px 0px #1f2937; transform: translate(4px, 6px); }
        .btn-sm-3d { border: 2px solid #1f2937; border-radius: 10px; box-shadow: 2px 3px 0px #1f2937; transition: all 0.1s ease; font-weight: 700; cursor: pointer; }
        .btn-sm-3d:active { box-shadow: 0px 0px 0px #1f2937; transform: translate(2px, 3px); }
        .card-3d { border: 2px solid #1f2937; border-radius: 12px; box-shadow: 4px 4px 0px #1f2937; background-color: #ffffff; margin-bottom: 16px; }

        /* Isometric Map */
        .iso-container { perspective: 1000px; padding: 40px 0; display: flex; justify-content: center; overflow: visible; }
        .iso-grid { display: grid; grid-template-columns: repeat(3, 60px); gap: 20px; transform: rotateX(60deg) rotateY(0deg) rotateZ(-45deg); transform-style: preserve-3d; }
        .iso-cube { width: 60px; height: 60px; background: #e5e7eb; border: 2px solid #1f2937; position: relative; transition: all 0.3s ease; box-shadow: -5px 5px 0px rgba(0,0,0,0.1); }
        .iso-cube.active { background: #4ade80; transform: translateZ(20px) translate(-5px, -5px); box-shadow: -10px 10px 0px #166534, inset 0 0 10px rgba(255,255,255,0.5); border-color: #14532d; }
        .iso-cube.active::before, .iso-cube.active::after { content: ''; position: absolute; border: 2px solid #14532d; background: #22c55e; }
        .iso-cube.active::before { width: 20px; height: 100%; top: 0; left: -22px; transform-origin: right; transform: skewY(-45deg); }
        .iso-cube.active::after { width: 100%; height: 20px; bottom: -22px; left: 0; transform-origin: top; transform: skewX(-45deg); }

        /* Toggles */
        .toggle-checkbox:checked { right: 0; border-color: #4ade80; }
        .toggle-checkbox:checked + .toggle-label { background-color: #4ade80; }
        .toggle-label { transition: background-color 0.2s; border: 2px solid #1f2937; box-shadow: 2px 2px 0px #1f2937; }
        .toggle-checkbox { right: 0; z-index: 1; border: 2px solid #1f2937; }
    </style>

        const App = {

                state.currentUser = null;

                document.getElementById('app-nav').classList.add('hidden');
                this.navigate('login');
            },
            navigate: function(view, moduleId = null) {
                state.currentView = view; state.currentModuleId = moduleId;

                if (view === 'login') { this.renderLogin(); document.getElementById('app-nav').classList.add('hidden'); document.getElementById('header-title').innerText = t("Login"); }
                else if (view === 'owner_dashboard') { this.renderOwnerDashboard(); this.renderNav(); document.getElementById('header-title').innerText = t("Dashboard"); }
                else if (view === 'employee_home') { this.renderEmployeeHome(); this.renderNav(); document.getElementById('header-title').innerText = t("My Portal"); }
                else if (view === 'settings') { this.renderSettings(); this.renderNav(); document.getElementById('header-title').innerText = t("App Settings"); }
                else if (view === 'module' && moduleId) {
                    const mod = this.modules.find(m => m.id === moduleId);
                    if (mod && state.features[mod.id]) { content.innerHTML = mod.renderUserView(); document.getElementById('header-title').innerText = t(mod.name); if(mod.onLoad) mod.onLoad(); }

            renderLogin: function() {
                let html = `<div class="flex flex-col items-center justify-center h-full space-y-8 pb-12"><div class="w-24 h-24 bg-purple-400 rounded-2xl border-4 border-gray-800 shadow-[6px_6px_0_0_#1f2937] flex items-center justify-center transform rotate-12 mb-4"><i class="ph-fill ph-intersect text-5xl text-white"></i></div><h2 class="text-2xl font-bold text-center">${t("Welcome to WorkFlow")}</h2><p class="text-gray-500 text-center mb-6">${t("Select your profile to continue.")}</p><div class="w-full space-y-4">`;
                db.users.forEach(user => { html += `<button onclick="App.login('${user.id}')" class="btn-3d w-full py-4 px-6 bg-white flex items-center space-x-4"><div class="h-12 w-12 rounded-full border-2 border-gray-800 ${user.color} flex items-center justify-center font-bold text-lg">${user.initials}</div><div class="text-left flex-1"><div class="font-bold text-lg">${user.name}</div><div class="text-sm text-gray-500 uppercase tracking-wider">${t(user.role)}</div></div><i class="ph-bold ph-caret-right text-xl"></i></button>`; });
                document.getElementById('app-content').innerHTML = html + `</div></div>`;
            },
            renderEmployeeHome: function() {
                let html = `<div class="space-y-6"><div class="mb-4"><h2 class="text-2xl font-bold">${t("Hello")}, ${state.currentUser.name.split(' ')[0]}!</h2><p class="text-gray-500">${t("What would you like to do today?")}</p></div>`;
                this.modules.forEach(mod => { if (state.features[mod.id] && mod.renderWidget) html += mod.renderWidget(); });

                this.modules.forEach(mod => { if (state.features[mod.id] && mod.onWidgetLoad) setTimeout(() => mod.onWidgetLoad(), 0); });
            },
            renderOwnerDashboard: function() {
                const activeUsers = db.users.filter(u => u.role !== 'owner' && isClockedIn(u.id));
                let html = `<div class="space-y-6"><div class="flex justify-between items-end"><div><h2 class="text-2xl font-bold">${t("Overview")}</h2><p class="text-gray-500">${t("Live Office Status")}</p></div><div class="bg-gray-800 text-white px-3 py-1 rounded-lg font-bold text-sm flex items-center gap-1"><span class="text-green-400">●</span> ${activeUsers.length} ${t("Active")}</div></div><div class="card-3d bg-blue-50 overflow-hidden relative"><h3 class="font-bold p-4 border-b-2 border-gray-800 bg-white">${t("Floor Plan (Isometric)")}</h3><div class="iso-container"><div class="iso-grid">`;
                const employees = db.users.filter(u => u.role !== 'owner');
                for(let i=0; i<6; i++) {
                    const emp = employees[i];
                    if (emp && isClockedIn(emp.id)) html += `<div class="iso-cube active flex items-center justify-center"><span class="text-xs font-bold text-white transform -rotate-45">${emp.initials}</span></div>`;
                    else if (emp) html += `<div class="iso-cube flex items-center justify-center"><span class="text-xs font-bold text-gray-400 transform -rotate-45">${emp.initials}</span></div>`;
                    else html += `<div class="iso-cube opacity-50"></div>`;
                }
                html += `</div></div><p class="text-xs text-center text-gray-500 pb-4">${t("Green indicates clocked-in staff.")}</p></div>`;
                this.modules.forEach(mod => { if (state.features[mod.id] && mod.renderAdminWidget) html += mod.renderAdminWidget(); });
                document.getElementById('app-content').innerHTML = html + `</div>`;
            },
            renderSettings: function() {
                let html = `<div class="space-y-6"><div><h2 class="text-2xl font-bold">${t("App Features")}</h2><p class="text-gray-500">${t("Turn modules on or off dynamically.")}</p></div><div class="card-3d p-4 space-y-4">`;
                this.modules.forEach(mod => {
                    const isChecked = state.features[mod.id] ? 'checked' : '';
                    html += `<div class="flex items-center justify-between border-b-2 border-gray-100 pb-4 last:border-0 last:pb-0"><div><div class="font-bold flex items-center gap-2"><i class="${mod.icon} text-xl"></i> ${t(mod.name)}</div><div class="text-sm text-gray-500">${t(mod.description)}</div></div><div class="relative inline-block w-14 h-8 align-middle select-none transition duration-200 ease-in"><input type="checkbox" id="toggle-${mod.id}" ${isChecked} class="toggle-checkbox absolute block w-8 h-8 rounded-full bg-white appearance-none cursor-pointer" onchange="App.toggleFeature('${mod.id}', this.checked)"/><label for="toggle-${mod.id}" class="toggle-label block overflow-hidden h-8 rounded-full bg-gray-300 cursor-pointer"></label></div></div>`;
                });
                html += `</div><div class="mt-8 pt-8 border-t-2 border-gray-200"><button onclick="App.logout()" class="btn-3d w-full py-3 bg-red-100 text-red-600 flex justify-center items-center gap-2"><i class="ph-bold ph-sign-out"></i> ${t("Switch User Profile")}</button></div></div>`;
                document.getElementById('app-content').innerHTML = html;
            },
            toggleFeature: function(moduleId, isEnabled) { state.features[moduleId] = isEnabled; this.renderNav(); if(state.currentView === 'owner_dashboard') this.renderOwnerDashboard(); },
            renderNav: function() {
                const nav = document.getElementById('app-nav'); if (!state.currentUser) return; nav.classList.remove('hidden'); let html = '';
                const createNavItem = (icon, label, targetView, targetModule, isActive) => `<button onclick="App.navigate('${targetView}'${targetModule ? `,'${targetModule}'` : ''})" class="flex flex-col items-center justify-center p-2 min-w-[64px] flex-shrink-0 transition-transform ${isActive ? 'text-gray-900 transform -translate-y-1' : 'text-gray-400'}"><div class="relative"><i class="${isActive ? 'ph-fill' : 'ph'} ${icon} text-3xl mb-1 drop-shadow-sm"></i>${isActive ? '<div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-1.5 h-1.5 bg-gray-900 rounded-full"></div>' : ''}</div><span class="text-[10px] font-bold mt-1">${t(label)}</span></button>`;
                if (state.currentUser.role === 'owner') { html += createNavItem('ph-squares-four', 'Overview', 'owner_dashboard', null, state.currentView === 'owner_dashboard'); html += createNavItem('ph-faders', 'Features', 'settings', null, state.currentView === 'settings'); }
                else { html += createNavItem('ph-house', 'Home', 'employee_home', null, state.currentView === 'employee_home'); this.modules.forEach(mod => { if (state.features[mod.id] && mod.hasUserTab) html += createNavItem(mod.icon, mod.name, 'module', mod.id, state.currentView === 'module' && state.currentModuleId === mod.id); }); }
                nav.innerHTML = html;
            }
        };

                    <div class="card-3d p-4 bg-pink-50">
                        <div class="flex justify-between items-center border-b-2 border-gray-800 pb-2 mb-3">
                            <h3 class="font-bold flex items-center gap-2"><i class="ph-fill ph-confetti text-pink-600"></i> ${t("Upcoming Celebrations")}</h3>
                        </div>
                        <div class="space-y-2">
                `;
                db.celebrations.slice(0, 2).forEach(c => {
                    const user = db.users.find(u => u.id === c.userId);
                    html += `
                        <div class="bg-white border-2 border-gray-800 rounded-lg p-2 flex items-center justify-between shadow-[2px_2px_0_0_#1f2937]">
                            <div class="flex items-center gap-2">
                                <span class="text-lg">${c.type === 'birthday' ? '🎂' : '🏆'}</span>
                                <div>
                                    <div class="text-xs font-bold leading-tight text-gray-800">${user.name}</div>
                                    <div class="text-[10px] text-gray-500">${t(c.title)}</div>
                                </div>
                            </div>
                            <span class="bg-pink-100 text-pink-700 px-2 py-0.5 rounded text-[10px] font-bold border border-pink-300">${c.dateStr}</span>
                        </div>
                    `;
                });
                html += `</div></div>`;
                return html;
            }
        };

        const TrainingModule = {
            id: 'training', name: 'Training', description: 'Complete mandatory training and courses.', icon: 'ph-graduation-cap', hasUserTab: true,
            renderUserView: function() {
                let html = `
                    <div class="space-y-6 pb-20">
                        <div>
                            <h2 class="text-2xl font-bold">${t("Training")}</h2>
                            <p class="text-gray-500">${t("Complete mandatory training and courses.")}</p>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-500 uppercase text-sm mb-3">${t("Assigned Courses")}</h3>
                            <div class="space-y-3">
                `;
                db.courses.forEach(course => {
                    const log = db.trainingLogs.find(l => l.courseId === course.id && l.userId === state.currentUser.id);
                    const isDone = !!log;
                    html += `
                        <div class="card-3d p-4 bg-white flex flex-col gap-3 border-blue-200">
                            <div class="flex justify-between items-start">
                                <div class="pr-2">
                                    <div class="font-bold text-gray-800 leading-tight mb-1">${course.title}</div>
                                    <div class="text-xs text-gray-500 flex items-center gap-1"><i class="ph-fill ph-clock text-blue-500"></i> ${course.duration}</div>
                                </div>
                                <span class="px-2 py-1 rounded text-[10px] font-bold border whitespace-nowrap ${isDone ? 'bg-green-100 text-green-700 border-green-300' : 'bg-red-100 text-red-700 border-red-300'}">
                                    ${isDone ? t('Completed') : t('Pending')}
                                </span>
                            </div>
                            <button onclick="TrainingModule.start(${course.id})" class="btn-sm-3d w-full py-2 flex items-center justify-center gap-2 text-xs transition-colors ${isDone ? 'bg-gray-100 text-gray-400 pointer-events-none' : 'bg-blue-400 text-white'}" ${isDone ? 'disabled' : ''}>
                                <i class="ph-bold ${isDone ? 'ph-check' : 'ph-play'}"></i> ${isDone ? t("Completed") : t("Start Course")}
                            </button>
                        </div>
                    `;
                });
                html += `</div></div></div>`;
                return html;
            },
            start: function(id) { db.trainingLogs.push({ id: Date.now(), userId: state.currentUser.id, courseId: id, status: 'completed', date: new Date().toISOString() }); App.navigate('module', 'training'); },
            renderAdminWidget: function() {
                let html = `
                    <div class="card-3d p-4 bg-blue-50">
                        <div class="flex justify-between items-center border-b-2 border-gray-800 pb-2 mb-3">
                            <h3 class="font-bold flex items-center gap-2"><i class="ph-fill ph-graduation-cap text-blue-600"></i> ${t("Compliance Tracking")}</h3>
                        </div>
                        <div class="space-y-3">
                `;
                const totalUsers = db.users.filter(u => u.role !== 'owner').length;
                db.courses.forEach(course => {
                    const completedCount = db.trainingLogs.filter(l => l.courseId === course.id && db.users.find(u => u.id === l.userId && u.role !== 'owner')).length;
                    const pct = totalUsers > 0 ? Math.round((completedCount / totalUsers) * 100) : 0;
                    html += `
                        <div class="bg-white border-2 border-gray-800 rounded-lg p-3 shadow-[2px_2px_0_0_#1f2937]">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-bold leading-tight text-gray-800 truncate pr-2">${course.title}</span>
                                <span class="text-[10px] font-bold ${pct >= 100 ? 'text-green-600' : 'text-blue-600'}">${pct}%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden mb-1.5">
                                <div class="${pct >= 100 ? 'bg-green-500' : 'bg-blue-500'} h-full" style="width: ${pct}%"></div>
                            </div>
                            <div class="text-[10px] text-gray-500">${completedCount} out of ${totalUsers} employees completed</div>
                        </div>
                    `;
                });
                html += `</div></div>`;
                return html;
            }
        };

        const WorkLocationModule = {
            id: 'workLocation', name: 'Work Location', description: 'Where are you working today?', icon: 'ph-map-pin', hasUserTab: true,
            renderUserView: function() {
                const today = new Date().toISOString().split('T')[0];
                const myLoc = db.workLocations.find(l => l.userId === state.currentUser.id && l.date === today);
                const teamLocs = db.workLocations.filter(l => l.date === today && l.userId !== state.currentUser.id);
                
                let html = `
                    <div class="space-y-6 pb-20">
                        <div>
                            <h2 class="text-2xl font-bold">${t("Work Location")}</h2>
                            <p class="text-gray-500">${t("Where are you working today?")}</p>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="WorkLocationModule.setLocation('office')" class="${myLoc?.location === 'office' ? 'bg-indigo-100 border-indigo-400 text-indigo-700' : 'bg-white border-gray-800 hover:bg-gray-50'} btn-3d p-3 flex flex-col items-center justify-center transition-colors">
                                <div class="text-2xl mb-1">🏢</div>
                                <span class="font-bold text-[10px]">${t("Office")}</span>
                            </button>
                            <button onclick="WorkLocationModule.setLocation('home')" class="${myLoc?.location === 'home' ? 'bg-orange-100 border-orange-400 text-orange-700' : 'bg-white border-gray-800 hover:bg-gray-50'} btn-3d p-3 flex flex-col items-center justify-center transition-colors">
                                <div class="text-2xl mb-1">🏠</div>
                                <span class="font-bold text-[10px]">${t("Home")}</span>
                            </button>
                            <button onclick="WorkLocationModule.setLocation('remote')" class="${myLoc?.location === 'remote' ? 'bg-emerald-100 border-emerald-400 text-emerald-700' : 'bg-white border-gray-800 hover:bg-gray-50'} btn-3d p-3 flex flex-col items-center justify-center transition-colors">
                                <div class="text-2xl mb-1">☕</div>
                                <span class="font-bold text-[10px]">${t("Remote")}</span>
                            </button>
                        </div>

                        <div>
                            <h3 class="font-bold text-gray-500 uppercase text-sm mb-3 mt-4">${t("Team Locations")}</h3>
                            <div class="space-y-2">
                `;

                if (teamLocs.length === 0) {
                    html += `<div class="text-center text-gray-400 py-6 text-sm"><p>${t("No locations set yet.")}</p></div>`;
                }

                teamLocs.forEach(loc => {
                    const user = db.users.find(u => u.id === loc.userId);
                    let icon = '🏢', color = 'bg-indigo-50 text-indigo-700 border-indigo-200', label = t('Office');
                    if (loc.location === 'home') { icon = '🏠'; color = 'bg-orange-50 text-orange-700 border-orange-200'; label = t('Home'); }
                    if (loc.location === 'remote') { icon = '☕'; color = 'bg-emerald-50 text-emerald-700 border-emerald-200'; label = t('Remote'); }

                    html += `
                        <div class="card-3d p-3 flex items-center justify-between mb-0 bg-white">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full border-2 border-gray-800 ${user.color} flex items-center justify-center text-xs font-bold">${user.initials}</div>
                                <span class="font-bold text-sm text-gray-800">${user.name}</span>
                            </div>
                            <div class="px-2 py-1 rounded text-xs font-bold border flex items-center gap-1 ${color}">
                                <span>${icon}</span> ${label}
                            </div>
                        </div>
                    `;
                });

                html += `</div></div></div>`;
                return html;
            },
            setLocation: function(loc) {
                const today = new Date().toISOString().split('T')[0];
                const idx = db.workLocations.findIndex(l => l.userId === state.currentUser.id && l.date === today);
                if (idx > -1) {
                    db.workLocations[idx].location = loc;
                } else {
                    db.workLocations.push({ id: Date.now(), userId: state.currentUser.id, date: today, location: loc });
                }
                App.navigate('module', 'workLocation');
            },
            renderAdminWidget: function() {
                const today = new Date().toISOString().split('T')[0];
                const todayLocs = db.workLocations.filter(l => l.date === today);
                
                let counts = { office: 0, home: 0, remote: 0 };
                todayLocs.forEach(l => counts[l.location]++);
                const total = Math.max(1, todayLocs.length); // Avoid div by zero

                let html = `
                    <div class="card-3d p-4 bg-indigo-50">
                        <div class="flex justify-between items-center border-b-2 border-gray-800 pb-2 mb-3">
                            <h3 class="font-bold flex items-center gap-2"><i class="ph-fill ph-map-pin text-indigo-600"></i> ${t("Team Locations")}</h3>
                            <span class="bg-indigo-200 text-indigo-900 text-[10px] font-bold px-2 py-0.5 rounded-full border border-indigo-300">Today</span>
                        </div>
                        <div class="space-y-3">
                            <div class="flex items-center gap-2 text-xs font-bold">
                                <div class="w-6 text-center">🏢</div>
                                <div class="flex-1 bg-gray-200 rounded-full h-2 overflow-hidden border border-gray-400">
                                    <div class="bg-indigo-500 h-full" style="width: ${(counts.office/total)*100}%"></div>
                                </div>
                                <div class="w-12 text-right text-indigo-700">${counts.office} ${t("Office")}</div>
                            </div>
                            <div class="flex items-center gap-2 text-xs font-bold">
                                <div class="w-6 text-center">🏠</div>
                                <div class="flex-1 bg-gray-200 rounded-full h-2 overflow-hidden border border-gray-400">
                                    <div class="bg-orange-500 h-full" style="width: ${(counts.home/total)*100}%"></div>
                                </div>
                                <div class="w-12 text-right text-orange-700">${counts.home} ${t("Home")}</div>
                            </div>
                            <div class="flex items-center gap-2 text-xs font-bold">
                                <div class="w-6 text-center">☕</div>
                                <div class="flex-1 bg-gray-200 rounded-full h-2 overflow-hidden border border-gray-400">
                                    <div class="bg-emerald-500 h-full" style="width: ${(counts.remote/total)*100}%"></div>
                                </div>
                                <div class="w-12 text-right text-emerald-700">${counts.remote} ${t("Remote")}</div>
                            </div>
                        </div>
                    </div>
                `;
                return html;
            }
        };

        const ReferralsModule = {
            id: 'referrals', name: 'Referrals', description: 'Refer friends for open positions and earn bonuses.', icon: 'ph-handshake', hasUserTab: true,
            renderUserView: function() {
                const myRefs = db.referrals.filter(r => r.userId === state.currentUser.id).sort((a,b) => new Date(b.date) - new Date(a.date));
                
                let html = `
                    <div class="space-y-6 pb-20">
                        <div>
                            <h2 class="text-2xl font-bold">${t("Referrals")}</h2>
                            <p class="text-gray-500">${t("Refer friends for open positions and earn bonuses.")}</p>
                        </div>

                        <div class="card-3d p-4 bg-emerald-50 border-emerald-200">
                            <h3 class="font-bold mb-3 flex items-center gap-2 text-emerald-800"><i class="ph-bold ph-user-plus"></i> ${t("Refer Someone")}</h3>
                            <div class="space-y-3">
                                <select id="ref-role" class="w-full border-2 border-gray-800 rounded-lg px-3 py-2 outline-none focus:bg-white bg-transparent font-bold text-sm">
                                    <option value="">-- Select Role --</option>
                `;
                db.openRoles.forEach(r => { html += `<option value="${r.id}">${r.title} (${r.bonus} ${t("Bonus")})</option>`; });
                html += `
                                </select>
                                <input type="text" id="ref-name" placeholder="${t("Candidate Name")}" class="w-full border-2 border-gray-800 rounded-lg px-3 py-2 outline-none focus:bg-white bg-transparent text-sm">
                                <button onclick="ReferralsModule.submit()" class="btn-3d w-full py-3 bg-emerald-400 text-white flex items-center justify-center gap-2 mt-2">
                                    <i class="ph-bold ph-handshake"></i> ${t("Refer Someone")}
                                </button>
                            </div>
                        </div>

                        <div>
                            <h3 class="font-bold text-gray-500 uppercase text-sm mb-3">${t("Open Positions")}</h3>
                            <div class="space-y-3">
                `;
                db.openRoles.forEach(role => {
                    html += `
                        <div class="card-3d p-4 bg-white flex justify-between items-center mb-0">
                            <div>
                                <div class="font-bold text-gray-800 leading-tight">${role.title}</div>
                                <div class="text-[10px] text-gray-500 uppercase font-bold mt-1">${role.dept}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs text-gray-500">${t("Bonus")}</div>
                                <div class="font-bold text-emerald-600">${role.bonus}</div>
                            </div>
                        </div>
                    `;
                });
                html += `
                            </div>
                        </div>
                        
                        <div class="mt-6">
                            <h3 class="font-bold text-gray-500 uppercase text-sm mb-3">${t("My Referrals")}</h3>
                            <div class="space-y-2">
                `;
                
                if (myRefs.length === 0) {
                    html += `<div class="text-center text-gray-400 py-4 text-sm"><p>No referrals yet.</p></div>`;
                }
                
                myRefs.forEach(ref => {
                    const role = db.openRoles.find(r => r.id === parseInt(ref.roleId));
                    let statusColor = 'bg-gray-100 text-gray-600 border-gray-300';
                    if (ref.status === 'Interviewing') statusColor = 'bg-blue-100 text-blue-700 border-blue-300';
                    if (ref.status === 'Hired') statusColor = 'bg-emerald-100 text-emerald-700 border-emerald-300';

                    html += `
                        <div class="card-3d p-3 flex items-center justify-between mb-0 bg-white">
                            <div>
                                <div class="font-bold text-sm text-gray-800">${ref.candidateName}</div>
                                <div class="text-[10px] text-gray-500">${role ? role.title : 'Unknown Role'}</div>
                            </div>
                            <div class="px-2 py-1 rounded text-[10px] font-bold border flex items-center gap-1 ${statusColor}">
                                ${t(ref.status)}
                            </div>
                        </div>
                    `;
                });

                html += `</div></div></div>`;
                return html;
            },
            submit: function() {
                const roleId = document.getElementById('ref-role').value;
                const name = document.getElementById('ref-name').value.trim();
                if (roleId && name) {
                    db.referrals.push({ id: Date.now(), userId: state.currentUser.id, candidateName: name, roleId: roleId, status: 'Pending', date: new Date().toISOString().split('T')[0] });
                    App.navigate('module', 'referrals');
                }
            },
            renderAdminWidget: function() {
                const recentRefs = [...db.referrals].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 3);
                
                let html = `
                    <div class="card-3d p-4 bg-emerald-50">
                        <div class="flex justify-between items-center border-b-2 border-gray-800 pb-2 mb-3">
                            <h3 class="font-bold flex items-center gap-2"><i class="ph-fill ph-handshake text-emerald-600"></i> ${t("Recent Referrals")}</h3>
                            <span class="bg-emerald-200 text-emerald-900 text-[10px] font-bold px-2 py-0.5 rounded-full border border-emerald-300">${db.referrals.length} Total</span>
                        </div>
                        <div class="space-y-2">
                `;
                if(recentRefs.length === 0) {
                    html += `<p class="text-xs text-gray-500 text-center py-2">No referrals yet.</p>`;
                } else {
                    recentRefs.forEach(ref => {
                        const user = db.users.find(u => u.id === ref.userId);
                        const role = db.openRoles.find(r => r.id === parseInt(ref.roleId));
                        html += `
                            <div class="bg-white border-2 border-gray-800 rounded-lg p-2 flex flex-col gap-1 shadow-[2px_2px_0_0_#1f2937]">
                                <div class="flex justify-between items-center">
                                    <div class="text-xs font-bold leading-tight text-gray-800">${ref.candidateName}</div>
                                    <span class="text-[10px] font-bold ${ref.status === 'Hired' ? 'text-emerald-600' : 'text-blue-600'}">${t(ref.status)}</span>
                                </div>
                                <div class="flex justify-between items-center text-[10px] text-gray-500">
                                    <span class="truncate pr-2">${role ? role.title : ''}</span>
                                    <span class="flex items-center gap-1 flex-shrink-0"><i class="ph-fill ph-user"></i> By ${user.name}</span>
                                </div>
                            </div>
                        `;
                    });
                }
                html += `</div></div>`;
                return html;
            }
        };

        // =========================================
        // INITIALIZATION
        // =========================================
        App.registerModule(TimeTrackerModule);
        App.registerModule(TaskManagerModule); 
        App.registerModule(TimeOffModule); 
        App.registerModule(AnnouncementsModule); 
        App.registerModule(ExpensesModule);
        App.registerModule(KudosModule); 
        App.registerModule(MoodTrackerModule); 
        App.registerModule(HelpDeskModule);
        App.registerModule(SuggestionsModule); 
        App.registerModule(PollsModule); 
        App.registerModule(EventsModule); 
        App.registerModule(DirectoryModule); 
        App.registerModule(GoalsModule);
        App.registerModule(ResourcesModule); 
        App.registerModule(BookingsModule); 
        App.registerModule(VisitorsModule); 
        App.registerModule(CafeteriaModule); 
        App.registerModule(EquipmentModule);
        App.registerModule(RewardsModule); 
        App.registerModule(LostFoundModule); 
        App.registerModule(ShiftSwapModule); 
        App.registerModule(CarpoolModule);
        App.registerModule(WellnessModule); 
        App.registerModule(JukeboxModule);
        App.registerModule(StandupsModule); 
        App.registerModule(MarketplaceModule); 
        App.registerModule(CelebrationsModule); 
        App.registerModule(TrainingModule); 
        App.registerModule(WorkLocationModule); 
        App.registerModule(ReferralsModule);
        
        window.onload = () => App.init();

    </script>
</body>
</html>
