<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Wallet 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            font-family: 'Inter', sans-serif;
        }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border-radius: 2rem; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .balance-card {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md p-6 flex flex-col gap-6">
        <!-- Header -->
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fas fa-wallet text-indigo-600"></i> Smart Wallet
            </h1>
            <div id="petStatus" class="text-4xl transition-all duration-300 transform hover:scale-125 cursor-help" title="สถานะการเงินของคุณ">😺</div>
        </div>

        <!-- ยอดเงินคงเหลือ -->
        <div class="balance-card p-6 rounded-3xl shadow-lg text-white text-center">
            <p class="opacity-80 text-sm font-medium mb-1">ยอดเงินคงเหลือปัจจุบัน</p>
            <h2 id="totalBalance" class="text-4xl font-black tracking-tight">฿0.00</h2>
            <div id="authStatus" class="text-[10px] mt-2 opacity-50 font-mono">กำลังเชื่อมต่อ...</div>
        </div>

        <!-- Smart Input -->
        <div class="flex flex-col gap-3 bg-gray-50 p-4 rounded-2xl border border-gray-100">
            <div class="flex justify-between items-center">
                <label class="text-xs font-bold text-gray-500 uppercase">
                    <i class="fas fa-bolt text-yellow-500 mr-1"></i> Quick Add
                </label>
                <span class="text-[10px] text-gray-400">ตัวอย่าง: กาแฟ 60 หรือ โบนัส +500</span>
            </div>
            <div class="flex gap-2">
                <input type="text" id="smartInput" 
                    placeholder="พิมพ์ชื่อและจำนวนเงิน..." 
                    class="w-full px-4 py-3 rounded-xl border-2 border-transparent bg-white shadow-sm focus:border-indigo-400 focus:outline-none transition-all">
                <button id="addBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white w-12 h-12 flex items-center justify-center rounded-xl shadow-lg transition-transform active:scale-95">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>

        <!-- รายการธุรกรรม -->
        <div>
            <div class="flex justify-between items-end mb-3">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">ประวัติรายการ</h3>
                <span id="itemCount" class="text-xs text-gray-400">0 รายการ</span>
            </div>
            <div id="transactionList" class="flex flex-col gap-3 max-h-[320px] overflow-y-auto pr-1 custom-scroll">
                <!-- รายการจะมาปรากฏที่นี่ -->
                <div class="py-10 text-center opacity-40">
                    <i class="fas fa-circle-notch fa-spin text-2xl mb-2"></i>
                    <p class="text-sm">กำลังโหลดข้อมูล...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Configurations
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'expense-tracker-2026';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM Elements
        const smartInput = document.getElementById('smartInput');
        const addBtn = document.getElementById('addBtn');
        const transactionList = document.getElementById('transactionList');
        const totalBalanceEl = document.getElementById('totalBalance');
        const petStatus = document.getElementById('petStatus');
        const authStatus = document.getElementById('authStatus');
        const itemCount = document.getElementById('itemCount');

        let currentUser = null;

        // Authentication Initialization
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
                authStatus.innerText = "การเชื่อมต่อล้มเหลว";
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                authStatus.innerText = `UID: ${user.uid.substring(0, 8)}...`;
                setupDataListener(user.uid);
            }
        });

        initAuth();

        // Data Listener (Rule 1 & 2)
        function setupDataListener(userId) {
            // Path: /artifacts/{appId}/users/{userId}/transactions
            const txCol = collection(db, 'artifacts', appId, 'users', userId, 'transactions');
            
            // Simple query (Rule 2: No complex ordering in Firestore to avoid index requirement)
            onSnapshot(txCol, (snapshot) => {
                const transactions = [];
                snapshot.forEach(doc => {
                    transactions.push({ id: doc.id, ...doc.data() });
                });

                // Sort in memory (Rule 2)
                transactions.sort((a, b) => {
                    const timeA = a.createdAt?.seconds || 0;
                    const timeB = b.createdAt?.seconds || 0;
                    return timeB - timeA;
                });

                renderUI(transactions);
            }, (error) => {
                console.error("Firestore Error:", error);
                transactionList.innerHTML = `<p class="text-center text-red-500 text-xs py-4">เกิดข้อผิดพลาดในการดึงข้อมูล</p>`;
            });
        }

        function renderUI(data) {
            transactionList.innerHTML = '';
            let total = 0;

            if (data.length === 0) {
                transactionList.innerHTML = `
                    <div class="py-10 text-center opacity-30 border-2 border-dashed border-gray-200 rounded-2xl">
                        <i class="fas fa-receipt text-3xl mb-2"></i>
                        <p class="text-sm font-medium">ยังไม่มีรายการบันทึก</p>
                    </div>
                `;
                totalBalanceEl.innerText = '฿0.00';
                itemCount.innerText = '0 รายการ';
                return;
            }

            data.forEach(item => {
                const isIncome = item.type === 'income';
                total += isIncome ? item.amount : -item.amount;

                const card = document.createElement('div');
                card.className = "flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-gray-50 hover:border-indigo-100 transition-all group";
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 flex items-center justify-center rounded-full ${isIncome ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-500'}">
                            <i class="fas ${isIncome ? 'fa-arrow-up' : 'fa-arrow-down'} text-sm"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-700 text-sm">${item.title}</p>
                            <p class="text-[10px] text-gray-400">${item.createdAt ? new Date(item.createdAt.seconds * 1000).toLocaleTimeString('th-TH') : 'กำลังบันทึก...'}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold ${isIncome ? 'text-green-600' : 'text-red-500'}">
                            ${isIncome ? '+' : '-'}฿${item.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </span>
                        <button onclick="window.deleteItem('${item.id}')" class="opacity-0 group-hover:opacity-100 p-2 text-gray-300 hover:text-red-400 transition-all">
                            <i class="fas fa-trash-can text-xs"></i>
                        </button>
                    </div>
                `;
                transactionList.appendChild(card);
            });

            // Update Header Info
            totalBalanceEl.innerText = `฿${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            itemCount.innerText = `${data.length} รายการ`;

            // Pet Logic
            if (total > 50000) petStatus.innerText = '🤑';
            else if (total > 10000) petStatus.innerText = '😎';
            else if (total > 1000) petStatus.innerText = '😸';
            else if (total >= 0) petStatus.innerText = '😺';
            else if (total > -2000) petStatus.innerText = '😰';
            else petStatus.innerText = '😿';
        }

        // Add Logic
        const addTransaction = async () => {
            if (!currentUser) return;
            const text = smartInput.value.trim();
            if (!text) return;

            // Regex: match name and amount (e.g., "coffee 60" or "bonus +500")
            const match = text.match(/(.*?)\s+([+-]?\d+(?:\.\d+)?)$/);
            
            if (match) {
                let title = match[1].trim();
                let amount = parseFloat(match[2]);
                let type = (text.includes('+') || amount > 0) ? 'income' : 'expense';
                if (text.includes('-')) type = 'expense';
                
                amount = Math.abs(amount);

                addBtn.disabled = true;
                addBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

                try {
                    const txCol = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions');
                    await addDoc(txCol, {
                        title: title || 'ไม่ระบุชื่อ',
                        amount: amount,
                        type: type,
                        createdAt: serverTimestamp()
                    });
                    smartInput.value = '';
                } catch (err) {
                    console.error("Save Error:", err);
                } finally {
                    addBtn.disabled = false;
                    addBtn.innerHTML = '<i class="fas fa-plus"></i>';
                }
            } else {
                smartInput.classList.add('border-red-400');
                setTimeout(() => smartInput.classList.remove('border-red-400'), 1000);
            }
        };

        // Delete Logic
        window.deleteItem = async (id) => {
            if (!currentUser || !confirm('ยืนยันการลบรายการนี้?')) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'transactions', id);
                await deleteDoc(docRef);
            } catch (err) {
                console.error("Delete Error:", err);
            }
        };

        addBtn.addEventListener('click', addTransaction);
        smartInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTransaction();
        });
    </script>
</body>
</html>
