<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงเวลาพนักงาน</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { background: white; padding: 30px 20px; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        h1 { font-size: 1.2em; color: #555; margin-top: 0; margin-bottom: 20px; }
        
        .login-box { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; font-family: 'Sarabun'; text-align: center; margin: 0 auto; box-sizing: border-box; }
        .btn-login { background-color: #2563eb; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: bold; font-family: 'Sarabun'; width: 90%; margin: 0 auto; transition: background 0.2s; }
        
        #userGreeting { color: #2563eb; font-weight: bold; margin-bottom: 5px; }
        .clock { font-size: 3em; font-weight: bold; color: #222; margin: 15px 0; }
        
        .btn-group { display: flex; gap: 15px; margin-bottom: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 1em; font-family: 'Sarabun', sans-serif; font-weight: bold; color: white; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-in { background-color: #10b981; } 
        .btn-out { background-color: #ef4444; } 
        
        .btn-group-sub { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-ot { background-color: #f59e0b; padding: 10px; font-size: 0.9em; }
        .btn-leave { background-color: #8b5cf6; padding: 10px; font-size: 0.9em; }
        
        .btn-action { background-color: #f3f4f6; color: #374151; padding: 10px; border-radius: 8px; font-size: 0.9em; margin-top: 10px; width: 100%; border: 1px solid #d1d5db; }
        .btn-logout { background-color: #fee2e2; color: #ef4444; padding: 10px; border-radius: 8px; font-size: 0.9em; margin-top: 10px; width: 100%; }
        
        /* สไตล์สำหรับหน้า Dashboard */
        .dash-content { text-align: left; background: #f9fafb; padding: 15px; border-radius: 12px; font-size: 0.9em; min-height: 200px; max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
        .dash-summary { display: flex; justify-content: space-between; background: #e0f2fe; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: #0369a1; }
        .dash-item { border-bottom: 1px dashed #e5e7eb; padding: 8px 0; }
        .dash-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div class="app-container" id="loginScreen">
        <h1>เข้าสู่ระบบลงเวลา</h1>
        <div class="login-box">
            <input type="text" id="inputId" placeholder="รหัสพนักงาน (User)">
            <input type="password" id="inputPin" placeholder="รหัสผ่าน / PIN">
            <button class="btn-login" onclick="login()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div class="app-container" id="mainScreen" style="display: none;">
        <div id="userGreeting">รหัสพนักงาน: <span id="displayId"></span></div>
        <div class="clock" id="clockDisplay">00:00</div>
        
        <div class="btn-group">
            <button class="btn-in" onclick="processRecord('เข้างาน', this, true)">เข้างาน</button>
            <button class="btn-out" onclick="processRecord('ออกงาน', this, true)">ออกงาน</button>
        </div>
        
        <div class="btn-group-sub">
            <button class="btn-ot" onclick="processRecord('โอที', this, true)">เริ่มโอที</button>
            <button class="btn-leave" onclick="processRecord('ลางาน', this, false)">แจ้งลางาน</button>
        </div>

        <button class="btn-action" onclick="openDashboard()">📊 ดูสรุปข้อมูลวันนี้</button>
        <button class="btn-logout" onclick="logout()">🚪 ออกจากระบบ</button>
    </div>

    <div class="app-container" id="dashboardScreen" style="display: none;">
        <h1>สรุปข้อมูลประจำวัน</h1>
        <div class="dash-content" id="dashContent">
            กำลังโหลดข้อมูล...
        </div>
        <button class="btn-action" onclick="closeDashboard()">🔙 กลับหน้าลงเวลา</button>
    </div>

    <script>
        // --- 🔴 ตั้งค่าระบบตรงนี้ ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXuioI9v6FsX3lXZXej1_NXb-Mi8JYC_8JKSQH_8laQSud39ThLGm6X_1j38MiMNPv/exec';
        
        // พิกัดออฟฟิศของคุณ
        const OFFICE_LAT = 8.597226393849; 
        const OFFICE_LON = 99.92618619071712; 
        const ALLOWED_RADIUS = 100;

        let currentUser = "";
        let currentPin = "";

        // --- ควบคุมหน้าจอ ---
        function login() {
            const id = document.getElementById('inputId').value.trim();
            const pin = document.getElementById('inputPin').value.trim();
            if(id === "" || pin === "") { alert("กรุณากรอกข้อมูลให้ครบถ้วน"); return; }
            currentUser = id; currentPin = pin;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            document.getElementById('displayId').innerText = currentUser;
        }

        function logout() {
            currentUser = ""; currentPin = "";
            document.getElementById('inputId').value = ""; document.getElementById('inputPin').value = "";
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
        }

        // --- นาฬิกา ---
        setInterval(() => {
            document.getElementById('clockDisplay').innerText = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function processRecord(type, btnElement, requireGeofence) {
            let remark = "";
            if(type === 'ลางาน') {
                remark = prompt("ระบุเหตุผลการลางาน (เช่น ป่วย, ลากิจ):");
                if(remark === null || remark.trim() === "") return; 
            }

            const originalText = btnElement.innerText;
            btnElement.innerText = "กำลังตรวจพิกัด...";
            btnElement.disabled = true;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLat = position.coords.latitude;
                        const userLon = position.coords.longitude;
                        
                        if(requireGeofence) {
                            const distance = getDistance(OFFICE_LAT, OFFICE_LON, userLat, userLon);
                            if(distance > ALLOWED_RADIUS) {
                                alert(`คุณอยู่นอกพื้นที่ออฟฟิศ! (ห่างออกไป ${Math.round(distance)} เมตร)`);
                                btnElement.innerText = originalText;
                                btnElement.disabled = false;
                                return; 
                            }
                        }

                        const locText = `${userLat.toFixed(5)}, ${userLon.toFixed(5)}`;
                        saveData(type, locText, remark, btnElement, originalText);
                    },
                    (error) => {
                        alert("โปรดอนุญาตการเข้าถึงตำแหน่ง (GPS) ในการตั้งค่าเบราว์เซอร์");
                        btnElement.innerText = originalText;
                        btnElement.disabled = false;
                    },
                    { enableHighAccuracy: true } 
                );
            } else {
                alert("อุปกรณ์ของคุณไม่รองรับ GPS");
                btnElement.innerText = originalText;
                btnElement.disabled = false;
            }
        }

        function saveData(type, location, remark, btnElement, originalText) {
            btnElement.innerText = "กำลังบันทึก...";
            const now = new Date();
            const payload = { 
                date: now.toLocaleDateString('th-TH'), 
                time: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }), 
                type: type, location: location, empId: currentUser, pin: currentPin, remark: remark 
            };

            fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                alert(`บันทึก [${type}] เรียบร้อยแล้ว`);
                btnElement.innerText = originalText;
                btnElement.disabled = false;
            }).catch(() => {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
                btnElement.innerText = originalText;
                btnElement.disabled = false;
            });
        }

        // --- ระบบ Dashboard (ดึงข้อมูล) ---
        function openDashboard() {
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            const dashContent = document.getElementById('dashContent');
            dashContent.innerHTML = "<div style='text-align:center; padding: 20px;'>กำลังโหลดข้อมูล...⏳</div>";

            fetch(SCRIPT_URL)
            .then(response => response.json())
            .then(data => {
                if(data.error) {
                    dashContent.innerHTML = "เกิดข้อผิดพลาด: " + data.error;
                    return;
                }

                if(data.length === 0) {
                    dashContent.innerHTML = "<div style='text-align:center; padding: 20px; color: #888;'>ยังไม่มีข้อมูลการลงเวลาในวันนี้</div>";
                    return;
                }

                // นับจำนวนคนเข้างานและลางาน
                let countIn = data.filter(d => d.type === 'เข้างาน').length;
                let countLeave = data.filter(d => d.type === 'ลางาน').length;

                let html = `
                    <div class="dash-summary">
                        <span>✅ เข้างาน: ${countIn}</span>
                        <span style="color:#ef4444;">❌ ลางาน: ${countLeave}</span>
                    </div>
                `;

                // สร้างรายการแต่ละคน (ย้อนกลับให้คนล่าสุดอยู่บนสุด)
                data.reverse().forEach(item => {
                    let color = '#555';
                    if(item.type === 'เข้างาน') color = '#10b981';
                    if(item.type === 'ออกงาน') color = '#ef4444';
                    if(item.type === 'ลางาน') color = '#8b5cf6';
                    if(item.type === 'โอที') color = '#f59e0b';

                    html += `
                        <div class="dash-item">
                            <div>🆔 <b>${item.empId}</b> | <span style="color:${color}; font-weight:bold;">${item.type}</span></div>
                            <div style="font-size: 0.8em; color: #666; margin-top: 3px;">
                                ⏱️ ${item.time} น. ${item.remark && item.remark !== "-" ? `<br>📝 ${item.remark}` : ''}
                            </div>
                        </div>
                    `;
                });

                dashContent.innerHTML = html;
            })
            .catch(error => {
                dashContent.innerHTML = "<div style='text-align:center; padding: 20px; color: red;'>ไม่สามารถเชื่อมต่อฐานข้อมูลได้</div>";
            });
        }

        function closeDashboard() {
            document.getElementById('dashboardScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
        }
    </script>
</body>
</html>
