<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeTrack (Modern UI 2025)</title>
    <style>
        /* --- Modern Variables 2025 --- */
        :root {
            --primary: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --success-gradient: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --danger-gradient: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%);
            
            --bg-body: #0f172a; /* พื้นหลังจอคอม */
            --bg-app: #f8fafc; /* พื้นหลังแอปหลัก */
            
            /* Glassmorphism Colors */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
            
            --text-main: #0f172a;
            --text-muted: #64748b;
            --tab-bar-bg: rgba(255, 255, 255, 0.8);
            
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-pill: 999px;
            
            --shadow-glass: 0 10px 40px -10px rgba(0,0,0,0.08);
            --shadow-glow: 0 8px 20px -6px rgba(99, 102, 241, 0.5);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- กรอบจำลองมือถือ --- */
        #app-container {
            width: 100%;
            max-width: 414px; 
            height: 100vh;
            max-height: 896px;
            background-color: var(--bg-app);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-radius: 0; /* บน desktop จะตัดขอบตรง */
        }

        /* Modern Background Orbs */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
            animation: floatOrb 10s ease-in-out infinite alternate;
        }
        .orb-1 { top: -50px; right: -50px; width: 250px; height: 250px; background: #e0e7ff; }
        .orb-2 { bottom: 100px; left: -100px; width: 300px; height: 300px; background: #fce7f3; }
        .orb-3 { top: 40%; right: -150px; width: 200px; height: 200px; background: #dcfce7; }

        @keyframes floatOrb {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(20px) scale(1.1); }
        }

        @media (max-width: 414px) {
            #app-container { max-height: 100vh; box-shadow: none; border-radius: 0; }
        }

        /* --- App Bar ด้านบน --- */
        header {
            padding: 1.5rem 1.5rem 1rem 1.5rem;
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
        }

        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .header-actions { display: flex; gap: 1rem; align-items: center; }
        .user-role-badge { font-size: 0.7rem; padding: 0.3rem 0.8rem; border-radius: var(--radius-pill); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .role-admin { background-color: rgba(99, 102, 241, 0.15); color: var(--primary); }
        .role-emp { background-color: rgba(16, 185, 129, 0.15); color: #059669; }
        
        .btn-logout {
            background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); color: #f43f5e;
            font-size: 0.8rem; font-weight: 700; cursor: pointer; padding: 0.4rem 1rem; border-radius: var(--radius-pill); display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.2s;
        }
        .btn-logout:active { transform: scale(0.95); }

        /* --- พื้นที่แสดงผลหลัก --- */
        main {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; 
            padding: 0 1.5rem 100px 1.5rem; 
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        /* --- Bottom Tab Bar (Modern Glass) --- */
        .bottom-nav {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            right: 1.5rem;
            display: flex;
            background-color: var(--tab-bar-bg);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-pill);
            padding: 0.5rem; 
            z-index: 20;
            box-shadow: var(--shadow-glass);
        }

        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0.6rem 0; color: var(--text-muted); text-decoration: none; font-size: 0.65rem;
            font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: var(--radius-pill);
        }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 2px; stroke-width: 2.5px; transition: transform 0.2s; }
        .nav-item.active { background: var(--text-main); color: white; }
        .nav-item.active svg { transform: translateY(-2px); }

        /* --- การ์ดและ UI Components (Glassmorphism Bento) --- */
        .card {
            background: var(--glass-bg); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl); 
            padding: 1.5rem;
            box-shadow: var(--shadow-glass); 
            text-align: center; 
            margin-bottom: 1.5rem;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .section-title {
            font-size: 1.1rem; font-weight: 800; text-align: left; margin-top: 1rem;
            margin-bottom: 1rem; color: var(--text-main); letter-spacing: -0.3px;
        }

        .native-input {
            width: 100%; padding: 1.2rem 1.5rem; border-radius: var(--radius-lg); border: 2px solid transparent;
            background-color: rgba(255, 255, 255, 0.8); font-size: 1rem; font-family: inherit; font-weight: 500;
            color: var(--text-main); outline: none; box-sizing: border-box;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); transition: all 0.3s; margin-bottom: 1rem;
        }
        .native-input:focus { border-color: var(--primary); background-color: #fff; box-shadow: var(--shadow-glow); transform: translateY(-2px); }

        .btn {
            width: 100%; border: none; padding: 1.2rem; font-size: 1rem; font-weight: 700;
            border-radius: var(--radius-lg); cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;
        }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        .btn-primary { background: var(--primary-gradient); color: white; box-shadow: var(--shadow-glow); }
        .btn-success { background: var(--success-gradient); color: white; box-shadow: 0 8px 20px -6px rgba(16, 185, 129, 0.5); }
        .btn-danger { background: var(--danger-gradient); color: white; box-shadow: 0 8px 20px -6px rgba(244, 63, 94, 0.5); }
        .btn-outline { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px); color: var(--text-main); border: 1px solid var(--glass-border); }

        /* Dashboard Typography */
        .live-clock { font-size: 4.5rem; font-weight: 800; margin: 1.5rem 0 0.5rem 0; font-variant-numeric: tabular-nums; letter-spacing: -3px; color: var(--text-main); text-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .live-date { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; font-weight: 500; }
        
        .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 0.5rem 1.2rem; border-radius: var(--radius-pill); font-size: 0.85rem; font-weight: 700; background: var(--glass-bg); border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .status-in { color: #059669; }
        .status-out { color: var(--text-muted); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .dot.pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(5, 150, 105, 0); } 100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0); } }

        /* --- Modern List View --- */
        .list-group { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1.2rem; background: var(--glass-bg); backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); border-radius: var(--radius-lg); 
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .list-item:active { transform: scale(0.98); background: #fff; }
        
        .item-main { display: flex; flex-direction: column; text-align: left; }
        .item-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 4px; color: var(--text-main); letter-spacing: -0.3px; }
        .item-subtitle { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
        
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.95rem; font-weight: 500;}
        
        /* สัญลักษณ์คนและแม่กุญแจ */
        .icon-circle { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #e0e7ff, #f3e8ff); display: flex; align-items: center; justify-content: center; margin-right: 1rem; color: var(--primary); }

        /* --- Thumb Zone Actions (เพิ่มใหม่สำหรับรวมปุ่มไว้ด้านล่าง) --- */
        .thumb-actions {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--glass-border);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            z-index: 40;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.06);
            box-sizing: border-box;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- Kiosk Mode Modern Grid --- */
        .emp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .emp-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
            padding: 1.5rem 1rem;
            border-radius: var(--radius-xl);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--glass-border);
        }
        .emp-card:active { transform: scale(0.93); }
        .emp-card .icon-circle { margin: 0 auto 0.75rem auto; width: 60px; height: 60px; background: #fff; box-shadow: 0 8px 16px rgba(0,0,0,0.04); }
        .emp-name-large { font-weight: 700; font-size: 1.1rem; color: var(--text-main); letter-spacing: -0.3px; }
        
        .admin-link {
            text-align: center; padding: 1rem; color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
            cursor: pointer; margin-top: 2rem; transition: color 0.2s;
        }
        .admin-link:active { color: var(--primary); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Background Decor -->
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>

        <!-- App Bar -->
        <header>
            <div class="logo">TimeTrack</div>
            <div class="header-actions">
                <div id="roleBadge"></div>
                <button class="btn-logout" id="btnLogout" onclick="logout()">ออกระบบ</button>
            </div>
        </header>

        <!-- พื้นที่แสดงเนื้อหาหลัก -->
        <main>
            <div id="app-content"></div>
        </main>

        <!-- Bottom Navigation Bar -->
        <nav class="bottom-nav" id="bottomNav" style="display: none;"></nav>
    </div>

    <!-- ใช้ type="module" เพื่อใช้งาน Firebase JS SDK v9 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase Configuration ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyBHuZGyY1F3v4rCrhrpt9YB90C0Ahh-stE",
            authDomain: "my-company-time-tracking.firebaseapp.com",
            projectId: "my-company-time-tracking",
            storageBucket: "my-company-time-tracking.firebasestorage.app",
            messagingSenderId: "758524847747",
            appId: "1:758524847747:web:2e5a49e4064334f1265db6",
            measurementId: "G-50SYJKTRT1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        /* =========================================
           ส่วนที่ 1: การจัดการข้อมูล (State & Firebase)
           ========================================= */
        let records = [];
        let employees = [];
        let adminPin = null; 
        let currentUser = JSON.parse(sessionStorage.getItem('currentUser')) || null;
        
        let isReady = false;
        let loadedFlags = { emp: false, rec: false, sys: false };
        const contentDiv = document.getElementById('app-content');
        const bottomNav = document.getElementById('bottomNav');
        const btnLogout = document.getElementById('btnLogout');
        const roleBadge = document.getElementById('roleBadge');
        let clockInterval;

        // เริ่มต้นตรวจสอบสิทธิ์ (Anonymous Auth) และดึงข้อมูล
        contentDiv.innerHTML = '<div class="empty-state">กำลังเชื่อมต่อฐานข้อมูล... ⏳</div>';
        
        signInAnonymously(auth).then(() => {
            setupRealtimeListeners();
        }).catch(err => {
            console.error("Auth Failed:", err);
            contentDiv.innerHTML = '<div class="empty-state" style="color: #f43f5e;">การเชื่อมต่อฐานข้อมูลล้มเหลว<br>กรุณาตรวจสอบ Firebase Security Rules</div>';
        });

        function checkReady() {
            if (loadedFlags.emp && loadedFlags.rec && loadedFlags.sys && !isReady) {
                isReady = true;
                updateHeaderAndNav();
                handleRouting();
            }
        }

        // ฟังการเปลี่ยนแปลงของข้อมูลแบบ Real-time
        function setupRealtimeListeners() {
            // ฟังข้อมูลพนักงาน
            onSnapshot(collection(db, "employees"), (snap) => {
                employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                loadedFlags.emp = true;
                if(isReady) refreshCurrentView(); else checkReady();
            }, (error) => console.error(error));

            // ฟังข้อมูลประวัติ
            onSnapshot(collection(db, "timeRecords"), (snap) => {
                records = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                records.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                loadedFlags.rec = true;
                if(isReady) refreshCurrentView(); else checkReady();
            }, (error) => console.error(error));

            // ฟังข้อมูลตั้งค่าระบบ (Admin PIN)
            onSnapshot(collection(db, "system"), (snap) => {
                const adminDoc = snap.docs.find(d => d.id === 'settings');
                if (adminDoc) adminPin = adminDoc.data().adminPin;
                else adminPin = null;
                loadedFlags.sys = true;
                if(isReady) refreshCurrentView(); else checkReady();
            }, (error) => console.error(error));
        }

        function refreshCurrentView() {
            // รีโหลดหน้าปัจจุบันเพื่อให้ข้อมูลเป็นปัจจุบันที่สุด
            const page = window.location.hash.replace('#', '');
            if (page) navigateTo(page, false);
        }

        function getEmployeeStatus(empId) {
            const empRecords = records.filter(r => r.empId === empId);
            if (empRecords.length === 0) return 'OUT';
            return empRecords[empRecords.length - 1].type;
        }

        /* =========================================
           ส่วนส่งออกฟังก์ชันให้ HTML เรียกใช้งานได้ (เพราะใช้ type="module")
           ========================================= */
        window.saveSetupPin = async function() {
            const pin = document.getElementById('setupPin').value;
            if (pin.length !== 4 || isNaN(pin)) return alert('กรุณากรอกตัวเลข 4 หลักเท่านั้น');
            
            await setDoc(doc(db, "system", "settings"), { adminPin: pin });
            adminPin = pin;
            navigateTo('login');
        };

        window.recordTime = async function(type) {
            if (!currentUser || currentUser.role !== 'emp') return;
            const emp = employees.find(e => e.id === currentUser.id);
            if (!emp) return;

            const now = new Date();
            const recordData = {
                empId: emp.id,
                empName: emp.name,
                type: type,
                timestamp: now.toISOString(),
                timeString: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                dateString: now.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' })
            };
            
            // เพิ่มลง Firestore 
            await addDoc(collection(db, "timeRecords"), recordData);
        };

        window.logout = function() {
            sessionStorage.removeItem('currentUser');
            currentUser = null;
            clearInterval(clockInterval);
            updateHeaderAndNav();
            navigateTo('login');
        };

        window.handleAddEmployee = async function() {
            const name = document.getElementById('newEmpName').value.trim();
            const pin = document.getElementById('newEmpPin').value;
            if (!name) return alert('กรุณาระบุชื่อ');
            if (pin.length !== 4 || isNaN(pin)) return alert('กรุณาตั้งรหัส PIN 4 หลักที่เป็นตัวเลข');

            await addDoc(collection(db, "employees"), { name, pin });
            // UI จะถูกอัปเดตอัตโนมัติจาก onSnapshot
        };

        window.handleDeleteEmployee = async function(id) {
            if (confirm('ยืนยันการลบพนักงานรายนี้?\nประวัติการทำงานเดิมจะยังคงอยู่')) {
                await deleteDoc(doc(db, "employees", id));
            }
        };

        window.clearAllHistory = async function() {
            if(confirm('คำเตือน! ต้องการลบข้อมูลประวัติของ "ทุกคน" ใช่หรือไม่?')) {
                const promises = records.map(r => deleteDoc(doc(db, "timeRecords", r.id)));
                await Promise.all(promises);
            }
        };

        window.navigateTo = navigateTo;
        window.promptAdminLogin = promptAdminLogin;
        window.verifyAdminLogin = verifyAdminLogin;
        window.promptEmpLogin = promptEmpLogin;
        window.verifyEmpLogin = verifyEmpLogin;
        window.renderLogin = renderLogin;


        /* =========================================
           ส่วนที่ 2: การควบคุม UI แกนหลัก
           ========================================= */
        function updateHeaderAndNav() {
            if (!currentUser) {
                bottomNav.style.display = 'none';
                btnLogout.style.display = 'none';
                roleBadge.innerHTML = '';
                return;
            }

            if (currentUser.role === 'admin') {
                bottomNav.style.display = 'flex';
                btnLogout.style.display = 'block';
                roleBadge.innerHTML = '<span class="user-role-badge role-admin">Admin</span>';
                bottomNav.innerHTML = `
                    <a class="nav-item" onclick="navigateTo('admin-dash')" id="nav-admin-dash">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        ภาพรวม
                    </a>
                    <a class="nav-item" onclick="navigateTo('admin-emp')" id="nav-admin-emp">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        พนักงาน
                    </a>
                    <a class="nav-item" onclick="navigateTo('admin-hist')" id="nav-admin-hist">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        ประวัติรวม
                    </a>
                `;
            } else if (currentUser.role === 'emp') {
                bottomNav.style.display = 'none';
                btnLogout.style.display = 'none';
                roleBadge.innerHTML = '<span class="user-role-badge role-emp">Staff</span>';
            }
        }

        function startClock() {
            clearInterval(clockInterval);
            const tick = () => {
                const now = new Date();
                const clockEl = document.getElementById('clockDisplay');
                const dateEl = document.getElementById('dateDisplay');
                if(clockEl && dateEl) {
                    clockEl.textContent = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    dateEl.textContent = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                }
            };
            tick();
            clockInterval = setInterval(tick, 1000);
        }

        /* =========================================
           ส่วนที่ 3: ระบบ Login (Modern Kiosk)
           ========================================= */
        function renderSetup() {
            contentDiv.innerHTML = `
                <div class="card" style="margin-top: 2rem;">
                    <div class="icon-circle" style="margin: 0 auto 1.5rem auto; width: 70px; height: 70px; background: var(--primary-gradient); color: white;"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="36" height="36"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></div>
                    <h2 style="margin-top: 0; font-weight: 800; letter-spacing: -0.5px;">ยินดีต้อนรับสู่ระบบคลาวด์</h2>
                    <p style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500; margin-bottom: 2rem;">เริ่มต้นใช้งานระบบ<br>กรุณาตั้งรหัส PIN 4 หลัก สำหรับแอดมิน</p>
                    <input type="password" id="setupPin" class="native-input" placeholder="••••" maxlength="4" pattern="[0-9]*" inputmode="numeric" style="text-align: center; font-size: 2rem; letter-spacing: 12px; padding: 1rem;" oninput="if(this.value.length === 4) saveSetupPin()" autofocus>
                </div>
                <div style="height: 120px;"></div>
                <div class="thumb-actions">
                    <button class="btn btn-primary" style="padding: 1.2rem; border-radius: var(--radius-xl);" onclick="saveSetupPin()">บันทึกและเริ่มต้น</button>
                </div>
            `;
        }

        function renderLogin() {
            let employeeList = '';
            if (employees.length === 0) {
                employeeList = `
                    <div class="card" style="margin-top:2rem;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="48" height="48" style="color:var(--text-muted); margin-bottom:1rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <h3 style="margin-top:0;">ยังไม่มีพนักงาน</h3>
                        <p style="color:var(--text-muted); font-size:0.9rem;">กรุณาเข้าระบบแอดมินเพื่อเพิ่มข้อมูลพนักงาน</p>
                    </div>`;
            } else {
                employeeList = `<div class="emp-grid">`;
                employees.forEach(emp => {
                    employeeList += `
                        <div class="emp-card" onclick="promptEmpLogin('${emp.id}', '${emp.name}')">
                            <div class="icon-circle"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="28" height="28" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></div>
                            <div class="emp-name-large">${emp.name}</div>
                        </div>
                    `;
                });
                employeeList += `</div>`;
            }

            contentDiv.innerHTML = `
                <div style="text-align: center; margin-bottom: 2.5rem; margin-top: 1.5rem;">
                    <h2 style="margin: 0; color: var(--text-main); font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px;">สวัสดีครับ 👋</h2>
                    <p style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500; margin-top: 0.5rem;">แตะที่ชื่อของคุณเพื่อลงเวลาทำงาน</p>
                </div>
                ${employeeList}
                <div class="admin-link" onclick="promptAdminLogin()">สำหรับเจ้าของร้าน (Admin)</div>
            `;
        }

        function promptAdminLogin() {
            contentDiv.innerHTML = `
                <div class="card" style="margin-top: 2rem;">
                    <div class="icon-circle" style="margin: 0 auto 1.5rem auto; width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); color: var(--primary);"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="28" height="28"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></div>
                    <h3 style="margin-top: 0; font-weight: 800;">เจ้าของร้าน</h3>
                    <p style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500; margin-bottom: 1.5rem;">กรุณากรอกรหัส PIN</p>
                    <input type="password" id="authPin" class="native-input" placeholder="••••" maxlength="4" pattern="[0-9]*" inputmode="numeric" style="text-align: center; font-size: 2rem; letter-spacing: 12px; padding: 1rem;" oninput="if(this.value.length === 4) verifyAdminLogin()" autofocus>
                </div>
                <div style="height: 100px;"></div>
                <div class="thumb-actions">
                    <button class="btn btn-outline" style="padding: 1.2rem; border-radius: var(--radius-xl);" onclick="renderLogin()">ย้อนกลับ</button>
                </div>
            `;
            setTimeout(() => document.getElementById('authPin').focus(), 100);
        }

        function verifyAdminLogin() {
            const pinInput = document.getElementById('authPin');
            if (pinInput.value === adminPin) {
                currentUser = { role: 'admin' };
                sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateHeaderAndNav();
                navigateTo('admin-dash');
            } else {
                alert('รหัส PIN ไม่ถูกต้อง');
                pinInput.value = ''; pinInput.focus();
            }
        }

        function promptEmpLogin(empId, empName) {
            contentDiv.innerHTML = `
                <div class="card" style="margin-top: 2rem;">
                    <div class="icon-circle" style="margin: 0 auto 1.5rem auto; width: 70px; height: 70px; background: #fff; box-shadow: 0 8px 16px rgba(0,0,0,0.04);"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="32" height="32"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></div>
                    <h3 style="margin-top: 0; font-weight: 800; font-size: 1.4rem;">${empName}</h3>
                    <p style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500; margin-bottom: 1.5rem;">กรุณากรอกรหัสประจำตัว</p>
                    <input type="password" id="authPin" class="native-input" placeholder="••••" maxlength="4" pattern="[0-9]*" inputmode="numeric" style="text-align: center; font-size: 2rem; letter-spacing: 12px; padding: 1rem;" oninput="if(this.value.length === 4) verifyEmpLogin('${empId}')" autofocus>
                </div>
                <div style="height: 100px;"></div>
                <div class="thumb-actions">
                    <button class="btn btn-outline" style="padding: 1.2rem; border-radius: var(--radius-xl);" onclick="renderLogin()">ย้อนกลับ</button>
                </div>
            `;
            setTimeout(() => document.getElementById('authPin').focus(), 100);
        }

        function verifyEmpLogin(empId) {
            const pinInput = document.getElementById('authPin');
            const emp = employees.find(e => e.id === empId);
            if (emp && emp.pin === pinInput.value) {
                currentUser = { role: 'emp', id: emp.id, name: emp.name };
                sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateHeaderAndNav();
                navigateTo('emp-dash');
            } else {
                alert('รหัส PIN ไม่ถูกต้อง');
                pinInput.value = ''; pinInput.focus();
            }
        }

        /* =========================================
           ส่วนที่ 4: Views ฝั่งพนักงาน (Employee)
           ========================================= */
        function renderEmpDashboard() {
            if (!currentUser || currentUser.role !== 'emp') return;
            const status = getEmployeeStatus(currentUser.id);
            const isClockedIn = status === 'IN';

            let statusHTML = '';
            let buttonHTML = '';

            if (isClockedIn) {
                statusHTML = `<div class="status-badge status-in"><div class="dot pulse"></div> กำลังทำงาน</div>`;
                buttonHTML = `<button class="btn btn-danger" style="padding: 1.5rem; font-size: 1.25rem; border-radius: var(--radius-xl);" onclick="recordTime('OUT')">บันทึกเวลาออกงาน</button>`;
            } else {
                statusHTML = `<div class="status-badge status-out"><div class="dot"></div> ยังไม่เข้างาน</div>`;
                buttonHTML = `<button class="btn btn-success" style="padding: 1.5rem; font-size: 1.25rem; border-radius: var(--radius-xl);" onclick="recordTime('IN')">บันทึกเวลาเข้างาน</button>`;
            }

            const myRecords = records.filter(r => r.empId === currentUser.id).reverse().slice(0, 3);
            let recentHistoryHTML = '';
            if (myRecords.length > 0) {
                let listItems = '';
                myRecords.forEach(rec => {
                    const isTypeIn = rec.type === 'IN';
                    const badgeColor = isTypeIn ? '#059669' : 'var(--text-muted)';
                    const badgeText = isTypeIn ? 'เข้างาน' : 'ออกงาน';
                    listItems += `
                        <div class="list-item" style="padding: 1rem; margin-bottom: 0.5rem; border-radius: var(--radius-lg);">
                            <span style="color: var(--text-main); font-weight: 600; font-size: 0.95rem;">${rec.dateString} ${rec.timeString}</span>
                            <span style="color: ${badgeColor}; font-weight: 700; font-size: 0.9rem; background: rgba(0,0,0,0.03); padding: 4px 10px; border-radius: var(--radius-pill);">${badgeText}</span>
                        </div>
                    `;
                });
                recentHistoryHTML = `
                    <div style="text-align: left; margin-top: 2rem;">
                        <div class="section-title" style="margin-top: 0;">ประวัติล่าสุด</div>
                        <div style="display:flex; flex-direction:column;">${listItems}</div>
                    </div>
                `;
            }

            contentDiv.innerHTML = `
                <div class="card" style="padding-top: 2.5rem; padding-bottom: 2.5rem; margin-bottom: 1.5rem;">
                    <h3 style="margin-top:0; color: var(--text-main); font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px;">คุณ ${currentUser.name}</h3>
                    <div style="margin-bottom: 1.5rem;">${statusHTML}</div>
                    <div class="live-clock" id="clockDisplay">00:00:00</div>
                    <div class="live-date" id="dateDisplay">--</div>
                </div>
                
                ${recentHistoryHTML}

                <div style="height: 180px;"></div>

                <div class="thumb-actions">
                    ${buttonHTML}
                    <button class="btn btn-outline" style="padding: 1.2rem; font-size: 1.1rem; border-radius: var(--radius-xl);" onclick="logout()">
                        กลับหน้าหลัก
                    </button>
                </div>
            `;
            startClock();
        }

        /* =========================================
           ส่วนที่ 5: Views ฝั่งแอดมิน (Admin)
           ========================================= */
        function renderAdminDashboard() {
            clearInterval(clockInterval);
            let workingCount = 0;
            let listHTML = '';

            if (employees.length === 0) {
                listHTML = `<div class="empty-state">ยังไม่มีพนักงานในระบบ</div>`;
            } else {
                listHTML = `<div class="list-group">`;
                employees.forEach(emp => {
                    const status = getEmployeeStatus(emp.id);
                    const isTypeIn = status === 'IN';
                    if(isTypeIn) workingCount++;

                    const badgeColor = isTypeIn ? '#059669' : 'var(--text-muted)';
                    const badgeBg = isTypeIn ? 'rgba(16, 185, 129, 0.1)' : 'var(--bg-app)';
                    const badgeText = isTypeIn ? 'กำลังทำงาน' : 'เลิกงาน';
                    
                    listHTML += `
                        <div class="list-item">
                            <span class="item-title" style="margin:0;">${emp.name}</span>
                            <span style="font-size: 0.8rem; font-weight: 700; padding: 6px 12px; border-radius: var(--radius-pill); background: ${badgeBg}; color: ${badgeColor};">${badgeText}</span>
                        </div>
                    `;
                });
                listHTML += `</div>`;
            }

            contentDiv.innerHTML = `
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem; margin-top: 1rem;">
                    <div class="card" style="flex: 1; padding: 1.5rem 1rem; margin: 0;">
                        <div style="font-size: 2.5rem; font-weight: 800; color: var(--primary); letter-spacing: -1px;">${employees.length}</div>
                        <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">พนักงานทั้งหมด</div>
                    </div>
                    <div class="card" style="flex: 1; padding: 1.5rem 1rem; margin: 0;">
                        <div style="font-size: 2.5rem; font-weight: 800; color: #059669; letter-spacing: -1px;">${workingCount}</div>
                        <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">กำลังทำงาน</div>
                    </div>
                </div>
                <div class="section-title">สถานะพนักงานวันนี้</div>
                ${listHTML}
            `;
        }

        function renderAdminEmployees() {
            clearInterval(clockInterval);
            let listHTML = '';

            if (employees.length === 0) {
                listHTML = `<div class="empty-state">ยังไม่ได้เพิ่มรายชื่อพนักงาน</div>`;
            } else {
                listHTML = `<div class="list-group">`;
                employees.forEach(emp => {
                    listHTML += `
                        <div class="list-item">
                            <div class="item-main">
                                <span class="item-title" style="margin:0;">${emp.name}</span>
                                <span class="item-subtitle">รหัส PIN: ****</span>
                            </div>
                            <button class="btn" style="width: auto; padding: 0.5rem 1rem; font-size: 0.8rem; background: var(--danger-gradient); color: white; border-radius: var(--radius-pill); margin: 0;" onclick="handleDeleteEmployee('${emp.id}')">ลบออก</button>
                        </div>
                    `;
                });
                listHTML += `</div>`;
            }

            contentDiv.innerHTML = `
                <div class="section-title" style="margin-top: 1rem;">เพิ่มพนักงานใหม่</div>
                <div class="card" style="padding: 1.5rem; text-align: left;">
                    <input type="text" id="newEmpName" class="native-input" placeholder="ชื่อ - นามสกุล">
                    <input type="password" id="newEmpPin" class="native-input" placeholder="ตั้งรหัส PIN 4 หลัก" maxlength="4" pattern="[0-9]*" inputmode="numeric" style="margin-bottom: 1.5rem;">
                    <button class="btn btn-primary" onclick="handleAddEmployee()">+ เพิ่มพนักงาน</button>
                </div>
                
                <div class="section-title" style="margin-top: 2rem;">รายชื่อพนักงาน</div>
                ${listHTML}
            `;
        }

        function renderAdminHistory() {
            clearInterval(clockInterval);
            let listHTML = '';
            
            if (records.length === 0) {
                listHTML = `<div class="empty-state">ยังไม่มีประวัติการบันทึกเวลาในระบบ</div>`;
            } else {
                const reversedRecords = [...records].reverse();
                listHTML = `<div class="list-group">`;
                reversedRecords.forEach(rec => {
                    const isTypeIn = rec.type === 'IN';
                    const badgeColor = isTypeIn ? '#059669' : 'var(--text-muted)';
                    const badgeText = isTypeIn ? 'เข้า' : 'ออก';
                    
                    listHTML += `
                        <div class="list-item">
                            <div class="item-main">
                                <span class="item-title">${rec.empName || 'ไม่ระบุ'}</span>
                                <span class="item-subtitle">${rec.dateString} • ${rec.timeString}</span>
                            </div>
                            <div style="font-size: 0.85rem; font-weight: 700; color: ${badgeColor}; background: rgba(0,0,0,0.03); padding: 4px 12px; border-radius: var(--radius-pill);">
                                ${badgeText}
                            </div>
                        </div>
                    `;
                });
                listHTML += `</div>`;
            }

            let clearBtnHTML = records.length > 0 ? `<button class="btn btn-outline" style="margin-top:2rem; color: #f43f5e; border-color: rgba(244, 63, 94, 0.3);" onclick="clearAllHistory()">ล้างประวัติทั้งหมด</button>` : '';

            contentDiv.innerHTML = `
                <div class="section-title" style="margin-top: 1rem;">ประวัติลงเวลาทั้งหมด</div>
                ${listHTML}
                ${clearBtnHTML}
            `;
        }

        /* =========================================
           ส่วนที่ 6: ระบบสลับหน้าและ Router แกนกลาง
           ========================================= */
        function navigateTo(page, pushState = true) {
            if (!adminPin && page !== 'setup') { window.location.hash = 'setup'; return; }
            if (adminPin && !currentUser && page !== 'login') { window.location.hash = 'login'; return; }

            if (currentUser) {
                if (currentUser.role === 'admin' && page.startsWith('emp-')) page = 'admin-dash';
                if (currentUser.role === 'emp' && page.startsWith('admin-')) page = 'emp-dash';
            }

            if (currentUser && currentUser.role === 'admin') {
                document.querySelectorAll('.nav-item').forEach(link => link.classList.remove('active'));
                const activeTab = document.getElementById('nav-' + page);
                if(activeTab) activeTab.classList.add('active');
            }

            if(pushState) {
                window.location.hash = page;
                document.querySelector('main').scrollTop = 0;
            }

            if (page === 'setup') renderSetup();
            else if (page === 'login') renderLogin();
            else if (page === 'admin-dash') renderAdminDashboard();
            else if (page === 'admin-emp') renderAdminEmployees();
            else if (page === 'admin-hist') renderAdminHistory();
            else if (page === 'emp-dash') renderEmpDashboard();
        }

        function handleRouting() {
            if(!isReady) return; // รอให้โหลดข้อมูลเสร็จก่อนทำงาน
            
            let page = window.location.hash.replace('#', '');
            if (!page) {
                if (!adminPin) page = 'setup';
                else if (!currentUser) page = 'login';
                else if (currentUser.role === 'admin') page = 'admin-dash';
                else page = 'emp-dash';
            }
            navigateTo(page);
        }

        // เราใช้ onSnapshot เป็นตัวควบคุมการโหลดแล้ว
        window.addEventListener('hashchange', handleRouting);

    </script>
</body>
</html>
