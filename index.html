<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeTrack (Thumb Zone UI)</title>
    <style>
        /* --- Modern Variables 2025 --- */
        :root {
            --primary: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --success-gradient: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --danger-gradient: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%);
            
            --bg-body: #0f172a;
            --bg-app: #f8fafc;
            
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            
            --text-main: #0f172a;
            --text-muted: #64748b;
            --tab-bar-bg: rgba(255, 255, 255, 0.85);
            
            --radius-xl: 28px;
            --radius-lg: 16px;
            --radius-pill: 999px;
            
            --shadow-glass: 0 10px 40px -10px rgba(0,0,0,0.08);
            --shadow-glow: 0 8px 25px -6px rgba(99, 102, 241, 0.5);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-body); color: var(--text-main);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            touch-action: manipulation; /* ป้องกันการซูมด้วยนิ้ว */
        }

        #app-container {
            width: 100%; max-width: 414px; height: 100vh; max-height: 896px;
            background-color: var(--bg-app); position: relative; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Modern Background Orbs */
        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6;
            z-index: 0; pointer-events: none; animation: floatOrb 12s ease-in-out infinite alternate;
        }
        .orb-1 { top: -50px; right: -50px; width: 250px; height: 250px; background: #e0e7ff; }
        .orb-2 { bottom: 100px; left: -100px; width: 300px; height: 300px; background: #fce7f3; }
        .orb-3 { top: 30%; right: -150px; width: 200px; height: 200px; background: #dcfce7; }

        @keyframes floatOrb {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        @media (max-width: 414px) {
            #app-container { max-height: 100vh; box-shadow: none; border-radius: 0; }
        }

        /* --- App Bar ด้านบน --- */
        header {
            padding: 1.5rem; position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; gap: 1rem; align-items: center; }
        .user-role-badge { font-size: 0.75rem; padding: 0.4rem 1rem; border-radius: var(--radius-pill); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .role-admin { background-color: rgba(99, 102, 241, 0.15); color: var(--primary); }

        /* --- พื้นที่แสดงผลหลัก --- */
        main {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; 
            padding: 0 1.5rem; box-sizing: border-box; position: relative; z-index: 10;
            display: flex; flex-direction: column;
        }

        /* --- Bottom Tab Bar (Admin) --- */
        .bottom-nav {
            position: absolute; bottom: 1.5rem; left: 1.5rem; right: 1.5rem; display: flex;
            background-color: var(--tab-bar-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-pill); padding: 0.5rem; 
            z-index: 20; box-shadow: var(--shadow-glass);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0.6rem 0; color: var(--text-muted); text-decoration: none; font-size: 0.65rem;
            font-weight: 600; cursor: pointer; transition: all 0.3s; border-radius: var(--radius-pill);
        }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 2px; stroke-width: 2.5px; transition: transform 0.2s; }
        .nav-item.active { background: var(--text-main); color: white; }
        .nav-item.active svg { transform: translateY(-2px); }

        /* --- UI Components --- */
        .card {
            background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-xl); 
            padding: 1.5rem; box-shadow: var(--shadow-glass); text-align: center; margin-bottom: 1.5rem;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .section-title { font-size: 1.1rem; font-weight: 800; text-align: left; margin: 1rem 0; color: var(--text-main); letter-spacing: -0.3px; }

        .native-input {
            width: 100%; padding: 1.2rem 1.5rem; border-radius: var(--radius-lg); border: 2px solid transparent;
            background-color: rgba(255, 255, 255, 0.8); font-size: 1rem; font-family: inherit; font-weight: 500;
            color: var(--text-main); outline: none; box-sizing: border-box; transition: all 0.3s; margin-bottom: 1rem;
        }
        .native-input:focus { border-color: var(--primary); background-color: #fff; box-shadow: var(--shadow-glow); transform: translateY(-2px); }

        .btn {
            width: 100%; border: none; padding: 1.2rem; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px;
            border-radius: var(--radius-lg); cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; justify-content: center; align-items: center; gap: 0.5rem;
        }
        .btn:active { transform: scale(0.95); opacity: 0.9; }
        .btn-primary { background: var(--primary-gradient); color: white; box-shadow: var(--shadow-glow); }
        .btn-success { background: var(--success-gradient); color: white; box-shadow: 0 8px 25px -6px rgba(16, 185, 129, 0.5); }
        .btn-danger { background: var(--danger-gradient); color: white; box-shadow: 0 8px 25px -6px rgba(244, 63, 94, 0.5); }
        .btn-outline { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); color: var(--text-main); border: 1px solid var(--glass-border); }

        /* Dashboard Typography */
        .live-clock { font-size: 5rem; font-weight: 800; margin: 0.5rem 0 0 0; font-variant-numeric: tabular-nums; letter-spacing: -3px; color: var(--text-main); text-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .live-date { color: var(--text-muted); margin-bottom: 1rem; font-size: 1rem; font-weight: 600; }
        
        .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 0.5rem 1.2rem; border-radius: var(--radius-pill); font-size: 0.85rem; font-weight: 700; background: var(--glass-bg); border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        
        /* List View */
        .list-group { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1.2rem; background: var(--glass-bg); backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); border-radius: var(--radius-lg); 
            transition: transform 0.2s;
        }
        
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.95rem; font-weight: 500;}
        .icon-circle { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #e0e7ff, #f3e8ff); display: flex; align-items: center; justify-content: center; margin-right: 1rem; color: var(--primary); }

        /* --- Thumb Zone Actions (แผงควบคุมด้านล่าง) --- */
        .thumb-actions {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 1.5rem; padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            z-index: 40; display: flex; flex-direction: column; gap: 1rem;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.08); box-sizing: border-box;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- Kiosk Mode Employee Grid --- */
        .emp-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;
            max-height: 40vh; overflow-y: auto; padding: 0.5rem 0;
            /* ซ่อน Scrollbar */
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .emp-grid::-webkit-scrollbar { display: none; }

        .emp-card {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            padding: 1.25rem 1rem; border-radius: var(--radius-xl);
            box-shadow: 0 8px 20px rgba(0,0,0,0.04); text-align: center; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid var(--glass-border);
        }
        .emp-card:active { transform: scale(0.93); background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .emp-card .icon-circle { margin: 0 auto 0.75rem auto; width: 50px; height: 50px; background: #fff; box-shadow: 0 8px 16px rgba(0,0,0,0.04); }
        .emp-name-large { font-weight: 800; font-size: 1.05rem; color: var(--text-main); letter-spacing: -0.3px; }
        
        .admin-link {
            text-align: center; padding: 0.5rem; color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: color 0.2s; margin-top: 0.5rem;
        }

        /* --- Custom Numpad (คีย์บอร์ดตัวเลขบนหน้าจอ) --- */
        .pin-dots {
            display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 2rem; margin-top: 1rem;
        }
        .pin-dot {
            width: 18px; height: 18px; border-radius: 50%; border: 3px solid var(--primary);
            transition: all 0.2s; background: transparent;
        }
        .pin-dot.filled { background: var(--primary); transform: scale(1.1); box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        .pin-dot.error { border-color: #f43f5e; background: #f43f5e; box-shadow: 0 0 15px rgba(244, 63, 94, 0.4); }
        
        /* อนิเมชันสั่นเมื่อรหัสผิด */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }

        .numpad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem;
            max-width: 320px; margin-left: auto; margin-right: auto;
        }
        .numpad-btn {
            background: rgba(255,255,255,0.6); border: 1px solid var(--glass-border); border-radius: 50%;
            aspect-ratio: 1/1; font-size: 1.8rem; font-weight: 600; color: var(--text-main);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .numpad-btn:active { transform: scale(0.9); background: var(--glass-bg); }
        .numpad-btn.control { font-size: 1.2rem; background: transparent; border: none; box-shadow: none; color: var(--text-muted); }
        
        /* Success Overlay */
        .success-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .success-check {
            width: 100px; height: 100px; border-radius: 50%; background: var(--success-gradient);
            display: flex; align-items: center; justify-content: center; color: white; margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

    </style>
</head>
<body>

    <div id="app-container">
        <!-- Background Decor -->
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>

        <!-- App Bar -->
        <header>
            <div class="logo">TimeTrack</div>
            <div class="header-actions">
                <div id="roleBadge"></div>
            </div>
        </header>

        <!-- พื้นที่แสดงเนื้อหาหลัก (Top Zone) -->
        <main id="app-content"></main>

        <!-- แผงควบคุมด้านล่าง (Thumb Zone) -->
        <div id="thumb-actions-container"></div>

        <!-- Bottom Navigation Bar (For Admin) -->
        <nav class="bottom-nav" id="bottomNav" style="display: none;"></nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHuZGyY1F3v4rCrhrpt9YB90C0Ahh-stE",
            authDomain: "my-company-time-tracking.firebaseapp.com",
            projectId: "my-company-time-tracking",
            storageBucket: "my-company-time-tracking.firebasestorage.app",
            messagingSenderId: "758524847747",
            appId: "1:758524847747:web:2e5a49e4064334f1265db6",
            measurementId: "G-50SYJKTRT1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        /* =========================================
           ส่วนที่ 1: การจัดการข้อมูลและสถานะ
           ========================================= */
        let records = [];
        let employees = [];
        let adminPin = null; 
        let currentUser = JSON.parse(sessionStorage.getItem('currentUser')) || null;
        
        let isReady = false;
        let loadedFlags = { emp: false, rec: false, sys: false };
        const contentDiv = document.getElementById('app-content');
        const thumbDiv = document.getElementById('thumb-actions-container');
        const bottomNav = document.getElementById('bottomNav');
        const roleBadge = document.getElementById('roleBadge');
        let clockInterval;

        // Custom Numpad State
        let currentPin = "";
        let pinTargetId = null; // 'admin', 'setup', หรือ empId

        contentDiv.innerHTML = '<div style="display:flex; height:100%; align-items:center; justify-content:center; flex-direction:column;"><div class="live-clock" style="font-size:3rem;">กำลังเชื่อมต่อ...</div></div>';
        
        signInAnonymously(auth).then(() => { setupRealtimeListeners(); })
        .catch(err => {
            console.error("Auth Failed:", err);
            contentDiv.innerHTML = '<div class="empty-state" style="color: #f43f5e; height:100%; display:flex; align-items:center;">การเชื่อมต่อฐานข้อมูลล้มเหลว<br>กรุณาตรวจสอบ Firebase</div>';
        });

        function checkReady() {
            if (loadedFlags.emp && loadedFlags.rec && loadedFlags.sys && !isReady) {
                isReady = true;
                updateHeaderAndNav();
                handleRouting();
            }
        }

        function setupRealtimeListeners() {
            onSnapshot(collection(db, "employees"), (snap) => {
                employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                loadedFlags.emp = true; if(isReady) refreshCurrentView(); else checkReady();
            });
            onSnapshot(collection(db, "timeRecords"), (snap) => {
                records = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                records.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                loadedFlags.rec = true; if(isReady) refreshCurrentView(); else checkReady();
            });
            onSnapshot(collection(db, "system"), (snap) => {
                const adminDoc = snap.docs.find(d => d.id === 'settings');
                adminPin = adminDoc ? adminDoc.data().adminPin : null;
                loadedFlags.sys = true; if(isReady) refreshCurrentView(); else checkReady();
            });
        }

        function refreshCurrentView() {
            const page = window.location.hash.replace('#', '');
            if (page) navigateTo(page, false);
        }

        function getEmployeeStatus(empId) {
            const empRecords = records.filter(r => r.empId === empId);
            return empRecords.length === 0 ? 'OUT' : empRecords[empRecords.length - 1].type;
        }

        /* =========================================
           ส่วนส่งออกฟังก์ชัน Global
           ========================================= */
        window.pressNumpad = function(val) {
            if (val === 'C') currentPin = "";
            else if (val === '<') currentPin = currentPin.slice(0, -1);
            else if (currentPin.length < 4) currentPin += val;
            
            updatePinUI();
            
            // Auto Submit เมื่อครบ 4 ตัว
            if (currentPin.length === 4) {
                setTimeout(() => verifyPinSubmit(), 100);
            }
        };

        function updatePinUI() {
            const dotsContainer = document.getElementById('pin-dots-container');
            if(!dotsContainer) return;
            
            let dotsHTML = '';
            for(let i=0; i<4; i++) {
                const filled = i < currentPin.length ? 'filled' : '';
                dotsHTML += `<div class="pin-dot ${filled}"></div>`;
            }
            dotsContainer.innerHTML = dotsHTML;
        }

        function showPinError() {
            const dotsContainer = document.getElementById('pin-dots-container');
            if(!dotsContainer) return;
            
            // ทำให้กระพริบสีแดงและสั่น
            dotsContainer.innerHTML = `
                <div class="pin-dot error"></div><div class="pin-dot error"></div>
                <div class="pin-dot error"></div><div class="pin-dot error"></div>
            `;
            dotsContainer.classList.add('shake-animation');
            setTimeout(() => {
                dotsContainer.classList.remove('shake-animation');
                currentPin = "";
                updatePinUI();
            }, 500);
        }

        function verifyPinSubmit() {
            if (pinTargetId === 'setup') {
                setDoc(doc(db, "system", "settings"), { adminPin: currentPin });
                adminPin = currentPin;
                navigateTo('login');
            } else if (pinTargetId === 'admin') {
                if (currentPin === adminPin) {
                    currentUser = { role: 'admin' };
                    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateHeaderAndNav();
                    navigateTo('admin-dash');
                } else showPinError();
            } else {
                // พนักงานพิมพ์ PIN ถูกต้อง -> บันทึกเวลาให้อัตโนมัติเลย (ไม่ต้องเข้า Dashboard)
                const emp = employees.find(e => e.id === pinTargetId);
                if (emp && emp.pin === currentPin) {
                    const currentStatus = getEmployeeStatus(emp.id);
                    const autoType = currentStatus === 'IN' ? 'OUT' : 'IN';
                    recordTimeForEmp(emp, autoType);
                } else showPinError();
            }
        }

        // ฟังก์ชันบันทึกเวลาแบบอัตโนมัติสำหรับพนักงาน
        window.recordTimeForEmp = async function(emp, type) {
            // ซ่อนปุ่มและ Numpad ทันที
            thumbDiv.innerHTML = '';
            contentDiv.innerHTML = '<div style="display:flex; height:100%; align-items:center; justify-content:center; flex-direction:column;"><div class="live-clock" style="font-size:2rem;">กำลังบันทึกข้อมูล...</div></div>';
            
            const now = new Date();
            const recordData = {
                empId: emp.id, empName: emp.name, type: type,
                timestamp: now.toISOString(),
                timeString: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                dateString: now.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' })
            };
            
            await addDoc(collection(db, "timeRecords"), recordData);

            // แสดงหน้าจอสำเร็จ (Success Overlay)
            const typeText = type === 'IN' ? 'เข้างาน' : 'ออกงาน';
            const bgGradient = type === 'IN' ? 'var(--success-gradient)' : 'var(--danger-gradient)';
            
            document.getElementById('app-container').insertAdjacentHTML('beforeend', `
                <div class="success-overlay" id="successScreen">
                    <div class="success-check" style="background: ${bgGradient};">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="50" height="50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
                    </div>
                    <h2 style="font-weight: 800; font-size: 2.2rem; color: var(--text-main); margin-bottom: 0.5rem; letter-spacing: -1px;">บันทึกสำเร็จ!</h2>
                    <p style="color: var(--text-muted); font-size: 1.1rem; font-weight: 600;">คุณ ${emp.name} ลงเวลา${typeText}เรียบร้อยแล้ว</p>
                </div>
            `);

            // เตะกลับหน้าแรกอัตโนมัติใน 2.5 วินาที
            setTimeout(() => {
                const s = document.getElementById('successScreen');
                if(s) s.remove();
                currentPin = "";
                pinTargetId = null;
                navigateTo('login');
            }, 2500);
        };

        window.logout = function() {
            sessionStorage.removeItem('currentUser');
            currentUser = null;
            clearInterval(clockInterval);
            updateHeaderAndNav();
            navigateTo('login');
        };

        window.handleAddEmployee = async function() {
            const name = document.getElementById('newEmpName').value.trim();
            const pin = document.getElementById('newEmpPin').value;
            if (!name) return alert('กรุณาระบุชื่อ');
            if (pin.length !== 4 || isNaN(pin)) return alert('กรุณาตั้งรหัส PIN 4 หลักที่เป็นตัวเลข');

            await addDoc(collection(db, "employees"), { name, pin });
            document.getElementById('newEmpName').value = '';
            document.getElementById('newEmpPin').value = '';
        };

        window.handleDeleteEmployee = async function(id) {
            if (confirm('ยืนยันการลบพนักงานรายนี้?')) await deleteDoc(doc(db, "employees", id));
        };

        window.clearAllHistory = async function() {
            if(confirm('คำเตือน! ต้องการลบข้อมูลประวัติของ "ทุกคน" ใช่หรือไม่?')) {
                const promises = records.map(r => deleteDoc(doc(db, "timeRecords", r.id)));
                await Promise.all(promises);
            }
        };

        window.navigateTo = navigateTo;
        window.promptAdminLogin = promptAdminLogin;
        window.promptEmpLogin = promptEmpLogin;
        window.renderLogin = renderLogin;


        /* =========================================
           ส่วนที่ 2: การควบคุม UI แกนหลัก
           ========================================= */
        function updateHeaderAndNav() {
            if (!currentUser) {
                bottomNav.style.display = 'none'; roleBadge.innerHTML = ''; return;
            }

            if (currentUser.role === 'admin') {
                bottomNav.style.display = 'flex';
                roleBadge.innerHTML = '<span class="user-role-badge role-admin">Admin</span>';
                bottomNav.innerHTML = `
                    <a class="nav-item" onclick="navigateTo('admin-dash')" id="nav-admin-dash"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>แดชบอร์ด</a>
                    <a class="nav-item" onclick="navigateTo('admin-emp')" id="nav-admin-emp"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>พนักงาน</a>
                    <a class="nav-item" onclick="navigateTo('admin-hist')" id="nav-admin-hist"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>ประวัติ</a>
                    <a class="nav-item" onclick="logout()" style="color: #f43f5e;"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>ออก</a>
                `;
            }
        }

        function startClock() {
            clearInterval(clockInterval);
            const tick = () => {
                const now = new Date();
                const clockEl = document.getElementById('clockDisplay');
                const dateEl = document.getElementById('dateDisplay');
                if(clockEl && dateEl) {
                    clockEl.textContent = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }); // เอาวินาทีออกให้ดูคลีนขึ้น
                    dateEl.textContent = now.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long' });
                }
            };
            tick();
            clockInterval = setInterval(tick, 1000);
        }

        // Generator แป้นตัวเลข Numpad
        function getNumpadHTML() {
            return `
                <div class="pin-dots" id="pin-dots-container">
                    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
                </div>
                <div class="numpad">
                    <div class="numpad-btn" onclick="pressNumpad('1')">1</div>
                    <div class="numpad-btn" onclick="pressNumpad('2')">2</div>
                    <div class="numpad-btn" onclick="pressNumpad('3')">3</div>
                    <div class="numpad-btn" onclick="pressNumpad('4')">4</div>
                    <div class="numpad-btn" onclick="pressNumpad('5')">5</div>
                    <div class="numpad-btn" onclick="pressNumpad('6')">6</div>
                    <div class="numpad-btn" onclick="pressNumpad('7')">7</div>
                    <div class="numpad-btn" onclick="pressNumpad('8')">8</div>
                    <div class="numpad-btn" onclick="pressNumpad('9')">9</div>
                    <div class="numpad-btn control" onclick="pressNumpad('C')">ล้าง</div>
                    <div class="numpad-btn" onclick="pressNumpad('0')">0</div>
                    <div class="numpad-btn control" onclick="pressNumpad('<')">ลบ</div>
                </div>
            `;
        }

        /* =========================================
           ส่วนที่ 3: ระบบ Kiosk & Numpad (พนักงาน)
           ========================================= */
        function renderSetup() {
            currentPin = ""; pinTargetId = 'setup';
            contentDiv.innerHTML = `
                <div style="text-align:center; padding-top:2rem;">
                    <h2 style="font-size:2rem; font-weight:800; margin:0;">ตั้งค่าระบบ</h2>
                    <p style="color:var(--text-muted); font-size:1rem; margin-top:0.5rem;">กำหนด PIN 4 หลักสำหรับเจ้าของร้าน</p>
                </div>
            `;
            thumbDiv.innerHTML = `
                <div class="thumb-actions">
                    ${getNumpadHTML()}
                </div>
            `;
        }

        function renderLogin() {
            // ส่วนบน: นาฬิกา
            contentDiv.innerHTML = `
                <div style="text-align: center; padding-top: 1rem;">
                    <div class="live-clock" id="clockDisplay">00:00</div>
                    <div class="live-date" id="dateDisplay">--</div>
                </div>
                <div style="height: 350px;"></div> <!-- เว้นที่ให้แผงข้างล่าง -->
            `;
            startClock();

            // ส่วนล่าง (Thumb Zone): เลือกชื่อ
            let employeeList = '';
            if (employees.length === 0) {
                employeeList = `<div class="empty-state">กรุณาเข้าระบบ Admin<br>เพื่อเพิ่มพนักงาน</div>`;
            } else {
                employeeList = `<div class="emp-grid">`;
                employees.forEach(emp => {
                    employeeList += `
                        <div class="emp-card" onclick="promptEmpLogin('${emp.id}', '${emp.name}')">
                            <div class="icon-circle"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="24" height="24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></div>
                            <div class="emp-name-large">${emp.name}</div>
                        </div>
                    `;
                });
                employeeList += `</div>`;
            }

            thumbDiv.innerHTML = `
                <div class="thumb-actions" style="padding-top: 2rem;">
                    <h3 style="margin:0 0 1rem 0; font-weight:800; font-size:1.2rem; text-align:center;">แตะเลือกชื่อของคุณ 👋</h3>
                    ${employeeList}
                    <div class="admin-link" onclick="promptAdminLogin()">จัดการระบบ (Admin)</div>
                </div>
            `;
        }

        function promptEmpLogin(empId, empName) {
            currentPin = ""; pinTargetId = empId;
            const currentStatus = getEmployeeStatus(empId);
            
            // เตรียมข้อความบอกใบ้ว่าพิมพ์รหัสไปเพื่ออะไร
            const isClockedIn = currentStatus === 'IN';
            const actionText = isClockedIn ? 'พิมพ์รหัสเพื่อลงเวลาออกงาน' : 'พิมพ์รหัสเพื่อลงเวลาเข้างาน';
            const statusBadgeColor = isClockedIn ? '#f43f5e' : '#10b981';
            const statusBadgeText = isClockedIn ? 'กำลังทำงาน' : 'ยังไม่เข้างาน';

            contentDiv.innerHTML = `
                <div style="text-align: center; padding-top: 2rem;">
                    <div class="icon-circle" style="margin: 0 auto 1rem auto; width: 80px; height: 80px; background: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.05);"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="36" height="36"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></div>
                    <h2 style="font-size:1.8rem; font-weight:800; margin:0;">คุณ ${empName}</h2>
                    <div style="margin-top: 0.75rem;">
                        <span style="font-size: 0.8rem; font-weight: 700; padding: 4px 12px; border-radius: var(--radius-pill); background: rgba(0,0,0,0.05); color: ${statusBadgeColor};">สถานะ: ${statusBadgeText}</span>
                    </div>
                    <p style="color:var(--text-main); font-size:1rem; font-weight:600; margin-top:1.5rem;">${actionText}</p>
                </div>
            `;
            
            thumbDiv.innerHTML = `
                <div class="thumb-actions">
                    ${getNumpadHTML()}
                    <button class="btn btn-outline" style="padding: 1rem; border-radius: var(--radius-pill); margin-top:0.5rem;" onclick="renderLogin()">ยกเลิก</button>
                </div>
            `;
            updatePinUI();
        }

        function promptAdminLogin() {
            currentPin = ""; pinTargetId = 'admin';
            contentDiv.innerHTML = `
                <div style="text-align: center; padding-top: 2rem;">
                    <div class="icon-circle" style="margin: 0 auto 1rem auto; width: 80px; height: 80px; background: rgba(99, 102, 241, 0.1); color: var(--primary);"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="36" height="36"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></div>
                    <h2 style="font-size:1.8rem; font-weight:800; margin:0;">เจ้าของร้าน</h2>
                    <p style="color:var(--text-muted); font-size:1rem; margin-top:0.5rem;">กรุณากดรหัส PIN เพื่อเข้าระบบ</p>
                </div>
            `;
            thumbDiv.innerHTML = `
                <div class="thumb-actions">
                    ${getNumpadHTML()}
                    <button class="btn btn-outline" style="padding: 1rem; border-radius: var(--radius-pill); margin-top:0.5rem;" onclick="renderLogin()">ย้อนกลับ</button>
                </div>
            `;
            updatePinUI();
        }

        /* =========================================
           ส่วนที่ 4: Action Screen (หน้าพนักงานกดลงเวลา)
           ========================================= */
        function renderEmpDashboard() {
            if (!currentUser || currentUser.role !== 'emp') return;
            const status = getEmployeeStatus(currentUser.id);
            const isClockedIn = status === 'IN';

            // ปุ่มเดียวบริบทเดียว (Contextual Button) ใน Thumb Zone
            let buttonHTML = '';
            let statusTextTop = '';

            if (isClockedIn) {
                statusTextTop = `<span style="color: #059669; font-weight:800;">กำลังทำงาน</span>`;
                buttonHTML = `<button class="btn btn-danger" style="padding: 1.8rem; font-size: 1.4rem; border-radius: var(--radius-xl);" onclick="recordTime('OUT')">ลงเวลาออกงาน (เลิกงาน)</button>`;
            } else {
                statusTextTop = `<span style="color: var(--text-muted); font-weight:800;">ยังไม่เข้างาน</span>`;
                buttonHTML = `<button class="btn btn-success" style="padding: 1.8rem; font-size: 1.4rem; border-radius: var(--radius-xl);" onclick="recordTime('IN')">ลงเวลาเข้างาน (เริ่มงาน)</button>`;
            }

            contentDiv.innerHTML = `
                <div style="text-align: center; padding-top: 1.5rem;">
                    <h3 style="margin:0; color: var(--text-muted); font-weight: 600; font-size: 1.1rem;">สวัสดี, ${currentUser.name}</h3>
                    <div style="margin-top: 0.5rem; font-size: 1rem;">สถานะตอนนี้: ${statusTextTop}</div>
                    
                    <div class="live-clock" id="clockDisplay" style="font-size:4.5rem; margin-top:1rem;">00:00</div>
                    <div class="live-date" id="dateDisplay">--</div>
                </div>
            `;
            startClock();

            thumbDiv.innerHTML = `
                <div class="thumb-actions" style="padding-top: 2rem;">
                    ${buttonHTML}
                    <button class="btn btn-outline" style="padding: 1.2rem; font-size: 1.1rem; border-radius: var(--radius-xl); margin-top:0.5rem; background:transparent;" onclick="logout()">
                        ยกเลิก (กลับหน้าแรก)
                    </button>
                </div>
            `;
        }

        /* =========================================
           ส่วนที่ 5: Views ฝั่งแอดมิน (Admin - ใช้ Native Input เพื่อความรวดเร็วในการจัดการ)
           ========================================= */
        function renderAdminDashboard() {
            clearInterval(clockInterval);
            thumbDiv.innerHTML = ''; // เคลียร์ Thumb Zone
            contentDiv.innerHTML = `
                <div class="section-title">ภาพรวมวันนี้</div>
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div class="card" style="flex: 1; padding: 1.5rem 1rem; margin: 0;">
                        <div style="font-size: 2.5rem; font-weight: 800; color: var(--primary); letter-spacing: -1px;">${employees.length}</div>
                        <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">พนักงานทั้งหมด</div>
                    </div>
                    <div class="card" style="flex: 1; padding: 1.5rem 1rem; margin: 0;">
                        <div style="font-size: 2.5rem; font-weight: 800; color: #059669; letter-spacing: -1px;">${employees.filter(e => getEmployeeStatus(e.id) === 'IN').length}</div>
                        <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">กำลังทำงาน</div>
                    </div>
                </div>
            `;
        }

        function renderAdminEmployees() {
            clearInterval(clockInterval); thumbDiv.innerHTML = '';
            let listHTML = employees.length === 0 ? `<div class="empty-state">ยังไม่ได้เพิ่มรายชื่อพนักงาน</div>` : `<div class="list-group">`;
            
            employees.forEach(emp => {
                listHTML += `
                    <div class="list-item">
                        <div class="item-main">
                            <span class="item-title" style="margin:0;">${emp.name}</span><span class="item-subtitle">PIN: ${emp.pin}</span>
                        </div>
                        <button class="btn" style="width: auto; padding: 0.5rem 1rem; font-size: 0.8rem; background: var(--danger-gradient); color: white; border-radius: var(--radius-pill); margin: 0;" onclick="handleDeleteEmployee('${emp.id}')">ลบ</button>
                    </div>`;
            });
            if(employees.length > 0) listHTML += `</div>`;

            contentDiv.innerHTML = `
                <div class="section-title" style="margin-top: 1rem;">เพิ่มพนักงาน</div>
                <div class="card" style="padding: 1.5rem; text-align: left;">
                    <input type="text" id="newEmpName" class="native-input" placeholder="ชื่อพนักงาน">
                    <input type="password" id="newEmpPin" class="native-input" placeholder="ตั้งรหัส PIN 4 หลัก" maxlength="4" pattern="[0-9]*" inputmode="numeric" style="margin-bottom: 1.5rem;">
                    <button class="btn btn-primary" onclick="handleAddEmployee()">เพิ่มพนักงาน</button>
                </div>
                <div class="section-title" style="margin-top: 2rem;">รายชื่อพนักงาน</div>
                ${listHTML}
            `;
        }

        function renderAdminHistory() {
            clearInterval(clockInterval); thumbDiv.innerHTML = '';
            let listHTML = records.length === 0 ? `<div class="empty-state">ยังไม่มีประวัติในระบบ</div>` : `<div class="list-group">`;
            
            [...records].reverse().forEach(rec => {
                const isTypeIn = rec.type === 'IN';
                listHTML += `
                    <div class="list-item">
                        <div class="item-main">
                            <span class="item-title">${rec.empName || 'ไม่ระบุ'}</span><span class="item-subtitle">${rec.dateString} • ${rec.timeString}</span>
                        </div>
                        <div style="font-size: 0.85rem; font-weight: 700; color: ${isTypeIn ? '#059669' : '#f43f5e'}; background: rgba(0,0,0,0.03); padding: 4px 12px; border-radius: var(--radius-pill);">${isTypeIn ? 'เข้า' : 'ออก'}</div>
                    </div>`;
            });
            if(records.length > 0) listHTML += `</div>`;

            contentDiv.innerHTML = `
                <div class="section-title" style="margin-top: 1rem;">ประวัติลงเวลา</div>
                ${listHTML}
                ${records.length > 0 ? `<button class="btn btn-outline" style="margin-top:2rem; color: #f43f5e; border-color: rgba(244, 63, 94, 0.3);" onclick="clearAllHistory()">ล้างประวัติทั้งหมด</button>` : ''}
            `;
        }

        /* =========================================
           ส่วนที่ 6: Router
           ========================================= */
        function navigateTo(page, pushState = true) {
            if (!adminPin && page !== 'setup') { window.location.hash = 'setup'; return; }
            if (adminPin && !currentUser && page !== 'login') { window.location.hash = 'login'; return; }

            // ตัดระบบ Role ของ Employee ออก เพราะพนักงานไม่ได้เข้าสู่ระบบค้างไว้อีกต่อไป (ลงเวลาเสร็จเด้งออกทันที)
            if (currentUser && currentUser.role === 'admin') {
                if(page.startsWith('emp-')) page = 'admin-dash';
                document.querySelectorAll('.nav-item').forEach(link => link.classList.remove('active'));
                const activeTab = document.getElementById('nav-' + page);
                if(activeTab) activeTab.classList.add('active');
            }

            if(pushState) { window.location.hash = page; document.querySelector('main').scrollTop = 0; }

            if (page === 'setup') renderSetup();
            else if (page === 'login') renderLogin();
            else if (page === 'admin-dash') renderAdminDashboard();
            else if (page === 'admin-emp') renderAdminEmployees();
            else if (page === 'admin-hist') renderAdminHistory();
        }

        function handleRouting() {
            if(!isReady) return; 
            let page = window.location.hash.replace('#', '');
            if (!page) {
                if (!adminPin) page = 'setup';
                else if (!currentUser) page = 'login';
                else if (currentUser.role === 'admin') page = 'admin-dash';
                else page = 'login'; // พนักงานทุกคนกลับมาหน้า login เสมอ
            }
            navigateTo(page);
        }

        window.addEventListener('hashchange', handleRouting);
    </script>
</body>
</html>
