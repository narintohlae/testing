<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบลงเวลาพนักงาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0f4f8;
            color: #1f2937;
            -webkit-tap-highlight-color: transparent;
        }

        /* Isometric / Neo-Brutalism Styles */
        .iso-card {
            background: #ffffff;
            border: 3px solid #111827;
            box-shadow: 6px 6px 0px #111827;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .iso-btn {
            border: 3px solid #111827;
            box-shadow: 4px 4px 0px #111827;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.1s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .iso-btn:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #111827;
        }

        .iso-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #111827;
        }

        .iso-btn-primary { background-color: #3b82f6; color: white; }
        .iso-btn-success { background-color: #10b981; color: white; }
        .iso-btn-danger { background-color: #ef4444; color: white; }
        .iso-btn-warning { background-color: #f59e0b; color: white; }
        .iso-btn-info { background-color: #0ea5e9; color: white; }
        .iso-btn-purple { background-color: #8b5cf6; color: white; }
        .iso-btn-white { background-color: #ffffff; color: #111827; }

        .iso-input {
            border: 3px solid #111827;
            border-radius: 8px;
            padding: 0.75rem;
            width: 100%;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.05);
        }
        .iso-input:focus {
            box-shadow: 4px 4px 0px #3b82f6;
            border-color: #3b82f6;
        }

        /* Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #10b981;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10b981;
        }
        
        /* Modal Overlay */
        .modal-overlay {
            background-color: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(4px);
        }

        /* Camera Box */
        #video-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            border: 3px solid #111827;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        #camera-video {
            width: 100%;
            height: auto;
            display: block;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom Scrollbar for tabs */
        .tabs-container::-webkit-scrollbar { height: 4px; }
        .tabs-container::-webkit-scrollbar-track { background: transparent; }
        .tabs-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- App Container -->
    <div id="app" class="flex-grow flex flex-col w-full max-w-md mx-auto relative p-4 pb-20">
        <!-- Content will be injected here by JS -->
        <div class="flex items-center justify-center h-full mt-20">
            <div class="flex flex-col items-center">
                <div class="loader mb-4"></div>
                <p class="font-medium">กำลังเชื่อมต่อระบบ...</p>
            </div>
        </div>
    </div>

    <!-- Custom Modal -->
    <div id="custom-modal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-200 p-4">
        <div class="iso-card w-full max-w-sm p-6 transform scale-95 transition-transform duration-200" id="modal-content-box">
            <h3 id="modal-title" class="text-xl font-bold mb-2">แจ้งเตือน</h3>
            <p id="modal-message" class="text-gray-600 mb-6 whitespace-pre-wrap"></p>
            <div id="modal-buttons" class="flex justify-end gap-3">
                <!-- Buttons injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="camera-modal" class="fixed inset-0 modal-overlay z-50 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-200 p-4">
        <div class="iso-card w-full max-w-sm p-4 text-center">
            <h3 class="text-xl font-bold mb-4"><i class="fas fa-camera mr-2"></i>ถ่ายรูปยืนยันตัวตน</h3>
            <div id="video-container" class="mb-4">
                <video id="camera-video" autoplay playsinline></video>
                <canvas id="camera-canvas" class="hidden"></canvas>
            </div>
            <p id="camera-status" class="text-sm text-gray-500 mb-4">กรุณามองกล้องและจัดใบหน้าให้อยู่ในกรอบ</p>
            <div class="flex gap-3 justify-center">
                <button id="btn-cancel-camera" class="iso-btn iso-btn-danger py-2 px-4 flex-1">ยกเลิก</button>
                <button id="btn-take-photo" class="iso-btn iso-btn-primary py-2 px-4 flex-1"><i class="fas fa-circle"></i> ถ่ายรูป</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyBHuZGyY1F3v4rCrhrpt9YB90C0Ahh-stE",
            authDomain: "my-company-time-tracking.firebaseapp.com",
            projectId: "my-company-time-tracking",
            storageBucket: "my-company-time-tracking.firebasestorage.app",
            messagingSenderId: "758524847747",
            appId: "1:758524847747:web:2e5a49e4064334f1265db6",
            measurementId: "G-50SYJKTRT1"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'my-company-time-tracking';

        // State Management
        let currentUser = null;
        let currentView = 'role-select'; 
        let activeEmployee = null; 
        
        let empTab = 'time'; 
        let ownerTab = 'logs'; // logs, reqs, emps, payroll, settings
        
        // Data Collections
        let employees = [];
        let timelogs = [];
        let requestsList = [];
        let appSettings = {
            ownerPin: '9999',
            requireGPS: true,
            requireSelfie: true,
            standardHours: 8 // ชั่วโมงทำงานปกติต่อวัน
        };

        // DOM Elements
        const appDiv = document.getElementById('app');
        
        // --- Modal System ---
        function showModal(title, message, buttons = [{ text: 'ตกลง', type: 'primary', action: closeModal }]) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            
            const btnContainer = document.getElementById('modal-buttons');
            btnContainer.innerHTML = '';
            
            buttons.forEach(btn => {
                const buttonEl = document.createElement('button');
                buttonEl.className = `iso-btn iso-btn-${btn.type} py-2 px-4`;
                buttonEl.innerText = btn.text;
                buttonEl.onclick = () => { if (btn.action) btn.action(); };
                btnContainer.appendChild(buttonEl);
            });

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('modal-content-box').classList.remove('scale-95');
            }, 10);
        }

        window.closeModal = function() {
            const modal = document.getElementById('custom-modal');
            modal.classList.add('opacity-0');
            document.getElementById('modal-content-box').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        // --- Firebase Data Fetching ---
        function setupRealtimeListeners() {
            if (!currentUser) return;
            const baseCollectionPath = `artifacts/${appId}/public/data`;

            onSnapshot(doc(db, baseCollectionPath, 'config', 'appSettings'), (docSnap) => {
                if (docSnap.exists()) appSettings = { ...appSettings, ...docSnap.data() };
                else setDoc(doc(db, baseCollectionPath, 'config', 'appSettings'), appSettings);
                render();
            });

            onSnapshot(collection(db, baseCollectionPath, 'employees'), (snapshot) => {
                employees = [];
                snapshot.forEach(doc => employees.push({ id: doc.id, ...doc.data() }));
                render();
            });

            onSnapshot(collection(db, baseCollectionPath, 'timelogs'), (snapshot) => {
                timelogs = [];
                snapshot.forEach(doc => timelogs.push({ id: doc.id, ...doc.data() }));
                timelogs.sort((a, b) => b.timestamp - a.timestamp); // DESC for view
                render();
            });

            onSnapshot(collection(db, baseCollectionPath, 'requests'), (snapshot) => {
                requestsList = [];
                snapshot.forEach(doc => requestsList.push({ id: doc.id, ...doc.data() }));
                requestsList.sort((a, b) => b.timestamp - a.timestamp);
                render();
            });
        }

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error: ", err);
                showModal('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบได้');
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) setupRealtimeListeners();
            else appDiv.innerHTML = `<div class="p-4 text-center text-red-500 font-bold">กรุณาเข้าสู่ระบบ</div>`;
        });
        initAuth();

        // --- Utility Functions ---
        function formatDate(timestamp) {
            if (!timestamp) return '-';
            const d = new Date(timestamp);
            return d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' }) + ' ' + 
                   d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        }
        
        function formatJustDate(dateStr) {
            if(!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function formatCurrency(amount) {
            return parseFloat(amount).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // --- Payroll Calculation ---
        function calculatePayroll() {
            let shifts = [];
            let empActiveIn = {}; 
            
            // Sort ASC for chronological pairing
            let sortedLogs = [...timelogs].sort((a, b) => a.timestamp - b.timestamp);

            sortedLogs.forEach(log => {
                if (log.type === 'IN') {
                    empActiveIn[log.empId] = log;
                } else if (log.type === 'OUT') {
                    if (empActiveIn[log.empId]) {
                        let inLog = empActiveIn[log.empId];
                        let durationHrs = (log.timestamp - inLog.timestamp) / (1000 * 60 * 60);
                        
                        shifts.push({
                            empId: log.empId,
                            durationHrs: durationHrs
                        });
                        delete empActiveIn[log.empId]; // clear paired IN
                    }
                }
            });

            // Aggregate by employee
            let payrollSummary = {};
            employees.forEach(emp => {
                payrollSummary[emp.id] = {
                    name: emp.name,
                    wageType: emp.wageType || 'daily',
                    baseRate: parseFloat(emp.baseRate) || 0,
                    otRate: parseFloat(emp.otRate) || 0,
                    totalRegHrs: 0,
                    totalOTHrs: 0,
                    totalPay: 0,
                    shiftsCount: 0
                };
            });

            const stdHrs = parseFloat(appSettings.standardHours) || 8;

            shifts.forEach(shift => {
                if (!payrollSummary[shift.empId]) return;

                let summary = payrollSummary[shift.empId];
                let regHrs = Math.min(shift.durationHrs, stdHrs);
                let otHrs = Math.max(0, shift.durationHrs - stdHrs);

                summary.totalRegHrs += regHrs;
                summary.totalOTHrs += otHrs;
                summary.shiftsCount++;

                let shiftBasePay = summary.wageType === 'hourly' ? (regHrs * summary.baseRate) : summary.baseRate;
                let shiftOTPay = otHrs * summary.otRate;

                summary.totalPay += (shiftBasePay + shiftOTPay);
            });

            return payrollSummary;
        }

        // --- Camera & GPS Actions ---
        let videoStream = null;
        async function captureSelfie() {
            return new Promise((resolve, reject) => {
                const modal = document.getElementById('camera-modal');
                const video = document.getElementById('camera-video');
                const canvas = document.getElementById('camera-canvas');
                const btnCancel = document.getElementById('btn-cancel-camera');
                const btnTake = document.getElementById('btn-take-photo');
                const statusTxt = document.getElementById('camera-status');

                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.remove('opacity-0'), 10);
                statusTxt.innerText = "กำลังเปิดกล้อง...";
                btnTake.disabled = true;

                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
                    .then(stream => {
                        videoStream = stream;
                        video.srcObject = stream;
                        video.play();
                        statusTxt.innerText = "กรุณามองกล้องและจัดใบหน้าให้อยู่ในกรอบ";
                        btnTake.disabled = false;
                    })
                    .catch(err => {
                        closeCamera();
                        reject(new Error("ไม่สามารถเข้าถึงกล้องได้"));
                    });

                btnTake.onclick = () => {
                    const context = canvas.getContext('2d');
                    canvas.width = 300;
                    canvas.height = (video.videoHeight / video.videoWidth) * 300;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                    closeCamera();
                };

                btnCancel.onclick = () => {
                    closeCamera();
                    reject(new Error("ยกเลิกการถ่ายรูป"));
                };
            });
        }

        function closeCamera() {
            const modal = document.getElementById('camera-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 200);
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        }

        async function getLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) reject(new Error("ไม่รองรับ GPS"));
                navigator.geolocation.getCurrentPosition(
                    (position) => resolve({ lat: position.coords.latitude, lng: position.coords.longitude }),
                    (error) => reject(new Error("ไม่สามารถระบุตำแหน่งได้")),
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        // --- Core Functions ---
        async function processTimeLog(type) {
            if (!activeEmployee) return;
            let photoData = null, locationData = null;
            try {
                if (appSettings.requireSelfie) photoData = await captureSelfie();
                if (appSettings.requireGPS) {
                    showModal('กำลังดำเนินการ', 'กำลังตรวจสอบตำแหน่ง GPS...', []);
                    locationData = await getLocation();
                    closeModal();
                }

                showModal('กำลังบันทึก', 'กำลังบันทึกข้อมูลเข้าระบบ...', []);
                await addDoc(collection(db, `artifacts/${appId}/public/data`, 'timelogs'), {
                    empId: activeEmployee.id, empName: activeEmployee.name,
                    type: type, timestamp: Date.now(),
                    photoData: photoData, location: locationData
                });

                closeModal();
                showModal('สำเร็จ!', `บันทึกเวลา${type === 'IN' ? 'เข้า' : 'ออก'}งานเรียบร้อยแล้ว`, [
                    { text: 'ตกลง', type: 'success', action: () => {
                        closeModal();
                        activeEmployee = null; 
                        changeView('role-select');
                    }}
                ]);
            } catch (error) {
                closeModal();
                showModal('ข้อผิดพลาด', error.message);
            }
        }

        window.submitLeaveRequest = async () => { /* ... */ 
            const reqType = document.getElementById('req-type').value;
            const startDate = document.getElementById('req-start').value;
            const endDate = document.getElementById('req-end').value;
            const detail = document.getElementById('req-detail').value.trim();

            if(!reqType || !startDate || !endDate || !detail) return showModal('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบถ้วน');

            try {
                showModal('กำลังบันทึก', 'กำลังส่งคำขอ...', []);
                await addDoc(collection(db, `artifacts/${appId}/public/data`, 'requests'), {
                    empId: activeEmployee.id, empName: activeEmployee.name,
                    type: reqType, startDate: startDate, endDate: endDate, detail: detail,
                    status: 'pending', timestamp: Date.now()
                });
                closeModal();
                showModal('สำเร็จ', 'ส่งคำขอเรียบร้อยแล้ว รอการอนุมัติ');
                document.getElementById('req-detail').value = '';
            } catch(e) {
                closeModal();
                showModal('ผิดพลาด', 'ไม่สามารถส่งคำขอได้');
            }
        };

        window.updateRequestStatus = async (reqId, newStatus) => {
            try {
                showModal('กำลังดำเนินการ', 'กำลังอัปเดตสถานะ...', []);
                await updateDoc(doc(db, `artifacts/${appId}/public/data/requests`, reqId), { status: newStatus });
                closeModal();
            } catch(e) { closeModal(); showModal('ผิดพลาด', 'ไม่สามารถอัปเดตได้'); }
        };

        // --- Render Views ---
        window.changeView = (view) => { currentView = view; if(view === 'role-select') activeEmployee = null; render(); }
        window.setEmpTab = (tab) => { empTab = tab; render(); };
        window.setOwnerTab = (tab) => { ownerTab = tab; render(); };

        function render() {
            if (!currentUser) return;
            let html = '';
            switch (currentView) {
                case 'role-select': html = renderRoleSelect(); break;
                case 'emp-login': html = renderEmpLogin(); break;
                case 'emp-dash': html = renderEmpDash(); break;
                case 'owner-login': html = renderOwnerLogin(); break;
                case 'owner-dash': html = renderOwnerDash(); break;
            }
            appDiv.innerHTML = html;
            attachEventListeners();
        }

        function renderRoleSelect() {
            return `
                <div class="flex flex-col items-center justify-center h-full gap-6 mt-10">
                    <div class="text-center mb-6">
                        <div class="w-24 h-24 bg-blue-500 rounded-3xl mx-auto mb-4 border-4 border-gray-900 flex items-center justify-center text-white text-4xl" style="box-shadow: 6px 6px 0px #111827; transform: rotate(-5deg);">
                            <i class="fas fa-clock"></i>
                        </div>
                        <h1 class="text-3xl font-black text-gray-900 drop-shadow-md">TimeCheck</h1>
                    </div>
                    <button data-action="go-emp-login" class="iso-btn iso-btn-primary w-full py-5 text-xl">
                        <i class="fas fa-user-clock text-2xl"></i> พนักงาน
                    </button>
                    <button data-action="go-owner-login" class="iso-btn iso-btn-white w-full py-4 text-lg mt-4">
                        <i class="fas fa-store"></i> เจ้าของร้าน
                    </button>
                </div>
            `;
        }

        function renderEmpLogin() {
            return `
                <div class="mt-4">
                    <button data-action="go-home" class="mb-4 text-gray-600 font-medium"><i class="fas fa-arrow-left"></i> กลับ</button>
                    <div class="iso-card p-6">
                        <h2 class="text-2xl font-bold mb-6 text-center border-b-2 pb-4">เข้าสู่ระบบพนักงาน</h2>
                        <div class="mb-4">
                            <label class="block text-gray-700 font-bold mb-2">เลือกชื่อพนักงาน</label>
                            <select id="emp-select" class="iso-input bg-white cursor-pointer">
                                <option value="">-- กรุณาเลือกชื่อ --</option>
                                ${employees.map(emp => `<option value="${emp.id}">${emp.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="mb-6">
                            <label class="block text-gray-700 font-bold mb-2">รหัส PIN 4 หลัก</label>
                            <input type="password" id="emp-pin" class="iso-input text-center text-2xl tracking-widest" placeholder="****" maxlength="4" pattern="[0-9]*" inputmode="numeric">
                        </div>
                        <button id="btn-emp-login" class="iso-btn iso-btn-primary w-full py-3 text-lg">เข้าสู่ระบบ</button>
                    </div>
                </div>
            `;
        }

        function renderEmpDash() {
            if (!activeEmployee) return renderRoleSelect();
            
            let tabContent = '';
            if (empTab === 'time') {
                tabContent = `
                    <div class="iso-card p-6 text-center flex-grow flex flex-col justify-center gap-6 mb-6 bg-blue-50">
                        <div class="text-5xl font-black text-gray-800 mb-4" id="live-clock">--:--</div>
                        <div class="grid grid-cols-2 gap-4">
                            <button id="btn-clock-in" class="iso-btn iso-btn-success py-8 text-xl flex flex-col items-center gap-2">
                                <i class="fas fa-sign-in-alt text-3xl"></i> เข้างาน
                            </button>
                            <button id="btn-clock-out" class="iso-btn iso-btn-danger py-8 text-xl flex flex-col items-center gap-2">
                                <i class="fas fa-sign-out-alt text-3xl"></i> ออกงาน
                            </button>
                        </div>
                        <div class="flex justify-center gap-4 mt-4 text-sm font-medium">
                            <span class="${appSettings.requireGPS ? 'text-green-600' : 'text-gray-400'}"><i class="fas fa-map-marker-alt"></i> GPS</span>
                            <span class="${appSettings.requireSelfie ? 'text-green-600' : 'text-gray-400'}"><i class="fas fa-camera"></i> รูป</span>
                        </div>
                    </div>
                `;
            } else if (empTab === 'requests') {
                const myReqs = requestsList.filter(r => r.empId === activeEmployee.id);
                tabContent = `
                    <div class="space-y-4">
                        <div class="iso-card p-4 bg-yellow-50 border-yellow-600">
                            <h3 class="font-bold mb-3 border-b border-yellow-200 pb-2"><i class="fas fa-paper-plane"></i> ส่งคำขอใหม่</h3>
                            <select id="req-type" class="iso-input mb-3 bg-white">

        function attachEventListeners() {
            document.querySelectorAll('[data-action="go-home"], [data-action="logout"]').forEach(el => el.onclick = () => changeView('role-select'));
            document.querySelectorAll('[data-action="go-emp-login"]').forEach(el => el.onclick = () => changeView('emp-login'));
            document.querySelectorAll('[data-action="go-owner-login"]').forEach(el => el.onclick = () => changeView('owner-login'));

            const btnEmpLogin = document.getElementById('btn-emp-login');
            if (btnEmpLogin) {
                btnEmpLogin.onclick = () => {
                    const emp = employees.find(e => e.id === document.getElementById('emp-select').value);
                    if (emp && emp.pin === document.getElementById('emp-pin').value) {
                        activeEmployee = emp; empTab = 'time'; changeView('emp-dash'); startClock();
                    } else showModal('รหัสผิดพลาด', 'PIN ไม่ถูกต้อง');
                };
            }

            const btnIn = document.getElementById('btn-clock-in');
            const btnOut = document.getElementById('btn-clock-out');
            if (btnIn) btnIn.onclick = () => processTimeLog('IN');
            if (btnOut) btnOut.onclick = () => processTimeLog('OUT');

            const btnOwnerLogin = document.getElementById('btn-owner-login');
            if (btnOwnerLogin) {
                btnOwnerLogin.onclick = () => {
                    if (document.getElementById('owner-pin').value === appSettings.ownerPin) changeView('owner-dash');
                    else showModal('ปฏิเสธ', 'รหัสไม่ถูกต้อง');
                };
            }

            const btnAddEmp = document.getElementById('btn-add-emp');
            if (btnAddEmp) btnAddEmp.onclick = () => document.getElementById('add-emp-form').classList.remove('hidden');
            
            const btnSaveEmp = document.getElementById('save-new-emp');
            if (btnSaveEmp) {
                btnSaveEmp.onclick = async () => {
                    const name = document.getElementById('new-emp-name').value.trim();
                    const pin = document.getElementById('new-emp-pin').value.trim();
                    const wageType = document.getElementById('new-emp-wage-type').value;
                    const baseRate = parseFloat(document.getElementById('new-emp-base').value) || 0;
                    const otRate = parseFloat(document.getElementById('new-emp-ot').value) || 0;

                    if (!name || pin.length < 4) return showModal('แจ้งเตือน', 'กรอกชื่อและ PIN อย่างน้อย 4 หลัก');
                    
                    await addDoc(collection(db, `artifacts/${appId}/public/data`, 'employees'), { 
                        name, pin, wageType, baseRate, otRate 
                    });
                    document.getElementById('add-emp-form').classList.add('hidden');
                    showModal('สำเร็จ', 'เพิ่มข้อมูลพนักงานเรียบร้อย');
                };
            }
            
            document.querySelectorAll('[data-delete-emp]').forEach(btn => {
                btn.onclick = (e) => {
                    const id = e.currentTarget.getAttribute('data-delete-emp');
                    showModal('ยืนยัน', 'ต้องการลบพนักงานและข้อมูลอัตราจ้างใช่หรือไม่?', [
                        { text: 'ยกเลิก', type: 'white', action: closeModal },
                        { text: 'ลบ', type: 'danger', action: async () => {
                            await deleteDoc(doc(db, `artifacts/${appId}/public/data`, 'employees', id));
                            closeModal();
                        }}
                    ]);
                };
            });

            const saveSettings = async (updates) => updateDoc(doc(db, `artifacts/${appId}/public/data`, 'config', 'appSettings'), updates);
            
            const tglSelfie = document.getElementById('toggle-selfie');
            const tglGps = document.getElementById('toggle-gps');
            const inStdHrs = document.getElementById('setting-std-hours');

            if (tglSelfie) tglSelfie.onchange = (e) => saveSettings({ requireSelfie: e.target.checked });
            if (tglGps) tglGps.onchange = (e) => saveSettings({ requireGPS: e.target.checked });
            if (inStdHrs) inStdHrs.onchange = (e) => saveSettings({ standardHours: parseFloat(e.target.value) || 8 });

            const btnSavePin = document.getElementById('btn-save-owner-pin');
            if (btnSavePin) {
                btnSavePin.onclick = () => {
                    const newPin = document.getElementById('new-owner-pin').value.trim();
                    if(!newPin) return;
                    showModal('ยืนยัน', 'เปลี่ยนรหัส?', [
                        { text: 'ยกเลิก', type: 'white', action: closeModal },
                        { text: 'ยืนยัน', type: 'danger', action: async () => {
                            await saveSettings({ ownerPin: newPin });
                            closeModal();
                            showModal('สำเร็จ', 'เปลี่ยนรหัสเรียบร้อยแล้ว');
                        }}
                    ]);
                }
            }
        }

        let clockInterval;
        function startClock() {
            if (clockInterval) clearInterval(clockInterval);
            const updateClock = () => {
                const el = document.getElementById('live-clock');
                if (el) el.innerText = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            };
            updateClock();
            clockInterval = setInterval(updateClock, 1000);
        }
    </script>
</body>
</html>
