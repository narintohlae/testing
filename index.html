<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบเช็คราคาสินค้า</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f3f4f6;
        }
        /* Hide scrollbar for cleaner mobile look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <div class="max-w-md mx-auto min-h-screen bg-gray-50 shadow-xl relative pb-6">
        
        <!-- Header & Search Bar (Sticky) -->
        <header class="glass-header sticky top-0 z-10 border-b border-gray-200 shadow-sm pt-safe">
            <div class="px-5 pt-6 pb-4 bg-blue-600 rounded-b-3xl shadow-md">
                <h1 class="text-2xl font-bold text-white mb-4 text-center">เช็คราคาสินค้า</h1>
                
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="w-full pl-12 pr-10 py-3 rounded-2xl border-none shadow-inner focus:ring-4 focus:ring-blue-300 text-lg transition-all outline-none" 
                        placeholder="ค้นหาชื่อสินค้า, รหัส, บาร์โค้ด..."
                        autocomplete="off"
                    >
                    <button id="clearSearchBtn" class="absolute inset-y-0 right-0 pr-4 flex items-center hidden">
                        <svg class="w-5 h-5 text-gray-400 hover:text-gray-600" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Stats / Info row -->
            <div class="flex justify-between items-center px-6 py-3 bg-white text-sm text-gray-500 font-medium">
                <span id="totalItemsCount">กำลังโหลด...</span>
                <button onclick="fetchData()" class="text-blue-500 flex items-center gap-1 hover:text-blue-700">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    รีเฟรช
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <main class="p-4" id="mainContainer">
            
            <!-- Loading State -->
            <div id="loadingState" class="flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-14 w-14 border-b-4 border-blue-600 mb-4"></div>
                <p class="text-gray-500 text-lg">กำลังดึงข้อมูล...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="hidden flex-col items-center justify-center py-20 text-center px-4">
                <svg class="w-16 h-16 text-red-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <h3 class="text-xl font-semibold text-gray-800 mb-2">เกิดข้อผิดพลาด</h3>
                <p class="text-gray-500 mb-4" id="errorMessage">ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบว่า Google Sheet ได้เปิดแชร์สาธารณะ (Anyone with the link) แล้ว</p>
                <button onclick="fetchData()" class="px-6 py-2 bg-blue-600 text-white rounded-full shadow hover:bg-blue-700 transition">ลองใหม่อีกครั้ง</button>
            </div>

            <!-- No Results State -->
            <div id="noResultsState" class="hidden flex-col items-center justify-center py-20 text-center">
                <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <h3 class="text-lg font-semibold text-gray-600">ไม่พบสินค้าที่คุณค้นหา</h3>
                <p class="text-gray-400 text-sm mt-1">ลองใช้คำค้นหาอื่น หรือตรวจสอบตัวสะกด</p>
            </div>

            <!-- Initial Ready State (New) -->
            <div id="initialState" class="hidden flex-col items-center justify-center py-24 text-center px-4">
                <div class="bg-blue-50 p-6 rounded-full mb-4 shadow-inner">
                    <svg class="w-12 h-12 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">พร้อมสแกน / ค้นหา</h3>
                <p class="text-gray-500 text-sm">สแกนบาร์โค้ด หรือพิมพ์ชื่อสินค้า<br>ระบบจะแสดงผลลัพธ์ทันที</p>
            </div>

            <!-- Products List -->
            <div id="productsList" class="flex flex-col gap-4 hidden">
                <!-- Cards will be injected here -->
            </div>

        </main>
    </div>

    <script>
        // Google Sheet Configuration
        const SHEET_ID = '1N2Yja6aMNWN-ZPid8nWq-sV3XgB0exmoHue3hdeUrFk';
        const GID = '0';
        const JSON_ENDPOINT = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

        // App State
        let allProducts = [];
        let sheetHeaders = [];

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const productsList = document.getElementById('productsList');
        const loadingState = document.getElementById('loadingState');
        const errorState = document.getElementById('errorState');
        const noResultsState = document.getElementById('noResultsState');
        const initialState = document.getElementById('initialState');
        const totalItemsCount = document.getElementById('totalItemsCount');

        async function fetchData() {
            showState('loading');
            try {
                const response = await fetch(JSON_ENDPOINT);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const text = await response.text();
                // Extract JSON from Google's response format
                const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/);
                
                if (!jsonMatch) throw new Error('Invalid data format received');
                
                const data = JSON.parse(jsonMatch[1]);
                processData(data);
                
            } catch (error) {
                console.error("Error fetching data:", error);
                showState('error');
            }
        }

        function processData(data) {
            // ดึงหัวข้อคอลัมน์จาก Sheet
            sheetHeaders = data.table.cols.map((col, index) => col.label ? col.label.trim() : `Column${index + 1}`);
            
            // กำหนดหัวข้อที่ต้องการดึงข้อมูล
            const targetCols = ['บาร์โค้ด', 'สินค้า', 'รวม', 'หน่วย'];

            // Map ข้อมูลเฉพาะคอลัมน์ที่กำหนด
            allProducts = data.table.rows.map(row => {
                let item = {};
                row.c.forEach((cell, i) => {
                    const headerName = sheetHeaders[i];
                    const value = cell ? (cell.f || cell.v || '') : '';
                    
                    // เช็คว่าชื่อคอลัมน์ตรงกับ 4 หัวข้อที่ต้องการหรือไม่
                    targetCols.forEach(target => {
                        if (headerName.includes(target)) {
                            item[target] = value;
                        }
                    });
                });
                return item;
            });

            // กรองแถวที่ว่างเปล่าออกไป
            allProducts = allProducts.filter(item => {
                return Object.values(item).some(val => val.toString().trim() !== '');
            });

            // ตรวจสอบว่ามีการค้นหาค้างอยู่หรือไม่
            if(searchInput.value) {
                handleSearch();
            } else {
                totalItemsCount.textContent = `ข้อมูลพร้อมแล้ว (${allProducts.length} รายการ)`;
                showState('initial');
            }
        }

        function renderProducts(items) {
            productsList.innerHTML = '';
            
            if (items.length === 0) {
                showState('noResults');
                return;
            }

            items.forEach(item => {
                // ดึงค่าตาม Key ที่เจาะจงไว้
                const titleText = item['สินค้า'] || 'ไม่ระบุชื่อสินค้า';
                const barcodeText = item['บาร์โค้ด'] || '-';
                let priceText = item['รวม'] || '-';
                const unitText = item['หน่วย'] || '';
                
                // ใส่ลูกน้ำ (comma) ให้ตัวเลขราคา
                if(!isNaN(priceText) && priceText !== '' && priceText !== '-') {
                    priceText = Number(priceText).toLocaleString('th-TH');
                }

                // จัดรูปแบบ ราคา + หน่วย
                let priceDisplay = priceText;
                if (priceDisplay !== '-') {
                    priceDisplay += ' ฿';
                    if (unitText) {
                        priceDisplay += `<span class="text-sm font-normal text-blue-600 ml-1">/ ${unitText}</span>`;
                    }
                }

                // สร้าง HTML สำหรับแต่ละรายการ
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow duration-200 relative overflow-hidden";
                
                // แถบสีด้านซ้าย
                const isHighlight = parseFloat(item['รวม'] || 0) > 0;
                const highlightColor = isHighlight ? 'bg-blue-500' : 'bg-gray-300';
                
                card.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-1 ${highlightColor}"></div>
                    <div class="pl-2">
                        <div class="flex justify-between items-start gap-3 mb-3">
                            <h2 class="text-lg font-semibold text-gray-800 leading-tight">${titleText}</h2>
                            <div class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg font-bold whitespace-nowrap shadow-sm text-right shrink-0">
                                <div class="text-lg leading-none">${priceDisplay}</div>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between items-center text-sm mt-1 border-b border-gray-50 border-dashed pb-1">
                                <span class="text-gray-400">บาร์โค้ด:</span>
                                <span class="text-gray-600 font-mono bg-gray-100 px-2 py-0.5 rounded text-xs">${barcodeText}</span>
                            </div>
                        </div>
                    </div>
                `;
                
                productsList.appendChild(card);
            });
            
            showState('content');
        }

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            
            // Toggle clear button visibility
            clearSearchBtn.classList.toggle('hidden', query.length === 0);
            
            if (query === '') {
                // ถ้าไม่ได้พิมพ์อะไรเลย ให้แสดงหน้าพร้อมใช้งาน ไม่แสดงสินค้าทั้งหมด
                totalItemsCount.textContent = `ข้อมูลพร้อมแล้ว (${allProducts.length} รายการ)`;
                showState('initial');
                return;
            }

            const filtered = allProducts.filter(item => {
                // Search across all values in the object
                return Object.values(item).some(val => 
                    val.toString().toLowerCase().includes(query)
                );
            });

            totalItemsCount.textContent = `ค้นพบ ${filtered.length} รายการ`;
            renderProducts(filtered);
        }

        function showState(state) {
            loadingState.classList.add('hidden');
            errorState.classList.add('hidden');
            noResultsState.classList.add('hidden');
            productsList.classList.add('hidden');
            initialState.classList.add('hidden');

            switch(state) {
                case 'loading': loadingState.classList.remove('hidden'); break;
                case 'error': errorState.classList.remove('hidden'); break;
                case 'noResults': noResultsState.classList.remove('hidden'); break;
                case 'content': productsList.classList.remove('hidden'); break;
                case 'initial': initialState.classList.remove('hidden'); break;
            }
        }

        // Event Listeners
        searchInput.addEventListener('input', handleSearch);
        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            handleSearch();
            searchInput.focus();
        });

        // Initialize App & Auto Focus Input
        window.onload = () => {
            fetchData();
            searchInput.focus();
        };

    </script>
</body>
</html>
